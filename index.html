<head>

<style>
:root{
  --text:#1A1A1A; --muted:#666666; --bg:#FFFFFF; --line:#E5E7E5;
  --navy:#0F3460; --navy2:#16213E; --ink:#1A1A2E;
  --know:#2E7D5B; --partial:#9A6A1E; --dont:#B03A2E;
  --chip:#F2F4F7; --card:#FAFBFC;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Source Sans Pro',-apple-system,system-ui,sans-serif;color:var(--text);
  background:var(--bg);font-size:16px;line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom)}
code,.mono{font-family:'Source Code Pro',ui-monospace,Menlo,monospace}
button{font-family:inherit;font-size:16px;cursor:pointer;border:none;background:none}
.wrap{max-width:680px;margin:0 auto;padding:0 16px}

/* top bar */
.top{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--line);
  padding:10px 16px;display:flex;align-items:center;gap:12px;
  padding-top:calc(10px + env(safe-area-inset-top))}
.top .name{font-weight:700;color:var(--navy);font-size:17px}
.top .count{color:var(--muted);font-size:14px;margin-left:auto}
.top .lnk{color:var(--navy);font-size:14px;font-weight:600;padding:4px 8px;border-radius:8px}
.top .lnk:active{background:var(--chip)}

/* generic */
h1{font-size:30px;font-weight:700;margin:18px 0 6px;color:var(--ink)}
h2{font-size:22px;font-weight:700;margin:0 0 4px;color:var(--navy2)}
.sub{color:var(--muted);font-size:15px;margin:0 0 16px}
.section{margin:20px 0}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}
.chip{font-size:13px;font-weight:600;padding:5px 10px;border-radius:999px;background:var(--chip);color:var(--navy2)}
.chip.tier{background:#EAF0F7;color:var(--navy)}
.chip.block{background:#F2F4F7;color:var(--muted)}
.chip.know{background:#E6F1EC;color:var(--know)}
.chip.partial{background:#F6EEDD;color:var(--partial)}
.chip.dont{background:#F6E4E1;color:var(--dont)}

/* buttons */
.btn{display:block;width:100%;padding:15px 16px;border-radius:12px;font-weight:600;
  background:var(--navy);color:#fff;text-align:center;transition:opacity .12s}
.btn:active{opacity:.85}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn.ghost:active{background:var(--chip)}
.btn.sm{padding:11px 12px;font-size:15px}
.row{display:flex;gap:10px}
.row>*{flex:1}

/* question */
.qcard{margin:18px 0}
.qtext{font-size:23px;font-weight:600;line-height:1.35;margin:6px 0 18px;color:var(--ink)}

/* voice */
.voicebox{border:1px solid var(--line);border-radius:12px;padding:14px;background:var(--card);margin:14px 0}
.voicebox .hint{color:var(--muted);font-size:14px;margin:0 0 10px}
.ta{width:100%;min-height:84px;font-family:inherit;font-size:16px;line-height:1.45;color:var(--text);
  border:1px solid var(--line);border-radius:10px;padding:11px 12px;background:#fff;resize:vertical;-webkit-appearance:none}
.ta::placeholder{color:#9aa0a6}
.recdot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--dont);margin-right:7px;vertical-align:middle}

/* reveal cards */
.ans{margin:16px 0}
.ans .lead{border:1px solid var(--line);border-left:4px solid var(--navy);border-radius:10px;
  background:#F6F8FB;padding:14px 16px;margin:0 0 12px}
.ans .lead .lbl{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--navy);margin:0 0 6px}
.ans .lead .body{font-size:17px;line-height:1.5}
.block{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:0 0 10px;background:#fff}
.block .lbl{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin:0 0 6px}
.block .body{font-size:15px;line-height:1.5}
.block.formula .body{font-family:'Source Code Pro',monospace;font-size:14px;background:#F5F6F8;border-radius:8px;padding:10px;white-space:pre-wrap;word-break:break-word}
.block.mistakes{border-left:4px solid var(--dont)}
.block .body code{background:#F0F2F5;padding:1px 5px;border-radius:5px;font-size:13px}

/* coverage */
.cover{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 14px}
.cover .t{font-size:13px;padding:4px 9px;border-radius:999px;font-weight:600}
.cover .yes{background:#E6F1EC;color:var(--know)}
.cover .no{background:#F6E4E1;color:var(--dont)}
.cover .cap{width:100%;color:var(--muted);font-size:13px;margin-bottom:2px}

/* rate bar */
.rate{position:sticky;bottom:0;background:var(--bg);border-top:1px solid var(--line);
  padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px}
.rate button{flex:1;border-radius:12px;padding:14px 8px;font-weight:700;font-size:15px;border:1px solid var(--line);background:#fff}
.rate .r-dont{color:var(--dont);border-color:#EACBC6}
.rate .r-part{color:var(--partial);border-color:#EADFC6}
.rate .r-know{color:var(--know);border-color:#C6E2D3}
.rate button:active{background:var(--chip)}

/* block list / progress */
.blockrow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.blockrow .bt{flex:1}
.blockrow .bt .n{font-weight:600;font-size:15px}
.blockrow .bt .m{color:var(--muted);font-size:13px}
.bar{height:8px;border-radius:999px;background:var(--line);overflow:hidden;display:flex;margin-top:6px}
.bar i{display:block;height:100%}
.bar .k{background:var(--know)} .bar .p{background:var(--partial)} .bar .d{background:var(--dont)}
.blockrow .go{color:var(--navy);font-weight:600;font-size:14px;padding:8px 10px;border-radius:8px}
.blockrow .go:active{background:var(--chip)}

.hidden{display:none}
.note{color:var(--muted);font-size:13px;margin-top:14px;line-height:1.45}
.kbd{display:inline-block;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:13px;background:var(--card)}
.stat{display:flex;gap:16px;margin:10px 0 4px}
.stat .s{text-align:left}
.stat .s b{display:block;font-size:24px;color:var(--navy)}
.stat .s span{color:var(--muted);font-size:13px}
hr.div{border:none;border-top:1px solid var(--line);margin:18px 0}
</style>
</head>
<body>
<div class="top">
  <span class="name" onclick="go('home')">SoF Oral Trainer</span>
  <span class="count" id="count"></span>
  <span class="lnk" onclick="go('progress')">Прогресс</span>
</div>

<script>
const DATA = [{"id": "Q1", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What does NPV mean?", "spoken": "\"NPV is the present value of all future cash flows discounted at the required return, minus the upfront investment. A positive NPV means the project earns more than its cost of capital and creates shareholder value; negative means it destroys value. For mutually exclusive projects of equal risk, pick the highest NPV. The critical nuance is that NPV is entirely discount-rate dependent — the same cash flows can show positive or negative NPV depending on whose WACC you apply, so seller's WACC is not buyer's WACC. When NPV and IRR conflict, I always defer to NPV because it reflects absolute value creation, not just a percentage.\"", "formula": "`NPV = −CF0 + Σ CFt/(1+r)^t`. Accept if NPV > 0. Discount-rate dependent: same CFs, different WACC → different sign.", "example": "Invest $100M today, receive $30M/yr for 5 years at r = 10%. NPV = −100 + 27,3 + 24,8 + 22,5 + 20,5 + 18,6 = **+$13,7M → accept**.", "mistakes": "Treating NPV as discount-rate-independent — an MD won't ask \"what is NPV,\" he'll ask \"your DCF is positive at 9% WACC but the buyer's WACC is 11% — does the deal still work?\" You must know the sign can flip. Also: NPV is scale-blind in ranking ($1B project with $10M NPV beats $1M project with $5M NPV on absolute terms but not on efficiency).", "followup": "\"When do NPV and IRR conflict?\" → Different project scale or cash-flow timing; pick NPV. \"When does NPV break?\" → Non-standard cash flows with multiple sign changes (use MIRR), or risk that changes over time (flat discount rate assumption fails).", "rf": "При WACC 18-22% планка для NPV-positive проектов кратно выше — на $500M инвестиций нужно ~$130M+ годового FCF для breakeven против $50-70M в US. Используется в capex-оценке Сбер / Газпром / Лукойл.", "terms": ["WACC", "NPV", "IRR"]}, {"id": "Q2", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What does RRR (required rate of return) mean?", "spoken": "\"RRR is the minimum return an investor demands to compensate for a given level of risk — it's a hurdle rate, an input to the decision, not the project's output. For equity you compute it via CAPM: risk-free rate plus beta times ERP. For the firm as a whole, the RRR is the WACC. You accept a project when its IRR exceeds the RRR. The classic trap is confusing it with IRR: RRR is what you require, IRR is what the project delivers — same arithmetic machinery, opposite role. A PE fund with a 20% target IRR treats that target as its RRR and filters every deal against it.\"", "formula": "`RRR = Rf + β × (Rm − Rf)` (equity via CAPM), or `RRR = WACC` (firm-level). RRR = input/threshold; IRR = output. Accept if IRR > RRR.", "example": "Rf = 4%, β = 1,2, ERP = 6% → RRR = 4% + 1,2 × 6% = **11,2%**. Any project must clear 11,2% to be accepted.", "mistakes": "Confusing RRR (what you demand) with IRR (what the project delivers). Also: applying CAPM-based RRR to distressed companies, startups, or illiquid assets where tail risk dominates and CAPM's efficient-market/normal-distribution assumptions break.", "followup": "\"How do you set RRR for a private-company project?\" → WACC built from comparable public betas, unlevered and relevered to the target's structure, plus size/CRP premiums. \"Why does RRR differ across users?\" → CFO uses WACC + 2-3% execution buffer; PE uses target IRR; an investor uses opportunity cost.", "rf": "При ключевой ставке ~15% (снижена с 21% пика) corporate RRR ≈ WACC + 2-3% buffer = 20-25%; PE target 40%+ против 20% в US; venture выше. Проект с IRR 15% при таких ставках убыточен.", "terms": ["risk-free", "beta", "WACC", "CAPM", "IRR", "ERP"]}, {"id": "Q3", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What does IRR mean?", "spoken": "\"IRR is the discount rate at which NPV equals zero — effectively the project's implied annualized return. If IRR exceeds WACC or the RRR, the project creates value. But IRR has three real limitations: it can produce multiple solutions when cash flows change sign more than once, it's scale-blind, and it implicitly assumes you reinvest interim cash flows at the IRR itself, which is unrealistic for high-return projects. That's why for a conservative presentation I use MIRR, which reinvests at WACC. And IRR is not CAGR — CAGR measures growth between two points, IRR accounts for all intermediate cash flows and their timing.\"", "formula": "`0 = Σ CFt/(1+IRR)^t`, solved iteratively. Accept if IRR > WACC. IRR ≠ CAGR. Timing-sensitive: same amounts later = lower IRR.", "example": "Invest $100M, receive $50M / $40M / $30M over years 1-3. IRR ≈ **10,7%**. If WACC = 8%, accept (IRR > WACC). But a competing $10M project at 12% IRR may still lose on NPV because of scale → rank by NPV.", "mistakes": "\"Your LBO shows 22% IRR over 5 years — good deal?\" You can't answer without: (1) gross or net of fees/carry, (2) the MOIC (22% IRR at 1,5x MOIC is mediocre, at 2,7x strong), (3) sensitivity to exit multiple — if 100% of the IRR comes from multiple expansion with 0% revenue growth, it's speculative. Also: IRR can be gamed by front-loading dividends via recaps, inflating IRR without changing cash-on-cash.", "followup": "\"What is MIRR?\" → Modified IRR: reinvests positives at WACC, finances negatives at CoD; single solution, more realistic; `MIRR = (FV positives / |PV negatives|)^(1/n) − 1`. \"When does IRR give multiple answers?\" → More than one sign change in the cash-flow stream.", "rf": "В РФ IRR — главная метрика PE performance, но post-2022 exits иностранных инвесторов часто продаются в distressed-режиме → реализованный IRR нередко отрицательный. Для conservative presentation при высоких ставках используй MIRR.", "terms": ["MIRR", "WACC", "CAGR", "NPV", "IRR"]}, {"id": "Q3.5", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "IRR vs MIRR vs CAGR — realized vs hypothetical returns", "spoken": "\"Three return metrics measure three different things. CAGR is the compound growth between two equity points — the most conservative and auditable, because it only counts what you actually realized. IRR solves for the rate that zeros the NPV of all modeled cash flows, but it hides an assumption: that interim cash is reinvested at the IRR itself. MIRR fixes that by reinvesting at a stated rate, typically WACC. The killer insight is this: if you report IRR on modeled FCFE that never actually left the company — because the cash just sat on the balance sheet — that IRR is a hypothetical construct. Your realized return is only the CAGR on entry-to-exit equity. This is exactly why sophisticated LPs track DPI, not IRR: DPI is real money, IRR can be a paper promise.\"", "formula": "`MIRR = (FV positives at reinvestment rate / |PV negatives at finance rate|)^(1/n) − 1`. `CAGR = (End/Begin)^(1/n) − 1`. MIRR ≤ IRR whenever reinvestment rate < IRR (the normal case). Use CAGR for two-cash-flow cases, MIRR when IRR > ~25%.", "example": "Buy a company for $100M, sell at $300M after 5 years, extract zero cash in between. Realized return = CAGR = (300/100)^(1/5) − 1 = **24,6%**. If you instead model $15M FCFE/yr (never paid out) plus a $240M terminal and solve for IRR, you get a similar headline number — but it's a modeling artifact, because those $15M sat as excess cash earning maybe 2% while WACC was 12%, a ~10% annual implicit drag.", "mistakes": "(1) Reporting IRR on FCFE that was never extracted. (2) Reporting fund IRR without splitting realized (DPI) from unrealized (RVPI) — a 25% IRR with 0,3x DPI and 2,5x RVPI is zero realized cash (\"IRR in a box\"). (3) Assuming reinvestment at IRR for high-return deals. (4) Using CAGR when there are multiple interim cash flows.", "followup": "\"DPI vs TVPI?\" → DPI = distributed / paid-in (money actually returned); TVPI = DPI + RVPI (includes GP's unrealized marks). \"When use CAGR over IRR?\" → Only two cash flows (entry + exit). \"Hold vs extract — which metric?\" → If ROIC > WACC, retain and report CAGR on equity; if ROIC < WACC, extract and report DPI.", "rf": "Большинство «PE» в РФ — это growth equity, hold-and-sell без distributions → правильная метрика = CAGR entry→exit, не IRR по модельному FCFE. Post-2022 DPI большинства фондов 0,1-0,3x (основная стоимость в RVPI-марках, которые могут не материализоваться). На собесе при вопросе про «fund IRR» всегда уточняй realized vs unrealized.", "terms": ["MIRR", "WACC", "CAGR", "FCFE", "NPV", "DPI", "IRR"]}, {"id": "Q4", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What does WACC mean?", "spoken": "\"WACC is the weighted-average cost of capital — it blends after-tax cost of debt and cost of equity, weighted by their market-value proportions. Cost of equity comes from CAPM, cost of debt is the YTM on outstanding debt times one-minus-tax, because interest is deductible. You use it as the discount rate for unlevered free cash flows to arrive at Enterprise Value, and you build it on the target capital structure, not necessarily the current one. The first discipline, though, is matching the discount rate to the cash flow: FCFF discounts at WACC, FCFE and dividends discount at cost of equity — WACC is not a default. And the risk-free rate inside it must match the currency of the cash flows.\"", "formula": "`WACC = (E/V) × CoE + (D/V) × CoD × (1−t)`, V = E + D at market values. CoE = CAPM; CoD = YTM × (1−t). Match Rf currency to cash-flow currency. FCFF → WACC; FCFE → CoE.", "example": "Equity $800M, Debt $200M; CoE 10%, CoD 5%, tax 25%. WACC = 0,8 × 10% + 0,2 × 5% × 0,75 = 8,0% + 0,75% = **8,75%**. (Apple-type case: near-zero net debt → WACC ≈ CoE; with β 1,2, Rf 4,5%, ERP 5,5%, CoE ≈ 11% → WACC ≈ 11%.)", "mistakes": "Forgetting (1−t) on CoD; using book-value weights instead of market (we price risk for marginal investors who trade at market); not being able to defend each input with a source. The VP will demand the sensitivity: \"what's implied value at ±100bps WACC?\" — always have it ready. WACC also breaks for highly leveraged firms (changing structure) — use APV or LFCF.", "followup": "\"How does WACC change with more debt?\" → Initially falls (cheap debt + tax shield replace expensive equity), then rises past the optimum (~30-40% D/V for IG industrials) as distress risk lifts both CoD and CoE. \"When NOT to use WACC?\" → Distressed, trough-cyclical, or rapidly changing capital structure.", "rf": "Russia Rf ~16% (ОФЗ 10Y), ERP 7-10%, CRP layered → WACC 18-25% RUB vs US 8-12% / EU 7-10%, что создаёт «РФ-дисконт» 30-60% к DCF-оценкам. Для банков (Сбер) WACC бессмыслен — interest is the business, не financing; используй DDM или P/BV.", "terms": ["enterprise value", "cost of equity", "market value", "cost of debt", "risk-free", "WACC", "FCFF", "CAPM"]}, {"id": "Q5", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "Why is cost of debt usually less than cost of equity?", "spoken": "\"Three reasons, in order of importance. First, priority of claims: debtholders are senior — they get contractual interest before any dividend and are repaid before equity in bankruptcy, so they bear less risk. Second, the tax shield: interest is deductible, so a 6% coupon at a 25% tax rate effectively costs 4,5%. Third, contractual certainty: debt payments are fixed and predictable, while equity is the residual claim — shareholders get only what's left. Because equity investors are last in line with uncertain returns, they demand a higher return. The seniority argument is the most fundamental — the tax shield alone is the weakest answer.\"", "formula": "`after-tax CoD = CoD × (1−t)`. Drivers: (1) priority of claims, (2) tax deductibility, (3) contractual certainty. Equity is residual → higher required return.", "example": "CoD 6% at 25% tax → after-tax 4,5%. CoE via CAPM = 4% + 1,0 × 6% = 10%. The ~5,5pp gap is the equity risk premium.", "mistakes": "Mentioning only the tax shield — the priority/seniority argument is more fundamental. Forgetting that the relationship can invert in deep distress.", "followup": "\"When can CoD exceed CoE?\" → Deep distress: debt trades at a steep discount (very high implied YTM) while equity becomes a call option on recovery. \"Why doesn't WACC just equal CoD at 100% leverage?\" → M&M Proposition II: CoE rises linearly with D/E to offset cheaper debt, plus financial-distress costs.", "rf": "Gap CoD-CoE в РФ ~9-11pp против 3-5pp в US (выше equity risk premium в EM). Сбер: corporate bond yield 14-16% pre-tax → ~11-13% after-tax; CoE ~22%. С 2024 вычет процентов ограничен ключевой ставкой + 5pp (ст. 269 НК) → при высокой ставке эффективная after-tax CoD выше, чем даёт простая формула (1−t).", "terms": ["tax shield"]}, {"id": "Q6", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "How do you calculate cost of equity?", "spoken": "\"The industry standard is CAPM: risk-free rate plus beta times the equity risk premium, plus a country risk premium where applicable. Two alternatives serve as cross-checks: the dividend discount model — dividend yield plus growth — for stable dividend payers, and bond-yield-plus-premium, adding 3-5% to the company's own pre-tax cost of debt. For a private company with no traded beta, you take 5-10 public peers, unlever each via the Hamada equation, take the median asset beta, and relever to the target's capital structure. That unlever-relever process is what separates a senior associate from a junior analyst, and you should triangulate across methods — if they converge within a couple of points, confidence is high.\"", "formula": "CAPM: `CoE = Rf + β × ERP (+ size premium + CRP)`. DDM: `CoE = D1/P0 + g`. Bond+premium: `CoE = YTM + 3-5%`. Sources: Rf = 10Y sovereign; β = regression or bottom-up peers; ERP = Damodaran / Kroll.", "example": "Rf = 4,5% (10Y Treasury), β = 1,3, ERP = 6%, size premium = 1,5% (small-cap) → CoE = 4,5% + 1,3 × 6% + 1,5% = **13,8%**.", "mistakes": "Not knowing the source of each input (Rf = 10Y sovereign, β = regression or bottom-up, ERP = Damodaran/Kroll). Using DDM on a non-dividend payer (useless for growth tech). Treating CAPM output as precise rather than triangulating.", "followup": "\"What if no public peers exist for beta?\" → Industry-average beta, or a synthetic build from operating/financial characteristics. \"When does DDM diverge from CAPM?\" → A mature, low-beta utility with a high dividend yield can imply a higher CoE under DDM than CAPM.", "rf": "Два корректных пути, не смешивать: (A) Rf_ОФЗ + β × ERP_РФ, БЕЗ CRP; (B) Rf_UST + β × ERP_US + CRP. Double-count CRP завышает CoE на 4-6pp. Cross-check обоими — должны совпасть ±2% после FX. Пример Сбер (RUB): 14% + 1,1 × 7% ≈ 21,7%.", "terms": ["equity risk premium", "country risk", "cost of debt", "risk-free", "beta", "CAPM", "ERP", "DDM"]}, {"id": "Q7", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "Walk me through CAPM", "spoken": "\"CAPM says the expected return on any asset equals the risk-free rate plus beta times the equity risk premium. The risk-free rate is the 10-year sovereign yield matched to your cash-flow currency. Beta measures systematic, non-diversifiable risk — estimated by regressing 60-plus months of stock returns against the index, or bottom-up from peers. ERP is the excess return demanded over risk-free bonds, roughly 5-6% in the US and higher in EM. In practice I modify it into a multi-factor form: add a size premium for small-caps, a country risk premium for emerging markets, and a liquidity premium for illiquid names. The key trap is leverage — you can't apply a peer's beta directly if their capital structure differs; you unlever each peer, median across them, and relever at the target's D/E via Hamada.\"", "formula": "`CoE = Rf + β × (Rm − Rf) [+ SP + CRP + LP]`. Hamada: `βU = βL / (1 + (1−t) × D/E)`, then `βL = βU × (1 + (1−t) × D/E_target)`. Match Rf duration to DCF horizon (10Y bond for 10Y DCF).", "example": "US large-cap (JPMorgan-type): Rf 4,5%, β 1,1, ERP 6% → CoE = **11,1%**. Russian tech in RUB (Positive-type): Rf 16% (ОФЗ), β 1,3, ERP 8%, SP 1% → CoE = **27,4%** — illustrating why Russian-tech WACC runs ~3x US-tech.", "mistakes": "Saying \"beta from Bloomberg\" without the methodology — the VP wants \"bottom-up from 7 comps, unlevered via Hamada, median asset beta, relevered to target D/E.\" Using a single peer's raw levered beta. Wrong Rf duration (3-month bill or 30Y for a 10-year DCF).", "followup": "\"Why 10Y Treasury, not 5Y or 30Y?\" → Match the ~10-year projection horizon; 30Y adds term premium that overstates Rf. \"Walk me through unlever/relever beta\" → Hamada both directions; use ≥5 peers, exclude outliers (β > 2,5 or < 0,3), watch for recent capital-structure changes.", "rf": "MOEX/iMOEX beta ненадёжна для мелких имён (тонкая ликвидность) и для post-2022 local ERP — стандарт: global peers, unlever via Hamada, relever под российский target D/E, плюс CRP. Apr 2026: UST 10Y 4,5%, ОФЗ 10Y 14%, gap ~9,5pp.", "terms": ["equity risk premium", "country risk", "risk-free", "leverage", "beta", "CAPM", "DCF", "ERP"]}, {"id": "Q8", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What does risk-free rate mean?", "spoken": "\"The risk-free rate is theoretically a zero-risk return, and in practice we proxy it with the 10-year sovereign bond yield in the country and currency of the cash flows — US Treasury for USD, Bund for EUR, OFZ for RUB. The 10-year tenor matches the typical DCF horizon, so duration matching matters: a 1-year bill is not equivalent to a 10-year bond as Rf in a long-duration model. The single most important rule is currency consistency — your Rf choice fixes the currency of the entire DCF, so you never mix RUB cash flows with a USD risk-free rate. A senior-level cross-check is comparing nominal Treasury to the TIPS-implied real rate; the gap is expected inflation, and your DCF's inflation assumptions should be consistent with it.\"", "formula": "Rf = 10Y sovereign yield, currency- and duration-matched to cash flows. USD → UST; EUR → Bund; RUB → ОФЗ. Nominal − TIPS-implied real = expected inflation (consistency check).", "example": "USD analysis: Rf = 10Y UST ≈ 4,5%. RUB analysis: Rf = 10Y ОФЗ ≈ 14%. The ~9,5pp difference reflects inflation and currency-risk differentials, NOT business risk.", "mistakes": "Mixing currencies (RUB cash flows with USD Rf). Using a short-term rate (3-month T-bill) for a 10-year DCF. Treating a default-prone sovereign yield as truly \"risk-free.\"", "followup": "\"Valuing an EM company in USD — which Rf?\" → US 10Y Treasury + CRP, NOT the local sovereign yield. \"What about Argentina/Turkey sovereigns?\" → They embed credit risk; use UST + CRP instead.", "rf": "ОФЗ 10Y ~14% раскладывается примерно на real 3-5% + inflation 5-8% + sovereign 2-3%. Duration matching критично: 1Y ОФЗ (~18%) ≠ 10Y (14%).", "terms": ["risk-free", "DCF"]}, {"id": "Q9", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What does beta mean?", "spoken": "\"Beta measures systematic, non-diversifiable risk — the sensitivity of a stock's returns to overall market moves. Beta above 1 amplifies market moves, below 1 dampens them, and negative beta is rare — gold or deep-discount retailers. There are two layers: asset beta strips out leverage to isolate pure business risk, and equity beta adds the financial risk from leverage — and in CAPM we use equity beta because we're computing cost of equity. You can estimate it top-down by regressing 60-plus months of returns against the index, but that's noisy and backward-looking, so I prefer bottom-up: unlever peer betas, take the median asset beta, and relever to the target's D/E. Bottom-up is more stable and it's the only way to get a beta for a private company.\"", "formula": "`β = Cov(Ri, Rm) / Var(Rm)`. Hamada: `βU = βL / (1 + (1−t) × D/E)`; relever `βL = βU × (1 + (1−t) × D/E_target)`. β > 1 = more volatile than market.", "example": "Peer βL = 1,4, D/E = 0,5, t = 25%. Unlever: βU = 1,4 / (1 + 0,75 × 0,5) = **1,02**. Relever to target D/E = 0,3: βL = 1,02 × 1,225 = **1,25**.", "mistakes": "Confusing equity vs asset beta; forgetting (1−t). Ignoring the excess-cash dilution: `β_operating = β_observed / (1 − cash/total value)`. Using noisy regression betas for thinly traded names instead of bottom-up peers.", "followup": "\"Beta for a private company?\" → Bottom-up: 5-10 public peers, unlever each (Hamada), take median, relever to target D/E. \"Why is regression beta unreliable?\" → Backward-looking, high estimation error, distorted by thin trading or recent recaps.", "rf": "MOEX beta зашумлена низким free float → стандарт: global peers + Hamada unlever/relever под российский target D/E. Sector example: для удобрений РФ структурно низкая beta (~0,75) — food security = mandatory demand, fertilizers не реагируют на рецессии как нефть/металлы (фермеры сеют независимо от цикла); sulfur-heavy producers чуть выше.", "terms": ["cost of equity", "sensitivity", "leverage", "beta", "CAPM", "NOI", "ABO", "NCI"]}, {"id": "Q10", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "How is ERP (equity risk premium) calculated?", "spoken": "\"ERP is the excess return equity investors demand over risk-free bonds, and it's an estimate, not an objective number. There are three methods. Historical: the average excess return of equities over bonds, roughly 5-7% for the US over 50-plus years — but backward-looking. Implied: solve for the ERP from current index levels using Gordon Growth — forward-looking but model-dependent, currently around 5% for the US. And survey-based across investors and academics. Damodaran is the industry reference and publishes monthly. For developed markets I use 5-7%; for emerging markets I add a country risk premium on top rather than relying on unreliable local data. An MD will always ask which ERP you used, so I date-stamp it and defend the source.\"", "formula": "`ERP = E[Rm] − Rf`. Historical US 5-7% (geometric < arithmetic; use geometric for long-term DCF), implied ~5%. Always date-stamp and cite (Damodaran / Kroll / Fernandez survey).", "example": "Rf = 4,5%, ERP = 6% → market expected return ≈ 10,5%; for a β = 1,0 stock, CoE = 10,5%.", "mistakes": "Treating ERP as a fixed known number — historical vs implied can differ by 100bps+. Not citing a source or date. Using stale local EM data instead of global ERP + separate CRP.", "followup": "\"Adjust ERP for emerging markets?\" → Add a CRP (sovereign-bond spread over UST, or Damodaran's rating-based table). \"Geometric or arithmetic historical?\" → Geometric for multi-year DCF discounting.", "rf": "Historical RTS 1995-2024 ~7-10%, но ненадёжна из-за разрыва 2022. Практика: global ERP 5-6% + CRP Russia. Альтернативный ориентир CRP — sovereign spread ОФЗ-UST ~9,5% (включает санкционную премию) vs Damodaran rating-based 4,5-5,5%.", "terms": ["country risk", "risk-free", "Gordon", "DCF", "ERP"]}, {"id": "Q11", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T1", "question": "What is asset beta vs equity beta?", "spoken": "\"Every observed beta — the equity beta — combines two risk sources: business risk inherent to the industry, and financial risk added by leverage. Asset beta strips out the leverage to reveal pure business risk, and that's what you compare across peers regardless of their capital structures. The Hamada equation converts between them. The standard process for valuing a private company is five steps: find 5-10 comparable public companies, unlever each one's equity beta at its own D/E, take the median asset beta, relever to your target's D/E, then drop it into CAPM. Without that cycle, comparing betas across companies with different leverage is simply wrong — it's apples to oranges at the business level.\"", "formula": "Unlever: `βU = βL / (1 + (1−t) × D/E)`. Relever: `βL = βU × (1 + (1−t) × D/E_target)`. Hamada assumes debt beta = 0 and constant tax rate.", "example": "Three peers (t = 25%): A βL 1,3 / DE 0,4 → βU 1,00; B βL 1,5 / DE 0,6 → βU 1,03; C βL 1,1 / DE 0,2 → βU 0,96. Median βU ≈ **1,00**. Target D/E 0,5 → βL = 1,00 × 1,375 = **1,375**.", "mistakes": "Not knowing the formula; dropping (1−t). Using a peer's raw observed beta despite different leverage. For HY/distressed names where debt risk is material, the debt-beta-zero assumption fails — use the full formula with a debt beta.", "followup": "\"Why not use raw observed beta?\" → Different leverage distorts the comparison; you need a clean business-level comparison. \"When does Hamada break?\" → Significant debt risk (debt beta ≠ 0) or changing tax rate.", "rf": "Для российской цели берёшь 5-10 global peers (для Сбера — HSBC, Wells Fargo, Santander), unlever каждого, усредняешь asset beta, relever под российскую target capital structure.", "terms": ["comparable", "leverage", "beta", "CAPM", "NCI"]}, {"id": "Q12", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T2", "question": "What is country risk premium (CRP)?", "spoken": "\"CRP compensates investors for country-specific risks — political instability, weak rule of law, currency volatility, capital controls, expropriation — that beta and global ERP don't capture. Two main methods: the sovereign spread, the difference between a country's USD sovereign yield and the matching US Treasury, or the Damodaran method, which scales that spread by the ratio of equity volatility to bond volatility. The single most important discipline is avoiding double-counting: you either use a local risk-free rate and local ERP, in which case CRP is already embedded and you add nothing, or a global risk-free rate plus global ERP plus an explicit CRP. Mixing them — say OFZ Rf plus a CRP add-on — is the classic junior mistake that overstates cost of equity by several points.\"", "formula": "`CoE = Rf + β × ERP + λ × CRP` (global method only). Sovereign spread: local sovereign USD yield − UST. Damodaran-adjusted: `sovereign spread × (σ_equity/σ_bond)`. λ = firm's country exposure (1 = fully domestic, 0,5 = 50% export). Local-currency method → CRP = 0.", "example": "Russia Apr 2026 sovereign spread = 14% (ОФЗ 10Y) − 4,5% (UST) = **9,5%** (inflated by post-sanctions capital-flight premium). Damodaran rating-based (Ba2) ≈ 4,5-5,5%; IB consensus ~6-8% as a middle ground. For a target exporting 70% to Europe, λ ≈ 0,3 — only 30% of cash flows carry domestic country risk.", "mistakes": "Double-counting — using ОФЗ Rf AND adding CRP overstates CoE by ~5pp. Using global peer beta (0,8) with a RUB Rf — beta then captures global, not MOEX, sensitivity and underweights local risk. Not date-stamping Damodaran's table (years differ 50-100bps). Ignoring λ for export-heavy firms.", "followup": "\"CRP for a multinational across 5 countries?\" → Weight CRP by revenue/cash-flow exposure per country, or do WACC-by-segment. \"Damodaran 5% vs sovereign spread 9,5% — which?\" → Damodaran for long holds (PE 5yr+, reflects rating-based default probability); sovereign spread for short-hold mark-to-market.", "rf": "Post-2022 многие practitioners перешли с Method B (USD, Damodaran) на Method A (RUB, ОФЗ Rf) из-за неопределённости USD-оценки при capital controls. Russia CDS заморожен для западных контрагентов → используют ОФЗ-UST spread как прокси.", "terms": ["cost of equity", "risk-free", "beta", "ERP"]}, {"id": "Q13", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T2", "question": "How do you calculate cost of equity without CAPM?", "spoken": "\"Three alternatives, all used as triangulation rather than replacements for CAPM. First, the dividend discount model: cost of equity equals the forward dividend yield plus the growth rate, where growth is ROE times the retention ratio — this only works for stable dividend payers and it's a minority-investor lens, valuing what you actually receive. Second, bond yield plus premium: take the company's own pre-tax cost of debt and add a 3-5% equity premium — fewest inputs, crude but anchored in that company's observable debt pricing, which is why value investors like Graham and Greenwald favor it. Third, earnings yield plus growth, one over P/E plus g, as a rough sanity check. I keep CAPM primary and use these where beta is unreliable — distressed, startup, illiquid, or compromised post-2022 data.\"", "formula": "DDM: `CoE = D1/P0 + g`, with `g = ROE × (1 − payout)`. Bond+premium: `CoE = pre-tax YTM + 3-5%`. Earnings: `CoE ≈ 1/PE + g`. All triangulation; converge ±2pp = high confidence.", "example": "DDM — price $50, next dividend $2,50, g = 4% → CoE = 5% + 4% = **9%**.", "mistakes": "Confusing dividend growth with earnings growth — in DDM, g is the growth of dividends. Applying DDM to non-dividend payers. Treating any single alternative as authoritative rather than cross-checking.", "followup": "\"When does DDM diverge sharply from CAPM?\" → A mature utility with below-market beta but high dividend yield can show a higher CoE under DDM. \"What's g in DDM?\" → Sustainable growth = ROE × retention ratio.", "rf": "Триангуляция для РФ: DDM для стабильных плательщиков (Сбер / Транснефть / Лукойл) — div yield + g; bond yield + 3-5pp как sanity check (Сбер bond 14% + 5% ≈ 19%); earnings yield + g. При расхождении >5pp — разбираться.", "terms": ["cost of equity", "cost of debt", "beta", "CAPM", "P/E", "DDM"]}, {"id": "Q14", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T2", "question": "What is the size premium and why does it matter for WACC?", "spoken": "\"Empirically, CAPM systematically underestimates required returns for small companies — small-caps historically earn 2-3% above what their beta predicts, and micro-caps more. That excess return reflects risks beta doesn't capture: illiquidity, higher bankruptcy rates, less diversification, and information asymmetry. So I compute CAPM cost of equity normally, then add a size premium from the Kroll, formerly Duff & Phelps, decile study based on the company's market-cap decile — near zero for mega-caps, around 1-1,5% for mid-caps, 3-5% for micro-caps. It matters because for a small private company, ignoring it materially overstates value — a 2,5% size premium can lift WACC by roughly 2% and cut enterprise value by 15-20% in a DCF.\"", "formula": "`CoE = Rf + β × ERP + Size Premium (+ CRP)`. Source: Kroll/D&P decile study, date-stamped. Decile 1 ≈ 0%; mid-cap (decile 5) ≈ 1-1,5%; micro-cap (decile 10) ≈ 5%+.", "example": "Large-cap CoE = 4,5% + 1,2 × 6% = 11,7%. Same business as a small-cap: 11,7% + 2,5% size premium = **14,2%** → if equity is ~70% of capital, WACC rises ~2%, reducing EV ~15-20%.", "mistakes": "Applying a size premium to true large-caps (decile 1-2 ≈ 0). Double-counting size premium with a company-specific risk premium — they address different risks. Using outdated Ibbotson data instead of current Kroll/D&P. Treating a large company that's temporarily small-cap (after a price drop) as a \"small company.\"", "followup": "\"WACC for a private company?\" → Q15 (peers, unlever/relever, add size + liquidity + CRP). \"Has the size premium shrunk?\" → Debated academically post-2000; cite the specific decile and year to stay defensible.", "rf": "Помимо size premium, для РФ применяют liquidity premium по абсолютному рублёвому объёму торгов (не % free float): >1 млрд ₽/день → 0%; 500M-1B → ~1%; 300-500M → ~2%; <300M → 2,5%+. Логика: фонд с позицией $100M выходит из высоколиквидной бумаги за минуты, из низколиквидной — за месяцы. Применяется только к minority-оценкам (контроль нивелирует exit risk). Итог по small-cap РФ легко +5-8pp к CoE.", "terms": ["enterprise value", "cost of equity", "beta", "WACC", "CAPM", "DCF", "ERP", "ABO"]}, {"id": "Q15", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T2", "question": "How do you calculate WACC for a private company?", "spoken": "\"A private company has no observable beta or market cap, so I borrow from public peers and layer on premiums. Step one: select 5-10 public comps with similar operations, pull each one's levered beta, D/E, and tax rate, unlever each via Hamada, take the median asset beta, then relever at the target's capital structure. Step two: cost of equity via modified CAPM — risk-free plus relevered beta times ERP, plus a size premium and a country risk premium. Step three: cost of debt from a synthetic rating — estimate the credit rating from the interest coverage ratio, find the corresponding spread, add it to the risk-free rate, then tax-affect it. Finally weight them by the target capital structure, not the current one if it's distressed or unusual.\"", "formula": "Peers → `βU = βL/(1+(1−t)D/E)` → median → relever to target. `CoE = Rf + βL × ERP + size + CRP`. Synthetic CoD: coverage → rating → spread (e.g. >8x ≈ A, 4-6x ≈ BBB, 2-3x ≈ BB) → `CoD = Rf + spread`, then `× (1−t)`. Use target weights.", "example": "Target D/E = 0,3 (≈23% debt). Peers median βU = 1,0 → relever βL = 1,225. CoE = 4,5% + 1,225 × 6% + 2% size + 3% CRP = 16,85%. Coverage 5x → BBB → spread 4% → CoD 8,5% → after-tax 6,375%. WACC = 0,77 × 16,85% + 0,23 × 6,375% = **14,4%**.", "mistakes": "Using one comp's beta instead of the median of 5-10. Forgetting to unlever/relever — mixing raw levered betas from different structures. Using book D/E instead of market D/E for public comps. Ignoring the illiquidity discount on private-company equity.", "followup": "\"Very early-stage with no comps?\" → VC method uses target returns (30-50%) rather than CAPM-based WACC; CAPM-private works best for mature private companies. \"Why target weights, not current?\" → Current structure may be distressed/transitional and not represent steady-state financing.", "rf": "Three layers stack: unlever 5-10 peers (MOEX + global sector) → relever под target structure → add size 2-5% + liquidity 1-3%. Пример ритейл-цели ~1 млрд ₽ выручки: CoE = ОФЗ 14% + β 1,2 × ERP 7% + 3% size + 2% liquidity ≈ 27,4%. Typical uplift +3-7pp vs public comp.", "terms": ["cost of equity", "country risk", "cost of debt", "risk-free", "beta", "CAPM", "ERP", "SPO"]}, {"id": "Q16", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T2", "question": "Project IRR vs company ROIC vs investor IRR", "spoken": "\"These three metrics answer three different questions and aren't directly comparable. Project IRR asks: is this single, pre-financing investment worth doing? You compare it to WACC. Company ROIC — NOPAT over invested capital, including acquisition goodwill — asks: how well does management deploy all capital? ROIC above WACC means real economic value creation. Investor IRR asks: what does the equity holder actually earn after leverage, entry and exit multiples, timing, and fees? Investor IRR typically exceeds project IRR because leverage magnifies returns — both ways. Smart LPs check ROIC alongside investor IRR specifically to see whether a PE firm creates operational value or is just relying on leverage and multiple expansion.\"", "formula": "Project IRR: NPV = 0 on pre-financing CFs; accept if > WACC. `ROIC = NOPAT / Invested Capital`; create value if > WACC. Investor IRR: equity CFs only, post-leverage and fees. Ordering: project IRR < ROIC < investor IRR (leverage + tax shield).", "example": "PE buys at 8x EBITDA → $800M EV, 60% debt ($480M), equity $320M. Exit at 10x on $120M EBITDA = $1,2B EV; repay $480M → equity $720M → MOIC 2,25x, IRR ≈ **17,6%** over 5 years. If EBITDA grows to $150M: exit $1,5B, equity $1,02B → MOIC 3,2x, IRR ≈ **26%**.", "mistakes": "Comparing project IRR directly to investor IRR (different capital bases). Assuming high investor IRR = good investment — leverage magnifies risk too. Forgetting fees — 2% management fee and 20% carry meaningfully cut LP returns. Project IRR with multiple sign changes → use MIRR/NPV; investor IRR gamed by early subscription-line distributions → cross-check with MOIC.", "followup": "\"Which IRR matters for fundraising?\" → Net investor IRR (target 20%+), but LPs check ROIC for genuine value creation. \"Why does investor IRR exceed project IRR?\" → Leverage and the tax shield on debt.", "rf": "При ключевой ставке ~20% IRR hurdle экстремально высок: PE target 40%+ vs US 20%; spread project-to-investor IRR 10-20pp типичен. Промышленный capex часто NPV-negative при текущих ставках → underinvestment cycle. Пример: цель с ROIC 3-5% без синергий при WACC 16% = value-destroying.", "terms": ["multiple expansion", "exit multiple", "comparable", "tax shield", "goodwill", "leverage", "WACC", "NPV"]}, {"id": "Q17", "block": 1, "block_title": "CORPORATE FINANCE, FINANCIAL MARKETS, PORTFOLIO MANAGEMENT", "tier": "T2", "question": "How does excess cash affect beta?", "spoken": "\"A company's observed equity beta blends the operating business with its cash holdings, and cash is essentially risk-free with a beta of zero, so a large cash balance pulls the observed beta down and makes the stock look less risky than the operations really are. To recover the true operating risk, you divide observed beta by one minus the ratio of excess cash to total value. This matters most for cash-rich companies and whenever you're using peers with different cash levels to derive a target's beta — you adjust every peer to operating beta before taking the median. In M&A specifically, the buyer is purchasing the operating business, not the cash pile, so you use operating beta for the target's WACC.\"", "formula": "`β_observed = (EV_op/EV_total) × β_op + (Cash/EV_total) × 0` → `β_operating = β_observed / (1 − Cash/total value)`. Use excess cash only. Order: cash-adjust first, then unlever for leverage.", "example": "Total value $1B, excess cash $200M, observed βL = 0,8. β_operating = 0,8 / (1 − 0,2) = **1,0**. The operating business carries β = 1,0; the stock merely looks safer because 20% of value sits in cash.", "mistakes": "Ignoring the adjustment for cash-rich peers (tech names). Adjusting for ALL cash rather than excess cash — operating cash (~2-5% of revenue) is needed to run the business. Doing the cash adjustment on an already-unlevered beta — cash-adjust first, then unlever.", "followup": "\"Correct order of beta adjustments?\" → Cash-adjust observed → unlever for leverage → relever at target. \"Why does it matter for a DCF?\" → Without it you understate operating risk and overstate value for cash-rich firms.", "rf": "Применимо к cash-rich РФ-корпорациям, держащим крупные подушки (регуляторный буфер у банков, санкционный хедж/резерв под дивиденды у сырьевых). Поправка β_operating = β_observed / (1 − Cash/EV) повышает операционную бету и CoE; для финансовых компаний «excess cash» плохо определима (cash — часть операционной модели), поправка к ним обычно неприменима.", "terms": ["risk-free", "leverage", "beta", "WACC", "P/E"]}, {"id": "Q71", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "What is Enterprise Value? How do you calculate it?", "spoken": "Enterprise Value is the total value of a company's core operations available to all capital providers — both debt and equity holders — and it's independent of capital structure. You build it from equity value: take diluted market cap, add total debt, subtract cash and equivalents, then add minority interest, preferred stock, unfunded pensions and capitalized operating leases, and subtract non-operating items like equity investments. The intuition is the home-with-mortgage analogy: the true cost of the business equals what you pay equity holders plus the debt you assume minus the cash sitting in the company. EV is the starting anchor of every M&A negotiation — \"acquired for 10x EBITDA\" means EV/EBITDA = 10x.", "formula": "`EV = Equity Value (diluted) + Total Debt − Cash + NCI + Preferred + Unfunded Pensions + Capitalized Op Leases − Equity Investments − Non-operating Assets`; `Net Debt = Total Debt − Cash`", "example": "Share price $25 × 40M diluted shares = Equity $1,000M. Debt $400M, Cash $150M, NCI $30M, Preferred $0. EV = 1,000 + 400 − 150 + 30 = $1,280M. With EBITDA $160M → EV/EBITDA = 8.0x.", "mistakes": "Subtracting all cash instead of excess cash only (operating cash ~2-5% of revenue is arguably not excess). Double-counting leases post-IFRS 16 / ASC 842 — lease liabilities are already in reported debt, so only capitalize manually if using pre-2019 financials. Forgetting NCI when the target consolidates partially-owned subsidiaries.", "followup": "\"Add the $50M operating leases?\" → Post-IFRS 16 they're already in debt; only add if pre-adoption financials. \"Walk me through the EV-to-equity bridge\" → See Q78. \"Where does EV break?\" → Banks/insurance, where debt is operating, not financing.", "rf": "РСБУ-only reporting post-2022 often hides leases and NCI in collapsed line items — reconstruct from IFRS where available. Trapped cash in sanctioned subsidiaries means you should subtract gross debt, not net (the cash isn't truly available), pushing adjusted EV higher than the naive bridge implies.", "terms": ["minority interest", "enterprise value", "equity value", "preferred", "EV/EBITDA", "net debt", "diluted", "EBITDA"]}, {"id": "Q72", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "What is Equity Value?", "spoken": "Equity Value is the value available to common shareholders — share price times diluted shares outstanding. It's the residual claim: after debt, preferred dividends and minority interests are satisfied, whatever remains belongs to common equity. You always use diluted shares, capturing in-the-money options via the treasury stock method, RSUs and convertibles. Equity value pairs with post-debt metrics — P/E, P/BV, P/FCF. Market equity value can never be negative because price × shares is always non-negative, even though book equity can go negative after heavy buybacks or accumulated losses.", "formula": "`Equity Value = Diluted Shares × Price per Share`; diluted shares via TSM, not basic; pairs with P/E, P/BV, P/FCF", "example": "In a board presentation: \"Our DCF implies equity value of $1.2-1.5B, or $30-37 per share. Current price is $28. We recommend proceeding at $35 — a 25% premium.\" That implied share price = Equity Value / diluted shares is the number the CEO acts on.", "mistakes": "Using basic instead of diluted shares — overstates per-share value and the VP catches it in seconds. Confusing book equity (can be negative — McDonald's, Starbucks post-buybacks) with market equity value (cannot be negative).", "followup": "\"Can equity value be negative?\" → Market: no. Book: yes (accumulated losses or buybacks exceed paid-in capital). \"Why diluted not basic?\" → Options/RSUs/convertibles dilute existing holders, so they belong in the per-share denominator.", "rf": "On MOEX, diluted ≈ basic for banks and oil & gas (minimal option programs); the gap matters more for tech (Яндекс, Позитив) with equity comp. Post-2022 ADR/GDR programs were frozen, so market cap reflects MOEX-only float — for an M&A controlling stake you add a control premium of ~25-40% on top of the trading equity value.", "terms": ["minority interest", "treasury stock", "equity value", "convertible", "preferred", "diluted", "P/E"]}, {"id": "Q73", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "Why do you subtract cash from EV?", "spoken": "Cash is subtracted because it's a non-operating asset — it doesn't generate EBITDA, and when you acquire a company you receive its cash, which offsets the purchase price and lowers your net acquisition cost. EV is meant to measure the value of core operations only, so leaving idle cash in would inflate EV/EBITDA for cash-rich companies. The sophisticated refinement is that you subtract excess cash, not total cash — cash above the minimum needed to run day-to-day operations.", "formula": "`Net Debt = Total Debt − Cash`; subtract excess cash only = total cash − operating cash requirement (~2-5% of revenue)", "example": "A company reports $150M cash but needs $30M for working operations → only $120M is truly excess and subtractable. For Apple-scale balances ($5B+), most is excess; pre-2017 some was trapped overseas with repatriation tax, largely resolved by the TCJA.", "mistakes": "Treating all cash as subtractable — restricted cash (escrow, collateral, regulatory minimums) should NOT be subtracted. Subtracting cash for a bank, where cash is an operating asset and subtracting it guts the business value.", "followup": "\"What counts as available cash at closing?\" → The completion-accounts fight: sellers maximize cash (lower net debt = higher equity proceeds), buyers challenge restricted cash, minimum operating cash and trapped foreign cash. \"No-leakage\" provisions in the SPA stop the seller from sweeping cash to the parent pre-close.", "rf": "Cash in sanctioned or foreign subsidiaries is effectively trapped — convertibility and transfer restrictions mean you can't net it against debt, so in РФ deals you often subtract gross debt and treat that cash at a recovery factor below 1.0.", "terms": ["EV/EBITDA", "net debt", "EBITDA", "EBIT", "ABO"]}, {"id": "Q74", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "Why add Minority Interest (NCI) to EV?", "spoken": "When a parent owns more than 50% of a subsidiary it consolidates 100% of that subsidiary's financials, including 100% of its EBITDA — but it doesn't own 100% of the economics. NCI represents the outside shareholders' claim on that subsidiary. You add NCI to EV so the numerator stays consistent with the denominator: if EBITDA reflects 100% of the sub, EV must reflect the value of 100% of it too. Skip this and EV/EBITDA looks artificially low, making a partially-owned conglomerate look cheap when it isn't.", "formula": "Add NCI at fair value (market cap × non-parent % for listed subs; proportional EV for private). Consolidation applies only at >50% ownership; at 20-50% use equity method instead.", "example": "Target owns 70% of a subsidiary generating $50M EBITDA. You consolidate the full $50M into combined EBITDA, so you must add the 30% NCI to EV. If the sub is public, value NCI at 30% × its market cap; if private, at 30% of its estimated EV.", "mistakes": "Using book NCI when fair value is materially higher. Missing a put option on the minority stake — if minorities can force the parent to buy them out, that's a debt-like obligation, not pure NCI. Adding NCI for a 20-50% stake (equity method), where you should instead subtract the equity investment or include proportional EBITDA.", "followup": "\"Parent owns exactly 50%?\" → No consolidation; equity method, 50% of NI sits below the line, exclude from EV/EBITDA. \"Five subs at 51-80%?\" → Value each separately, apply each ownership %, sum the NCI.", "rf": "Holding structures make this acute — АФК Система consolidates МТС, Ozon and Сегежа but owns less than 100% of each, so a sum-of-parts valuation must add NCI at the public subsidiaries' market values, not book. Same logic for Газпром / Газпром нефть.", "terms": ["EV/EBITDA", "EBITDA", "EBIT", "NCI"]}, {"id": "Q75", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "How do convertible bonds affect EV?", "spoken": "It depends on whether the convert is in-the-money. The test is conversion value versus par: stock price × conversion shares against face value. If in-the-money, the bond will likely convert, so you count its shares in diluted equity and remove it from debt. If out-of-the-money, it behaves as a straight bond and stays as debt in the EV calculation. The whole point is to avoid double-counting — the value sits either in equity or in debt, never both.", "formula": "Test: `stock price × conversion shares vs par`. In-the-money → if-converted method (add shares to diluted count, add back after-tax interest to NI). Out-of-the-money → keep as debt in EV. TSM for options: `net shares = Options × (Market − Strike) / Market`.", "example": "Stock at $30, convert strike $25 → in-the-money, treat as equity for the bridge. If it also carries a soft-call at $35 over 20 of 30 trading days, that only affects forced-conversion timing; at $30 vs $25 it's still equity for EV purposes.", "mistakes": "Counting a convert in both debt and diluted shares (double-count). Ignoring call/soft-call provisions that change conversion timing. Treating a deep-in-the-money convert as pure equity while ignoring its remaining time value near the strike.", "followup": "\"Contingent convertibles (CoCos) in bank capital?\" → They convert or write down at a trigger (usually a CET1 threshold); treat as debt for bank EV unless the trigger is imminent.", "rf": "Convertibles are rare on the Russian market and the cross-border issuance channel froze post-2022, so this is mostly a textbook construct here — when it does appear, the if-converted method applies the same way.", "terms": ["diluted"]}, {"id": "Q76", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "EV vs Equity Value multiples — when to use which?", "spoken": "The rule is consistency: the numerator and denominator must be available to the same set of stakeholders. EV multiples — EV/EBITDA, EV/EBIT, EV/Revenue — pair enterprise value with pre-debt metrics that flow to all capital providers, so they're capital-structure-neutral and ideal for comparing companies with different leverage. Equity multiples — P/E, P/BV, P/FCF — pair equity value with post-debt metrics that belong only to shareholders. Never mix levels: EV/NI or P/EBITDA are meaningless. EV/EBITDA is the M&A default because it neutralizes leverage; P/E dominates equity research because analysts care what equity holders actually receive.", "formula": "EBITDA → all capital providers → pair with EV. Net Income → equity only → pair with Equity Value (P/E). FIG → P/E, P/BV, P/PPNR (interest is operating). EV/Revenue → pre-profit or negative-EBITDA companies.", "example": "In a football field, comps show 10-12x EV/EBITDA but P/E implies 18-22x. That's not an error — P/E embeds the target's specific leverage, so a highly levered company shows a higher P/E relative to its EV/EBITDA than an unlevered peer. Leverage magnifies equity returns.", "mistakes": "Using EV/EBITDA for a bank — instant credibility killer, because banks borrow deposits and lend at a spread, so interest is operational; use P/BV (tangible), P/E or P/PPNR. Mixing numerator and denominator levels (EV/NI, P/EBITDA).", "followup": "\"When EV/Revenue?\" → Early-stage tech, biotech, high-growth SaaS, or any company with negative EBITDA where growth matters more than current profit. \"Why does P/E run higher for levered names?\" → It's post-debt, so leverage inflates it relative to capital-structure-neutral EV/EBITDA.", "rf": "Standard framework — no РФ-specific distortion beyond the generic FIG carve-out already covered (Сбер, ВТБ valued on P/BV, not EV/EBITDA).", "terms": ["enterprise value", "equity value", "EV/Revenue", "EV/EBITDA", "leverage", "EBITDA", "EBIT", "P/E"]}, {"id": "Q77", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "Can EV be negative?", "spoken": "Yes — EV goes negative when a company's cash pile exceeds the sum of its equity value, debt, NCI and preferred. You see it in beaten-down biotech (small market cap, large IPO cash) or post-crash tech. It can signal undervaluation, but more often the market is pricing in that the cash will be burned through operating losses, or that shareholders can't extract it. Practically, negative EV makes EV/EBITDA meaningless, so if a comp shows it you exclude that peer and footnote the exclusion rather than letting it distort the median.", "formula": "Negative EV when `Cash > Equity Value + Debt + NCI + Preferred`. Equity = Operations + cash × recovery factor, where recovery < 1.0 if cash isn't distributable.", "example": "Сургутнефтегаз is the canonical case — market cap ~1.5T ₽, debt ≈ 0, cash and financial investments ~6T ₽, so EV is deeply negative. The natural question is why shareholders don't liquidate and take the 6T cash. Five interview points: (1) control vs ownership — free float ~25%, minorities don't control payout; (2) cash ≠ distributable cash — dividends come from РСБУ net income, not the balance-sheet cash pile; (3) governance discount — weak disclosure, no payout visibility; (4) trapped-cash valuation — apply a recovery factor below 1.0; (5) the right frame is three layers — operating business value, non-operating assets discounted for extractability, then a governance haircut.", "mistakes": "Naively computing Market Cap + Debt − Cash and concluding \"the market is wrong by 4x.\" The discipline is to ask who controls the asset, who controls payout, and whether there's any history of shareholder-friendly distribution. Including a negative-EV peer in a comps median.", "followup": "\"Activist angle?\" → Negative-EV names are classic activist targets: buy control, distribute or deploy the cash. \"InterRAO?\" → Same pattern — large cash, concentrated ownership, market disbelieves payout.", "rf": "Concentrated ownership plus weak governance is exactly why negative EV persists in Russia rather than getting arbitraged away — the cash is real but realistically non-distributable to minorities. Сургутнефтегаз and InterRAO are the standing examples (discussion 30.03.2026).", "terms": ["equity value", "preferred", "EV/EBITDA", "EBITDA", "EBIT", "IPO", "NCI"]}, {"id": "Q78", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "Walk me through the EV-to-Equity bridge", "spoken": "The bridge is the step that turns enterprise value into the per-share price a shareholder receives, and it's the most negotiated piece of any deal. Starting from EV — usually the DCF midpoint or comps output — you subtract everything senior to common equity: total debt, unfunded pensions, NCI, preferred and contingent liabilities. Then you add back the non-operating assets: cash net of operating needs, equity-method investments and excess assets. That gives equity value; divide by diluted shares for the implied share price. The bridge is fully reversible — the same line items run the other way from equity value back to EV.", "formula": "`Equity Value = EV − Total Debt − Unfunded Pensions − NCI − Preferred − Contingent Liabilities + Cash + Equity Investments + Non-operating Assets`. Reverse for Equity → EV. Subtract debt-like / senior claims; add non-operating assets.", "example": "```\nEV (from DCF midpoint)                    $1,280M\n− Senior Secured Term Loan                  ($300M)\n− Senior Unsecured Notes                    ($100M)\n− Capital Lease Obligations                  ($30M)\n− Unfunded Pension                           ($20M)\n− Minority Interest (fair value)             ($30M)\n+ Cash & Equivalents                         $150M\n+ Equity Method Investments (fair value)      $50M\n= Equity Value                             $1,000M\n/ Diluted Shares                               40M\n= Implied Share Price                         $25.00\nvs Current Price $22.00 → 13.6% upside\n```", "mistakes": "Forgetting debt-like items — operating leases, unfunded pensions, earnouts (include PV of expected payout), NCI. Missing a $50M pension overstates the price by $1.25 on 40M shares. Using book rather than fair value for NCI and equity investments.", "followup": "\"Where's the negotiation?\" → Every line: \"$10M customer deposit — debt or deferred revenue?\", \"$5M escrow — restricted cash?\" A $20M net-debt swing is $20M off the seller's equity check. As Buffett put it, \"only when the tide goes out do you discover who's been swimming naked\" — the bridge is where hidden leverage surfaces.", "rf": "In completion accounts for Russian deals the recurring fights are trapped cash in subsidiaries, ФНС tax claims and environmental obligations (mining/oil) booked as contingent liabilities. Locked-box vs completion-mechanism are the two ways to fix net debt; with sanctioned subsidiaries you subtract gross debt rather than net.", "terms": ["enterprise value", "equity value", "preferred", "diluted", "DCF", "ERP", "NCI"]}, {"id": "Q83", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "Can Equity Value be negative?", "spoken": "Distinguish market from book. Market equity value cannot be negative — it's price times shares, always non-negative. Book equity value can be negative, after massive buybacks (McDonald's, Starbucks) or accumulated losses at startups. Negative book equity is not a solvency signal as long as the company generates positive free cash flow; conversely, positive book equity doesn't guarantee solvency if cash flows are negative. In bank analysis tangible book equity is the central metric — P/TBV below 1.0x means the market values the bank below liquidation value, as many European banks traded for years after 2008.", "formula": "Market equity = `price × shares ≥ 0` → never negative. Book equity = paid-in capital + retained earnings − treasury stock (buybacks) → can be negative. Bank lens: P/TBV < 1.0x = priced below liquidation value.", "example": "McDonald's carries negative book equity — decades of buybacks pushed treasury stock above paid-in capital plus retained earnings — yet it stays highly solvent on strong, stable free cash flow. The negative line is an artifact of capital returns, not distress.", "mistakes": "Reading negative book equity as insolvency — it isn't if FCF is positive. Conflating book and market equity. Assuming positive book equity proves solvency.", "followup": "\"How can a profitable company have negative book equity?\" → Cumulative buybacks above paid-in capital reduce the equity line while the business stays cash-generative (McDonald's).", "rf": "", "terms": ["treasury stock", "market value", "equity value"]}, {"id": "Q87", "block": 2, "block_title": "ENTERPRISE VALUE / EQUITY VALUE", "tier": "T1", "question": "Preferred stock in EV", "spoken": "Preferred stock is added to EV because it's a claim senior to common equity — it pays fixed dividends like debt but sits in the equity layer structurally, so it's a separate non-common claim the acquirer must cover. You add it at market value if it trades, otherwise at book. The one exception: if the preferred is deeply convertible and in-the-money, treat it as equity in the diluted share count instead of adding it as preferred — adding it both ways double-counts the claim.", "formula": "Add preferred to EV at market (or book if no market); claim ranks above common, below debt. In-the-money convertible preferred → diluted shares, not an EV add-on.", "example": "A VC-backed startup has $100M of liquidation preference and sells for $80M — preferred takes all $80M first and common gets $0. In late-stage M&A always check the liquidation waterfall before assuming any value flows to common.", "mistakes": "Double-counting in-the-money convertible preferred (both as an EV add and in diluted shares). Ignoring liquidation preference and assuming common participates pro-rata in a low-value exit.", "followup": "\"Where is preferred common?\" → Bank capital structures (Tier 1 preferred) and VC-backed cap tables (Series A/B/C). \"Bank Tier 1 preferred?\" → Senior to common, often perpetual; added as preferred unless convertible and triggered.", "rf": "Public preferred shares are a core income product here — Сбербанк-п, Сургутнефтегаз-п, Транснефть-п, Мечел-п — typically non-voting with dividend priority and unusually high yields (Сургут-п runs ~15-25%). Add at market value where one exists; the high yield reflects the РФ income-instrument profile rather than a different claim ranking.", "terms": ["market value", "convertible", "preferred", "diluted", "ABO"]}, {"id": "Q88", "block": 3, "block_title": "FCFF / FCFE (FREE CASH FLOWS)", "tier": "T1", "question": "FCFF vs FCFE: formulas, differences", "spoken": "FCFF is the cash available to all capital providers — both debt and equity — before any debt service. You discount it at WACC to get Enterprise Value. FCFE is the cash left for equity holders only, after interest and net borrowing, discounted at Cost of Equity to get Equity Value directly. The IB standard is FCFF/WACC because it's capital-structure-neutral and works for ~95% of companies. You switch to FCFE only in three cases: banks and FIG, where interest is operating so FCFF is meaningless; real estate with explicit debt modeling; and LBOs, where you care about the equity investor's return. The cardinal trap is mismatching — never discount FCFF at CoE or FCFE at WACC.", "formula": "`FCFF = EBIT(1−t) + D&A − CapEx − ΔWC` → WACC → EV. `FCFE = NI + D&A − CapEx − ΔWC + Net Borrowing` → CoE → Equity Value. Bridge: `FCFE = FCFF − Interest×(1−t) + Net Borrowing`.", "example": "EBIT $2.5B, tax 20%, D&A $500M, CapEx $800M, ΔWC $100M → FCFF = $2.5B × 0.8 + $500M − $800M − $100M = $1.6B. After-tax interest $200M × 0.8 = $160M, net borrowing $0 → FCFE = $1.6B − $160M = $1.44B. FCFF discounted at WACC (~15%), FCFE at CoE (~18%).", "mistakes": "(1) Discounting FCFF at CoE → undervalues; FCFE at WACC → overvalues — this is the #1 DCF error. (2) Forgetting net borrowing in FCFE. (3) Treating interest as operating for a normal corporate (only banks do that).", "followup": "\"Are they mathematically equivalent?\" → Yes, identical if you keep capital-structure assumptions consistent; the choice is about complexity (stable structure → FCFF; changing structure → FCFE is cleaner). \"When start from CFO?\" → `FCFF = CFO + Interest×(1−t) − CapEx`, but check interest classification first.", "rf": "Banks (Сбер, ВТБ) → FCFE/DDM only, since NII is operating. Industrials (ЛУКОЙЛ, Северсталь, Газпром) → FCFF standard. Devs (ПИК, Самолёт) → NAV/land-bank approach. With frequent refinancing and floating-rate debt under a high key rate, FCFF/WACC is more robust than FCFE/CoE. IFRS lets interest sit in CFF, so if you start from CFO under IFRS, interest is already excluded — don't add it back.", "terms": ["enterprise value", "cost of equity", "equity value", "WACC", "FCFF", "FCFE", "EBIT", "ERP"]}, {"id": "Q89", "block": 3, "block_title": "FCFF / FCFE (FREE CASH FLOWS)", "tier": "T1", "question": "FCFF and FCFE from different starting points", "spoken": "You can reach FCFF from four starting points — EBIT, EBITDA, Net Income, or CFO — and they all give the same number; that's the consistency check. From EBIT it's EBIT(1−t) + D&A − CapEx − ΔWC. From NI you add back after-tax interest and non-cash charges. From CFO you add back after-tax interest and subtract CapEx. FCFE is then FCFF minus after-tax interest plus net borrowing. MDs test this for fluency — if I give you NI, you should produce FCFF in about three seconds, because speed signals modeling experience.", "formula": "- FCFF from EBIT: `EBIT(1−t) + D&A − CapEx − ΔWC` (preferred)\n- FCFF from EBITDA: `EBITDA(1−t) + D&A×t − CapEx − ΔWC`\n- FCFF from NI: `NI + Int(1−t) + NCC − CapEx − ΔWC`\n- FCFF from CFO: `CFO + Int(1−t) − CapEx`\n- FCFE shortcut: `FCFE = FCFF − Int(1−t) + Net Borrowing`", "example": "NI $80M, D&A $40M, Interest $20M, tax 25%, CapEx $50M, ΔWC $10M, net new debt $30M. FCFF from NI = $80 + $40 + $20×0.75 − $50 − $10 = $75M. FCFE from NI = $80 + $40 − $50 − $10 + $30 = $90M. Cross-check: FCFE = $75 − $15 + $30 = $90M.", "mistakes": "(1) Double-counting D&A — NI already has the D&A deduction, so you add it back, not subtract again. (2) Forgetting the interest tax shield when starting from NI or CFO. (3) If the four paths disagree, the error is in your adjustments — they must converge.", "followup": "\"Why D&A×t in the EBITDA version?\" → EBITDA(1−t) over-taxes D&A since D&A isn't a cash cost taxed at the operating line; the `+ D&A×t` term restores the depreciation tax shield. \"CFO start under IFRS?\" → check whether interest is in CFO or CFF before adding it back.", "rf": "All paths converge in RU models too; the EBIT(1−t) route is the working standard. Add FX adjustments for exporters and run sanction scenarios on the cash flows rather than reinventing the formula.", "terms": ["preferred", "EBITDA", "FCFF", "FCFE", "EBIT", "ABO"]}, {"id": "Q90", "block": 3, "block_title": "FCFF / FCFE (FREE CASH FLOWS)", "tier": "T1", "question": "Why add back non-cash charges in FCF?", "spoken": "Non-cash charges like D&A, write-downs, and provisions reduce accounting income but never consume cash, so adding them back converts accrual Net Income onto a cash basis — which is what a DCF values. In M&A the buyer goes further and builds \"adjusted FCF,\" stripping out both non-cash and non-recurring items to see the true cash-generating power of the business. The associate's job is to build the FCF bridge and defend every addback with a concrete reason it's genuinely non-recurring.", "formula": "Accrual NI + non-cash charges (D&A, write-downs, provisions, impairments) = cash basis. Common M&A addbacks: one-time restructuring, write-downs, SBC (contested).", "example": "A company books a $50M goodwill impairment — Net Income drops $50M but zero cash leaves, so you add the full $50M back in the FCF bridge. By contrast, SBC is non-cash yet creates real dilution, so the addback is debatable.", "mistakes": "(1) Aggressively adding back SBC overstates FCF — it's a real economic cost via dilution; the majority and correct view is to leave it as a cost (Goldman explicitly treats SBC as a cash expense). (2) Adding back something recurring and calling it one-time. (3) Forgetting that a seller's advisor will present the highest defensible adjusted FCF — pressure-test their addbacks.", "followup": "\"Is SBC a real cost?\" → Yes — it dilutes shareholders, so the defensible treatment is to keep it as an expense, not add it back. \"Why not just use CFO?\" → CFO already adds back non-cash items but mixes in WC and isn't capital-structure-neutral.", "rf": "", "terms": ["DCF"]}, {"id": "Q150", "block": 3, "block_title": "FCFF / FCFE (FREE CASH FLOWS)", "tier": "T1", "question": "What is Unlevered Free Cash Flow (UFCF) and how do you calculate it?", "spoken": "UFCF is the standard DCF input because it's capital-structure-neutral — you can compare companies regardless of how they're financed. \"Unlevered\" means no interest: you tax EBIT, not EBT, so the result is cash available to all capital providers before any financing. You start with EBIT, tax it at the marginal rate to get NOPAT, add back D&A, subtract CapEx, and subtract the increase in net working capital. That's why you discount UFCF at WACC, which blends debt and equity returns. The key sanity check is that growth requires investment — if revenue grows 50% but CapEx is flat, challenge the assumption.", "formula": "`UFCF = EBIT × (1−t) + D&A − CapEx − ΔWC`. Alternatives: `EBITDA × (1−t) + t × D&A − CapEx − ΔWC`; from NI `NI + Interest × (1−t) + D&A − CapEx − ΔWC`. Use the marginal tax rate, not statutory. UFCF = FCFF (same thing).", "example": "EBIT $100M, tax 25%, D&A $30M, CapEx $35M, ΔWC $10M. NOPAT = $100M × 0.75 = $75M. UFCF = $75M + $30M − $35M − $10M = $60M. That $60M is available to service debt, repay principal, and distribute to equity.", "mistakes": "(1) Starting from NI and forgetting to add back after-tax interest. (2) Using the statutory rate instead of marginal. (3) Forgetting ΔWC — growing companies consume working capital, which lowers UFCF. (4) Leaving non-operating items (FX gains, investment income) in EBIT — strip them out first.", "followup": "\"UFCF vs LFCF?\" → Q151. \"Why discount at WACC?\" → because UFCF accrues to all providers, so the rate must blend their required returns. \"Should SBC reduce UFCF?\" → Yes, majority/correct view; it's a real dilution cost (Goldman excludes it — minority position).", "rf": "Standard EBIT(1−t) build for Сбер/Яндекс/ЛУКОЙЛ-type DCFs. Two local adjustments: CapEx inflation of 20–30% post-2022 from import substitution, and FX-sensitive receivables making ΔWC material for exporters.", "terms": ["working capital", "EBITDA", "UFCF", "WACC", "FCFF", "EBIT", "DCF", "NCI"]}, {"id": "Q151", "block": 3, "block_title": "FCFF / FCFE (FREE CASH FLOWS)", "tier": "T1", "question": "What is Levered Free Cash Flow (LFCF)?", "spoken": "LFCF deducts interest and debt service, so what's left is equity's cash, and you discount it at Cost of Equity — not WACC — to get Equity Value directly. You start from Net Income, which is already after interest and tax, add back D&A, subtract CapEx and ΔWC, then subtract mandatory debt amortization, since that cash legally must go to lenders. The result flows to equity as dividends, buybacks, or retained cash. You use LFCF when capital structure is stable and explicit: banks, where interest is the business; real estate project finance; and LBO equity returns.", "formula": "`LFCF = NI + D&A − CapEx − ΔWC − Mandatory Debt Repayment`. Equivalent: `LFCF = UFCF − Interest(1−t) − Principal + New Debt`. LFCF = FCFE. Discount at CoE → Equity Value.", "example": "NI $50M, D&A $30M, CapEx $35M, ΔWC $5M, mandatory repay $20M. LFCF = $50M + $30M − $35M − $5M − $20M = $20M — the true cash available for equity distributions beyond maintenance.", "mistakes": "(1) Discounting LFCF at WACC — it must be CoE. (2) Forgetting mandatory debt repayment. (3) Using LFCF for cross-company comparison — capital-structure differences distort it; that's what UFCF is for.", "followup": "\"LBO use?\" → LFCF drives delevering speed; it cascades to mandatory amort, cash sweep, then revolver — leftover is excess cash, and the PE model is essentially a 5-year LFCF forecast. \"No-debt company?\" → UFCF = LFCF, since there's no interest or repayment.", "rf": "Rarely applied directly — it needs a stable capital structure. For banks (Сбер) the practical substitute is a dividend discount model; for ЛУКОЙЛ/Газпром UFCF is standard. A deleveraging growth-equity story is the occasional valid LFCF case.", "terms": ["cost of equity", "amortization", "equity value", "LFCF", "UFCF", "WACC", "FCFE", "LBO"]}, {"id": "Q174", "block": 3, "block_title": "FCFF / FCFE (FREE CASH FLOWS)", "tier": "T2", "question": "Unlevered vs levered cash flows — mechanical deep dive", "spoken": "Mechanically, UFCF taxes EBIT with no interest deduction, while LFCF starts from Net Income where interest is already deducted. The interest tax shield is captured in different places: in the UFCF/WACC method it lives in the WACC denominator; in the LFCF/CoE method it lives in the cash flows. The two routes give the same Equity Value if your capital-structure assumptions are consistent — UFCF/WACC gives EV and you subtract net debt, whereas LFCF/CoE gives equity directly. In standard IB advisory you always use UFCF/WACC and switch to LFCF/CoE only for banks, REITs, and LBO equity analysis.", "formula": "Bridge: `LFCF = UFCF − Interest×(1−t) − Mandatory Debt Repayment + New Debt`. Reverse: `UFCF = LFCF + Interest×(1−t) + Debt Repay − New Debt`. UFCF/WACC → EV − net debt = Equity; LFCF/CoE → Equity directly.", "example": "UFCF $100M, interest $30M, tax 25%, debt repay $15M, new debt $0. LFCF = $100M − $30M × 0.75 − $15M = $100M − $22.5M − $15M = $62.5M. UFCF is higher because it's pre-financing; LFCF is what equity keeps after debt is s
