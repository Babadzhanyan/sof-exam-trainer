"spoken": "\"Match the discount rate to the cash flow. If you're discounting unlevered free cash flow (FCFF), which is pre-debt and capital-structure-neutral, you use WACC and you get Enterprise Value, then bridge to equity by subtracting net debt. If you're discounting levered free cash flow (FCFE) or dividends — flows that already belong to equity holders — you use cost of equity and you get Equity Value directly. For banks, interest is operational, so you work on the equity side with CoE through DDM or the ROE-versus-CoE excess. And if there's no debt, WACC equals CoE.\"", "formula": "- FCFF → WACC → EV → (− net debt) → Equity\n- FCFE / dividends → CoE → Equity Value directly\n- No debt ⇒ WACC = CoE\n- WACC breaks when capital structure changes (LBO) → use APV; WACC can never be below cost of debt", "example": "Decision tree — FCFF (unlevered) → WACC → EV; FCFE (levered) → CoE → Equity; dividends → CoE → Equity; banks/FIG → CoE (interest operational); LBO → track equity IRR explicitly rather than a single WACC.", "mistakes": "Discounting FCFF with CoE (or FCFE with WACC) — the classic mismatch the MD spot-checks (\"why did you use CoE on this FCFF?\"). Currency mismatch — discount RUB cash flows with a RUB rate, USD with USD. Using IRR on non-conventional cash flows with multiple sign changes (multiple solutions) — use MIRR or NPV.", "followup": "\"Banks/insurance specifically?\" → CoE via DDM or ROE−CoE excess (equity modelling). \"Corporates?\" → WACC + UFCF is standard IB for 95%+ of cases.", "rf": "Same logic — Лукойл/Газпром run WACC/UFCF → EV; Сбер/ВТБ run CoE/DDM because debt is operational. The currency match matters more here: keep RUB cash flows on a RUB rate and USD on USD throughout.", "terms": ["enterprise value", "cost of equity", "cost of debt", "equity value", "net debt", "WACC", "FCFF", "FCFE"]}, {"id": "Q141", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Walk me through a DCF", "spoken": "\"A DCF values a company off its own cash flows in seven steps. First, I project Unlevered Free Cash Flow for 5-10 years — revenue, margins, D&A, CapEx, change in working capital. Second, I calculate WACC: CAPM for cost of equity, after-tax yield for cost of debt, market-value weights. Third, I estimate Terminal Value two ways — Gordon Growth and an exit EBITDA multiple — and cross-check them. Fourth, I discount the explicit FCFs and the TV back to today at WACC, using mid-year convention. Fifth, I sum them to Enterprise Value. Sixth, I bridge EV to Equity Value — subtract net debt, NCI and preferred, add non-operating assets. Seventh, I divide by diluted shares for the implied price. Then I sanity-check: does the implied EV/EBITDA match comps? If implied is 20x but comps trade at 10x, my assumptions are too aggressive.\"", "formula": "`EV = Σ UFCF_t / (1+WACC)^t + TV / (1+WACC)^N`; `Equity = EV − net debt − NCI − preferred + non-op assets`; TV should be 60-80% of total EV.", "example": "Mid-cap industrial: UFCF Y1-5 = 43 / 52 / 62 / 73 / 78. WACC 10%, terminal g 2.5%. TV Gordon = 78 × 1.025 / (0.10 − 0.025) = $1,067M; TV exit (8x × $155M EBITDA) = $1,240M → average $1,153M. PV of FCFs (mid-year) ≈ $260M; PV of TV ≈ $749M → EV ≈ $1,009M (TV = 74% of total). Less net debt $250M and NCI $15M → Equity $744M / 50M shares = $14.88 vs $12.50 market = ~19% upside.", "mistakes": "Treating the output as truth — \"$14.88 so it's undervalued.\" Always answer with a sensitivity range (at 11% WACC / 2% g it may be $11.50 → overvalued). Forgetting the EV-to-equity bridge. TV >90% of EV. Sudden CapEx/D&A jump in the terminal year instead of a smooth glide path.", "followup": "\"Is it undervalued?\" → \"On base-case assumptions yes, but here's the WACC × g sensitivity table.\" \"When does DCF break?\" → Pre-revenue / early-stage with no positive FCF — use revenue multiples or the VC method instead. \"What does the VP check?\" → TV %, implied multiple, terminal g ≤ GDP, smooth revenue fade, CapEx ≈ D&A in terminal year.", "rf": "Для рублёвого target: WACC 18-22% (CoE via CAPM + after-tax CoD), terminal g 3-4%, mid-year convention. Currency match обязателен — RUB cash flows только с RUB WACC. Sensitivity WACC × g — mandatory output.", "terms": ["enterprise value", "working capital", "cost of equity", "terminal value", "cost of debt", "equity value", "EV/EBITDA", "preferred"]}, {"id": "Q144", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Mid-year convention", "spoken": "\"Standard DCF discounts each cash flow as if it arrives on December 31st, but cash actually comes in throughout the year. Mid-year convention fixes this by discounting at t − 0.5 instead of t — so the first year's flow is discounted at 0.5, the second at 1.5, and so on. It raises the valuation by roughly 3-5% because cash arrives sooner in present-value terms. It's the industry default and it's the more economically realistic, slightly conservative position. The exception is highly seasonal or lumpy businesses — there I'd discount quarterly on actual cash-flow timing instead.\"", "formula": "`PV = CF / (1+WACC)^(t−0.5)`; uplift vs year-end ≈ +3-5%.", "example": "Single $100 flow at 10%. Year-end: $100 / 1.10^1 = $90.9. Mid-year: $100 / 1.10^0.5 = $95.3 → +4.8%.", "mistakes": "Applying mid-year to a retailer with Q4-concentrated cash (use quarterly timing). Calling the +3-5% \"aggressive\" — it reflects economic reality, so it's the conservative read. Mixing conventions between the explicit period and the TV discount.", "followup": "\"Conservative or aggressive?\" → \"Conservative — cash is received throughout the year, not on Dec 31.\" \"When is it wrong?\" → Seasonal / lumpy cash flows; switch to quarterly discounting.", "rf": "Для retail (X5, Магнит) mid-year не подходит — Q4 даёт непропорциональную долю годовой EBITDA, нужен quarterly. Для стабильных кэш-флоу (Сбер, Лукойл) +3-5% применимо.", "terms": ["mid-year", "WACC", "DCF"]}, {"id": "Q142", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Terminal Value: Gordon Growth vs Exit Multiple", "spoken": "\"There are two ways to compute terminal value. Gordon Growth treats the terminal year as a growing perpetuity — it's derived from first principles, internally consistent, and needs no external data. Exit Multiple applies a current comp multiple to terminal-year EBITDA — it's market-grounded but it bakes in today's pricing. Best practice is to calculate both and cross-check. If Gordon gives $1B and the exit multiple gives $1.4B, the multiple is implying a higher growth rate than my explicit terminal g — I'd back out that implied growth and see if it's defensible. If the two methods diverge by more than ~20%, the model has an internal inconsistency I need to fix before it goes to the client.\"", "formula": "Gordon: `TV = FCF_(N+1) / (WACC − g)` where FCF_(N+1) is the first year AFTER the projection period, not the terminal year itself. Exit: `TV = terminal EBITDA × exit multiple`. Implied growth from an exit multiple: `g = WACC − (FCF_(N+1) / TV)`.", "example": "TV = $2,000M, FCF in the year after the last projected year = $130M, WACC = 10% → implied g = 10% − (130 / 2,000) = 10% − 6.5% = 3.5%. Then sanity-check: is 3.5% above long-term GDP for this business? If yes, the exit multiple is too high.", "mistakes": "Using FCF of the terminal year (not N+1) in the Gordon numerator. Assuming multiple expansion without justification — multiples should compress over time as growth exhausts and the business commoditizes. Letting Gordon and Exit diverge >20% and presenting anyway.", "followup": "\"Exit multiple is 10x but comps trade at 8x — why?\" → Either you're assuming expansion (justify it) or terminal EBITDA is understated. \"Which dominates the DCF?\" → TV is typically 60-80% of output, so terminal assumptions swamp the explicit period (Damodaran's standard framing).", "rf": "В волатильном EM мало оснований для стабильных долгосрочных growth-допущений, поэтому exit multiple часто предпочтительнее Gordon. При WACC 15-20% чувствительность TV к terminal g ниже, чем в US: +1% g даёт ~+10-15% TV, а не +30-40%.", "terms": ["terminal value", "exit multiple", "perpetuity", "EBITDA", "Gordon", "WACC", "EBIT", "ERP"]}, {"id": "Q143", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Terminal growth rate", "spoken": "\"The hard ceiling on terminal growth is long-term nominal GDP of the economy where the company operates — because a higher rate means the company eventually consumes the entire economy, which is impossible. For the US and EU that's 2-3% (real GDP plus inflation); for emerging markets with 5-6% nominal GDP, 4% can be justified. The other rule is that terminal g must always be below WACC, or the perpetuity formula breaks. So the real fight in a DCF should be about the projection-period assumptions, not the terminal rate — I'd default to GDP-anchored 2-3% in developed markets and move on.\"", "formula": "Constraints: `g_terminal ≤ nominal GDP` and `g_terminal < WACC`. Developed markets 2-3%; EM up to 4% (nominal GDP 5-6%). Commodities: real terminal growth = 0, so nominal = inflation only.", "example": "\"If you use 4% terminal growth for a widget maker, you're saying it'll be bigger than Apple in 50 years — defend that.\" For an asset-light EM platform, 4% nominal can hold: that's roughly China real GDP (~2-3%) plus inflation (~2%), which sits as the ceiling for mature commodity-adjacent platforms in EM context.", "mistakes": "Using developed-market 2-3% on a Russia/China DCF — inflation alone adds 2-3pp. Setting terminal g above WACC (formula blows up). Applying a positive real terminal growth to a pure commodity (fertilizers, metals, O&G) — real growth there is 0 without CapEx.", "followup": "\"What about a fertilizer producer?\" → Real terminal growth 0, nominal = inflation only. \"Why not just use 4% everywhere?\" → It implies the firm outgrows the economy; only EM nominal GDP justifies it.", "rf": "Номинальный рост ВВП РФ ~5-6% (реальный 2-3% + инфляция 3-4%), поэтому terminal g для рублёвого DCF = 3-4% максимум. При WACC 15-20% разница между 3% и 4% terminal growth даёт всего ~5-10% разницы в TV — меньше, чем в западных моделях.", "terms": ["perpetuity", "WACC", "DCF", "ERP", "ABO"]}, {"id": "Q147", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Gordon vs Exit Multiple — when each?", "spoken": "\"I use Gordon Growth when I trust my long-term growth and return assumptions and want a theory-driven, internally consistent number that needs no market data — it's the natural choice for stable businesses or when there are no clean public comps to anchor a multiple. I use the Exit Multiple when I want the terminal value grounded in observable current pricing — good for sectors with deep comps. In practice I run both as mutual sanity-checks, not alternatives. If they diverge by more than ~20%, that's a signal: usually the exit multiple is too high or the terminal g is too generous, and I fix it before presenting.\"", "formula": "Gordon — theory-driven, no comps needed, sensitive to g. Exit Multiple — market-driven, needs a defensible comp set. Divergence >20% = internal inconsistency to resolve.", "example": "MD pitch line: \"Gordon implies $16/share, the exit multiple implies $18, convergence around $17.\" If instead Gordon says $14 and the multiple says $19, you don't average — you find which input is wrong.", "mistakes": "Treating the two as interchangeable rather than as cross-checks. Defaulting to Exit Multiple in a sector with no real comps (no anchor). Ignoring a >20% gap.", "followup": "\"No public comps exist — what do you do?\" → Gordon is the only option, but the growth and discount rate must be very defensible. \"They diverge 30% — which do you trust?\" → Investigate the driver; don't blend.", "rf": "Post-2022 comp sets сузились, поэтому Exit Multiple имеет слабую anchor. Практика 2024-2026: приоритет Gordon для consumer/industrial со стабильными CF, Exit Multiple — для export commodities, где есть сделки.", "terms": ["terminal value", "exit multiple", "Gordon"]}, {"id": "Q146", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Common DCF mistakes", "spoken": "\"The classic DCF errors fall into a few buckets. On the discount rate: setting terminal g above WACC, using book-value weights instead of market value, or holding WACC flat when leverage is changing. On the cash flows: mixing unlevered FCF with cost of equity, or growing revenue while holding costs and CapEx flat. On the bridge: forgetting to subtract net debt to get from EV to equity. And on discipline: no mid-year convention, and no sanity check against comps at the end. My rule is that every single line has to be defended — that's what separates a rigorous DCF from a mechanical one.\"", "formula": "Must-avoid list: (1) terminal g > WACC; (2) UFCF discounted at CoE (mismatch); (3) book-value WACC weights; (4) missing net-debt bridge; (5) flat margins under high growth; (6) CapEx not scaled to growth; (7) flat WACC through deleveraging; (8) no sensitivity / no comps sanity check.", "example": "", "mistakes": "Currency mismatch — discounting RUB or local-currency cash flows at a USD WACC produces garbage. Double-counting country risk (embedded in the local risk-free rate and added again as CRP).", "followup": "\"Most common single error?\" → Terminal g above GDP, closely followed by the EV-to-equity bridge being skipped. \"How do you catch them?\" → The VP's checklist: TV %, implied multiple, terminal g ≤ GDP, smooth fade, CapEx ≈ D&A, sensitivity table.", "rf": "Специфика РФ: (1) mixing RUB cash flow с USD WACC, (2) terminal g > nominal GDP 5-7%, (3) игнор санкционного сценария, (4) flat WACC при ожидаемом снижении ключевой ставки, (5) double-count CRP (заложен в ОФЗ-доходность и добавлен сверху).", "terms": ["cost of equity", "market value", "sensitivity", "net debt", "mid-year", "leverage", "UFCF", "WACC"]}, {"id": "Q170", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "How to sanity-check a DCF?", "spoken": "\"I run a ten-point checklist before any DCF goes out — it takes two minutes and saves the MD's time. Is terminal value 60-80% of total, with anything over 90% a red flag? Is the implied exit multiple in line with current comps? Is terminal growth at or below nominal GDP? Does revenue growth fade smoothly to the terminal rate with no cliff? Do margins converge to industry levels? Is CapEx roughly equal to D&A in the terminal year? Is ROIC above WACC, so we're creating value not destroying it? Is terminal FCF positive? Is the implied share price inside the comps range on the football field? And finally, a reverse DCF — do the assumptions the current price implies actually make sense? A junior builds the model and presents the number; a senior runs these five-to-ten checks first.\"", "formula": "10-point check — TV % (60-80%); implied exit multiple vs comps; terminal g ≤ nominal GDP; smooth fade; margins converge; CapEx ≈ D&A; ROIC > WACC; terminal FCF > 0; implied price vs comps; reverse DCF.", "example": "", "mistakes": "Applying the 60-80% TV rule to finite-life assets (mines, concessions, patents) where there is no terminal value — 100% of value comes from the explicit period. Presenting the number without running the checks at all.", "followup": "\"Reverse DCF — what is it?\" → Back out the growth/margin the current price implies and test plausibility. \"TV is 92% of value — problem?\" → Yes, projection period is too short or terminal assumptions too rich; extend the horizon.", "rf": "Проверки против MOEX-пиров: implied EV/EBITDA vs сектор (ориентиры зависят от индустрии и периода), implied P/E vs peers, TV < ~75% от EV, implied g < рублёвый nominal GDP 5-7%, Gordon vs Exit convergence <20%.", "terms": ["terminal value", "exit multiple", "WACC", "DCF", "ABO"]}, {"id": "Q145", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Sensitivity analysis in DCF", "spoken": "\"Sensitivity analysis is bread-and-butter in a DCF — a single-point value is never the answer. I build a two-way data table, usually WACC against terminal growth, sometimes growth against margin, with the base case in the center and cells shaded relative to the current price. It shows the client how resilient the output is to input uncertainty and exactly where the risk sits. Standard pitch-book practice is base case plus a bull case at roughly +20% on assumptions and a bear at −20%. If a client asks 'what if WACC is 100bps higher,' I need that answer instantly — not having sensitivity is a junior-analyst tell.\"", "formula": "2-way data table: WACC × terminal g (or growth × margin). Realistic input ranges: WACC ±1.0-1.5%, g ±0.5-1%. Report base / bull (+20%) / bear (−20%) and the implied-price range.", "example": "Base case (10% WACC, 2.5% g) → $16.90 vs $12.50 market = ~35% upside. Bear case (11% WACC, 1.5% g) → $12.00 = ~4% downside. The grid turns one number into a defensible range.", "mistakes": "Not centering the table on the base case. Using unrealistically wide WACC ranges (±5% is noise; ±1-2% is real). Doing only WACC × growth and skipping price × synergies on M&A deals — for a deal those matter equally.", "followup": "\"What's a football field?\" → A bar chart laying DCF, comps and precedent ranges side by side. \"Why not Monte Carlo?\" → Better for correlated inputs but rarely done in banking; a 2-way table ignores that WACC and growth often move together.", "rf": "2-way grid WACC 18-25% × terminal g 2-4%, плюс CRP-сценарии и FX-сценарии. Сценарий снижения ключевой ставки (например 20% → 15%) разумно держать как base case на 2026-2027.", "terms": ["sensitivity", "WACC", "DCF"]}, {"id": "Q172", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "If WACC drops from 10% to 8%, how much does value change?", "spoken": "\"Because terminal value is FCF over WACC minus g, and that denominator is tiny — five to seven percent — small moves in WACC create huge swings in value. Dropping WACC from 10% to 8% with 3% growth moves the denominator from 7% to 5%, and value jumps about 40%. This is the single most impactful variable in any DCF, and it's the whole story of the 2020-2023 cycle: when the risk-free rate fell to ~1.5%, WACC dropped 200-300bps and tech multiples doubled; when it rose to ~4.5% in 2022-2023, WACC rose and those same multiples halved — same companies, same cash flows, different discount rate. As Buffett put it, interest rates are to asset prices what gravity is to the apple.\"", "formula": "`TV = FCF / (WACC − g)`; a ~2pp WACC move shifts value ~30-50%. Value sensitivity to WACC scales with cash-flow duration (growth dependency).", "example": "TV = $100M / (10% − 3%) = $1,429M; at 8% → $100M / (8% − 3%) = $2,000M = +40%. SaaS, UFCF $50M, g 3%: WACC 12% → $556M (11x EBITDA); 10% → $714M (14x); 8% → $1,000M (20x). The 12%→8% move nearly doubles value — that's the 2019-2023 rate story in one line.", "mistakes": "Not showing WACC sensitivity at all. Carrying a historical WACC from a low-rate period into a current valuation. Not understanding the 2022 tech crash was almost entirely a WACC story, not an earnings story.", "followup": "\"When is WACC sensitivity low?\" → Short-duration cash flows (profitable today, not reliant on future growth) — duration equals growth dependency. \"M&A implication?\" → Low rates give sellers premium valuations; rising rates hand leverage to buyers.", "rf": "При WACC 18-22% абсолютная чувствительность к 1pp ниже, чем в DM (база выше), но чувствительность к CRP значительно выше — санкционные шоки двигают оценку резче, чем сдвиг безрисковой ставки. WACC × g matrix обязательна в presentation.", "terms": ["terminal value", "sensitivity", "risk-free", "WACC", "DCF", "ABO"]}, {"id": "Q138", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "Sensitivity analysis in valuation", "spoken": "\"Single-point estimates are dangerous, so sensitivity is how I show the range and identify which assumption actually drives value. I pick the two most impactful inputs — WACC × terminal growth for a DCF, or EV/EBITDA × margin for comps — build a five-by-five matrix, highlight the base case in the center, and shade green above the current price and red below. Then I report the min-max range. If a 1% WACC change moves value 20% but a 1% growth change moves it 5%, then WACC is the critical risk and that's where diligence should focus. For M&A I add a second table — price against synergies — because that pair matters just as much as WACC and growth.\"", "formula": "Two-input data table, base case centered, conditional shading vs market price. Realistic ranges: WACC ±1-2% (not ±5%); g ±0.5-1%. Report explicit min-max.", "example": "DCF grid: base case $15.80 at 10% WACC / 2.5% g; full range across the table $11.40-$22.80. That ~2x spread itself is the insight — it tells the client the value is highly assumption-sensitive.", "mistakes": "Not centering on the base case. Unrealistically wide ranges (±5% WACC is too much). Doing only WACC × growth — for deals, price × synergies is equally important. Every cell green usually means the base case is too aggressive.", "followup": "\"Football field chart?\" → Side-by-side bars of DCF / comps / precedent ranges. \"Why not tornado or Monte Carlo?\" → Tornado charts ignore input correlations; Monte Carlo handles them but is rarely done in banking.", "rf": "Для рублёвого DCF разумные диапазоны: WACC 18-25%, terminal g 2-4%; добавляй CRP- и FX-сценарии. Сетку центрируй на base case с ожидаемым снижением ставки.", "terms": ["sensitivity", "synergies", "EV/EBITDA", "EBITDA", "WACC", "EBIT", "DCF", "ABO"]}, {"id": "Q131", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What is a DDM (Dividend Discount Model)?", "spoken": "\"A Dividend Discount Model values equity directly as the present value of expected future dividends — for constant growth it collapses to the Gordon form, value equals next year's dividend over cost of equity minus growth. It's the primary method for banks, because 'free cash flow' is hard to define when interest is operational, and it suits utilities and REITs that pay out most of earnings. The critical input is the sustainable payout ratio: a well-capitalized bank with CET1 above 12% can pay out 50-70% of net income, while one rebuilding capital pays 20-30%. That payout assumption drives the whole valuation — a 10% change in payout can swing equity value by 20%. I'd always run DDM as a sanity check alongside a DCF, never as the sole method.\"", "formula": "`V = D1 / (CoE − g)` (Gordon); multi-stage = explicit dividend growth 5-10 years then a terminal perpetuity. CET1 = Common Equity Tier 1 / RWA; higher CET1 supports a higher sustainable payout.", "example": "Bank with D1 = $3.00/share, CoE = 11%, g = 4% → V = $3.00 / (0.11 − 0.04) = $42.86/share. Tighten payout (and thus D1) by 10% and equity value moves ~20%.", "mistakes": "Applying DDM to a growth company that retains earnings, a startup with no dividend history, or a cyclical with volatile payout — it breaks in all three. Applying standard EV/EBITDA or DCF to a bank — for banks debt is raw material, not financing, so use DDM, P/TBV or residual income.", "followup": "\"Why DDM for utilities?\" → Regulated tariffs give stable revenue, high payout (60-80%), low growth (~inflation) and predictable cash flow. \"Where does DDM break?\" → Non-payers / retained-earnings compounders — use FCFE or a full DCF.", "rf": "DDM применим к Россетям, ФСК, Мосэнерго, но тарифное регулирование добавляет regulatory risk. Для банков payout привязан к CET1: Сбер (~15% CET1) держит ~50% payout; банк в фазе наращивания капитала может платить ноль.", "terms": ["cost of equity", "equity value", "perpetuity", "Gordon", "REIT", "DCF", "ERP", "DDM"]}, {"id": "Q175", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "How do you project operating metrics in a DCF?", "spoken": "\"The operating model translates the business story into numbers, and every line needs a defensible driver — 'revenue grows 10%' is not an answer. For revenue I go bottom-up: units times price, customers times ARPU, or segments times growth, anchored to management guidance for years one and two and fading to GDP. Costs are COGS as a percent of revenue to a gross-margin target, SG&A split fixed plus variable, R&D as a percent. D&A comes off the PP&E schedule, working capital off DSO, DIO and DPO, and CapEx splits into maintenance — roughly equal to D&A — plus growth tied to revenue. The test is that if a VP asks how I got year-three revenue, I can name the customer adds, the ARPU path and the retention rate, not just quote a growth percentage.\"", "formula": "Revenue drivers: top-down (TAM × share) or bottom-up (units × ASP / customers × ARPU). `D&A` off gross PP&E, not net (net hits zero while assets still run). Terminal: `CapEx = D&A + (g × (PP&E / Revenue) × Terminal Revenue)`.", "example": "SaaS Y1: 500 customers × $200K ARPU × 110% NRR = $110M, plus 50 new × $200K = $10M → $120M revenue. COGS 22% (78% gross margin), SG&A $40M fixed + 10% variable = $52M, R&D $15M → EBITDA ≈ $26.6M. Tax-affect, less CapEx $8M, less ΔWC $3M, plus D&A $5M → UFCF ≈ $14M.", "mistakes": "A single growth rate with no bottom-up support. Growing revenue while holding costs flat. Not linking CapEx to revenue growth (more revenue needs more investment). Computing D&A off net PP&E instead of gross. Straight-lining a cyclical business instead of modeling the cycle.", "followup": "\"How did you get year-three revenue?\" → \"40 net new customers as the market saturates, ARPU $200K→$215K on price and upsell, 108% NRR — about 12% growth, down from 15%.\" \"Terminal CapEx by sector?\" → Utilities ~1.2-1.5× D&A; tech/SaaS < D&A; mining ~1.5-2×; retail = D&A + new stores; O&G ~1.3-1.8×; development >> D&A.", "rf": "Drivers по индустриям: units × price для retail (X5), subscribers × ARPU для телеком (МТС). Санкционное импортозамещение поднимает CapEx-интенсивность на ~20-30%. Cyclicality: commodities, девелопмент, авто, банки — циклические (нормализуй EBITDA, бери mid-cycle margins); utilities, staples, телеком — защитные.", "terms": ["working capital"]}, {"id": "Q153", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "How do you calculate WACC for a DCF?", "spoken": "\"WACC blends the cost of every capital source, weighted by market-value proportions, with the after-tax adjustment on debt capturing the interest tax shield. The DCF-specific rules: I use the target capital structure, not necessarily today's; market-value weights — current market cap for equity, face value for investment-grade debt; cost of equity from CAPM, that's risk-free plus beta times ERP plus size and country premia; pre-tax cost of debt from the yield on existing bonds or a synthetic rating; and the marginal tax rate, not the effective, so I capture the full shield. The one big caveat — if leverage is going to change materially over the forecast, a single WACC is wrong and I'd switch to APV.\"", "formula": "`WACC = E/V × CoE + D/V × CoD × (1 − t)`, market-value weights, marginal tax rate. `CoE = Rf + β × ERP + size premium + CRP`. UFCF → WACC; LFCF → CoE. Changing leverage → use APV.", "example": "Target structure 70% equity / 30% debt. CoE = 4% + 1.2 × 6% + 0.8% = 12%. Pre-tax CoD = 6%, tax 25%. WACC = 70% × 12% + 30% × 6% × 0.75 = 8.4% + 1.35% = 9.75%. Cross-check: sits between after-tax CoD (4.5%) and CoE (12%) — sensible.", "mistakes": "Book-value weights (overstates debt). Using a target's current (temporary) leverage instead of the acquirer's target structure for an M&A DCF. Effective tax rate instead of marginal. One flat WACC for an LBO whose leverage declines every year.", "followup": "\"Where do the target weights come from?\" → Comps median, optimal-leverage analysis, or the company's own stated long-term target. \"Discount rate must match what?\" → The cash flows — currency and levered/unlevered both have to line up.", "rf": "CoE через CAPM (Rf + β × ERP + CRP), CoD pre-tax из доходности облигаций, налог 20% statutory, weights — target structure. Обновлять WACC ежеквартально при сдвигах ставок: на апрель 2026 ключевая 20%, ожидаемое снижение в 2026-2027 → WACC compression.", "terms": ["cost of equity", "cost of debt", "tax shield", "risk-free", "leverage", "UFCF", "LFCF", "beta"]}, {"id": "Q176", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "How do you model synergies in a DCF?", "spoken": "\"In an M&A DCF, synergies are what justify the premium, but they're uncertain, so I model them as a separate layer and always show the output both with and without. I quantify gross cost and revenue synergies, then haircut — cost synergies to roughly 70-80% realization, revenue to 30-50% because they rarely fully materialize. I phase them in over three years, tax-affect them for UFCF, and subtract one-time integration costs in the first year or two. Then I present it cleanly: standalone DCF, the PV of net synergies on top, and the integration drag — so the board sees that the synergy value has to exceed the premium we're paying for the deal to create value.\"", "formula": "Net cost synergy = gross × ~75%; net revenue synergy = gross × ~40%. Phase Y1 30% / Y2 70% / Y3 100%. Tax-affect: `× (1 − t)`. Present standalone DCF + PV(net synergies) − PV(integration costs).", "example": "Cost synergies $40M × 75% = $30M; revenue $20M × 40% = $8M; total $38M. Phase Y1 $11.4M, Y2 $26.6M, Y3 $38M. Tax-affect at 25% → $28.5M annual UFCF. PV as a perpetuity from Y3 at 9% / 2.5% g = $28.5M / (0.09 − 0.025) = $438M. Less integration costs Y1-2 ($60M, PV ≈ $55M) → net synergy value ≈ $383M.", "mistakes": "Using the seller's gross synergies without a haircut. Assuming 100% realization on day one instead of phasing. Not showing the \"without synergies\" DCF — the board needs standalone value as the floor. Forgetting integration costs.", "followup": "\"Sell-side claims $80M, you have $38M net — so?\" → \"That gap is the negotiation; present your independent analysis, don't take their number.\" \"Hostile deal?\" → Larger haircuts: cost ~50-60% (vs 75% friendly), revenue ~20-30% (vs 40%) with no management cooperation in DD.", "rf": "Cost synergies (например консолидация HQ в retail) — haircut 20-30% на execution risk; revenue synergies — ~50% haircut. PV синергий часто составляет 30-50% уплаченной премии. Уход иностранцев после 2022 (Carlsberg, Danone, IKEA) = quasi-hostile, кооперация менеджмента ≈ 0 → применяй hostile-хейркаты даже при формально согласованной сделке.", "terms": ["synergies", "UFCF", "DCF"]}, {"id": "Q177", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What are the pros and cons of DCF?", "spoken": "\"DCF is the gold standard because it's intrinsic and company-specific — it values a business off its own fundamentals, not what the market says today or what someone paid last year, and it's theoretically the cleanest, present value of future cash flows. But the cons are real: it's highly assumption-sensitive — a 1% change in WACC or growth can swing value 30%-plus — 60-80% of the value sits in an unmeasurable terminal value, it depends on projection quality that may be biased, and unlike comps there's no market price to validate it. That's why I never present a DCF alone — I always triangulate with comps and precedent transactions on a football field. The output should be a range, low-base-high with driver sensitivities, not a single false-precise number.\"", "formula": "Pros — intrinsic, company-specific, scenario-flexible, theory-sound. Cons — assumption-sensitive (±1% WACC/g → ±30%), TV dominance (60-80% of EV), needs quality projections, not market-observable. Always cross-check: DCF + comps + precedent = football field.", "example": "Same company, three defensible assumption sets: (A) WACC 9% / g 2.5% → $1.8B; (B) WACC 10% / g 2% → $1.3B; (C) WACC 8% / g 3% → $2.5B. Range $1.3-2.5B, nearly a 2x spread on judgment calls alone — which is exactly why DCF can't stand on its own.", "mistakes": "Presenting a single value with no range (Graham: \"intellectually dishonest\"). Claiming DCF is \"the most accurate\" — it's the most theoretically grounded, not the most precise. Not disclosing the key assumptions.", "followup": "\"If it's so uncertain, why do it?\" → It forces explicit thinking about the business, gives a sentiment-independent reference, reveals which assumptions matter, and is required in fairness opinions. \"Early-stage company?\" → DCF is nearly useless; use milestone-based / probability-weighted valuation, recent comparable rounds, or real-option pricing.", "rf": "Плюсы и минусы те же; в РФ TV обычно 50-75% EV. Best practice — триангуляция с Comps + Precedent; single-method valuation = junior mistake. Для early-stage без кэш-флоу — milestone-based (probability-weighted раунды) вместо DCF.", "terms": ["terminal value", "precedent", "WACC", "DCF"]}, {"id": "Q178", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Walk through Comparable Company Analysis", "spoken": "\"Trading comps tell you what the public market pays today for similar businesses — it's a market-based, relative method, fast to run, but it does NOT include a control premium. Five steps. First, I select 5-10 comparable public companies by industry, size, growth, margins, and geography. Second, I gather their financials — LTM and NTM revenue, EBITDA, net income — and build EV and equity value for each. Third, I calculate the multiples: EV/EBITDA, EV/Revenue, P/E at minimum. Fourth, I compute the median and the 25th-75th percentile range. Fifth, I apply that range to my target's metrics to get an implied valuation range. The discipline that matters most is consistency — same adjustments across every comp: SBC treatment, lease capitalization, calendarization. Consistency beats precision.\"", "formula": "`Implied EV = peer median EV/EBITDA × target EBITDA`; must-state: same adjustments across all comps; report median + 25th-75th range, not mean.", "example": "Peer median NTM EV/EBITDA = 10x; target NTM EBITDA $150M → implied EV $1.5B. If the client trades at 8x vs peers at 10x, the story is the gap: margins 200bps below median and growth 3% vs 7% — that explanation is the value the associate adds, not just pulling numbers.", "mistakes": "Including a comp that just announced a deal (its price embeds a takeover premium — exclude or use undisturbed price); comping a mature industrial against high-growth tech; handling negative-EBITDA comps in EV/EBITDA (exclude there, keep in EV/Revenue).", "followup": "\"Comp with negative EBITDA?\" → drop from EV/EBITDA, keep in EV/Revenue. \"When are comps misleading?\" → when the peer set differs fundamentally on growth/margin or is at a different point in the cycle.", "rf": "Peer sets thin — often only 4-6 public peers per sector (food retail: X5, Магнит, Лента, О'Кей; oil & gas: Лукойл, Роснефть, Газпром нефть, Татнефть; banks: Сбер, ВТБ, Т-Банк, МКБ). Standard fix: augment with global peers at a 30-50% jurisdictional discount.", "terms": ["control premium", "equity value", "comparable", "EV/Revenue", "EV/EBITDA", "EBITDA", "EBIT", "P/E"]}, {"id": "Q179", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Why is EV/EBITDA the most used multiple?", "spoken": "\"EV/EBITDA is the workhorse multiple because it's capital-structure-neutral. EV captures debt plus equity, and EBITDA is pre-interest, so the two are consistent — debt in the numerator is offset by the interest it removes from the denominator. That lets me compare companies with different leverage on equal footing, and EBITDA also strips out D&A policy differences and tax-jurisdiction differences. That's exactly why it's the default in M&A advisory. The two limitations: it breaks for banks, where interest income IS the operation rather than financing, and it ignores CapEx intensity — two firms with identical EBITDA but very different CapEx are not worth the same.\"", "formula": "`EV = Market Cap + Total Debt − Cash + Preferred + Minority Interest`; `EV/EBITDA`. For capital-intensive sectors pair with `EV/(EBITDA − CapEx)`.", "example": "A 10x EV/EBITDA on an airline and a 10x on software are completely different economics — the airline's CapEx swallows most of EBITDA, the software firm's doesn't. That's why you cross-check with EV/(EBITDA − CapEx) for heavy-CapEx names.", "mistakes": "Applying EV/EBITDA to banks/insurers (no clean EBITDA — switch to P/E, P/TBV); treating EV/EBITDA as if it captured CapEx burden; ignoring the EBITDA−CapEx adjustment for capital-intensive businesses.", "followup": "\"Why not P/E?\" → P/E embeds each company's specific leverage and tax rate, so cross-company comparison is weaker. \"When do you abandon EV/EBITDA?\" → financials (banks, insurance) — use P/E and P/TBV.", "rf": "", "terms": ["minority interest", "preferred", "EV/EBITDA", "leverage", "EBITDA", "EBIT", "NCI"]}, {"id": "Q180", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Walk through Precedent Transaction Analysis", "spoken": "\"Precedent transactions tell you what acquirers have actually paid for similar companies — real M&A prices, which means they INCLUDE a control premium. That's why precedent multiples run typically 20-40% above trading comps; the gap IS the control premium. Five steps. First, I find 5-10 relevant deals in the sector over the last 24-36 months. Second, I gather deal data — EV, target EBITDA, the EV/EBITDA and EV/Revenue multiples, and the premium to the pre-deal price. Third, I filter out special situations: distressed sales, tax-driven deals, related-party transactions. Fourth, I take the median and the range. Fifth, I apply it to my target's EBITDA for an implied value. The non-negotiable is vintage — I always specify the year, because a 2021 deal in a zero-rate world tells you nothing in 2026.\"", "formula": "`Implied EV = precedent median EV/EBITDA × target EBITDA`; precedent ≈ trading × (1 + control premium). Filter out distressed / tax-driven / related-party deals; always state vintage.", "example": "Key exclusions to name out loud — (a) tax-driven deal: buying a loss-maker purely to use its NOLs, or a corporate inversion; (b) related-party deal: parent buys its own subsidiary, price not arm's length; (c) distressed sale: forced/bankruptcy exit at 20-50% below fair value. Each distorts the multiple and must be excluded or flagged.", "mistakes": "Using deals over 36 months old as if current; failing to strip distressed or related-party deals; not weighting recent deals more heavily; presenting bubble-era (2021) multiples to a buyer who will instantly dismiss them.", "followup": "\"Where do you source deals?\" → Mergermarket, Bloomberg (MA function), Capital IQ, FactSet, PitchBook; free: SEC EDGAR (S-4, 8-K). \"Why higher than comps?\" → control premium (Q181).", "rf": "Post-2022 data is scarce and contaminated by forced foreign-owner exits (negative premiums). Sources: SPARK-Interfax, Ведомости / Коммерсантъ M&A digests. Normalize for forced-sale bias before taking a median.", "terms": ["control premium", "EV/Revenue", "EV/EBITDA", "precedent", "EBITDA", "EBIT", "ABO"]}, {"id": "Q181", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Why are precedent multiples higher than trading comps?", "spoken": "\"Because precedent multiples include a control premium — typically 20-40% — and trading comps don't. In an acquisition the buyer is paying for the right to control strategy, cash flows, CapEx, and distribution decisions; a minority shareholder on an exchange has none of that, so the market price sits at a minority discount to intrinsic control value. The premium has four sources: synergies the market isn't pricing in, control rights, strategic fit, and auction dynamics when bidders compete. In a fairness opinion I present trading and precedent separately and show the implied control premium between them — I never blend the two without adjustment.\"", "formula": "`Precedent EV/EBITDA ≈ Trading EV/EBITDA × (1 + control premium)`; `control premium = precedent / trading − 1`. Present both separately; never blend.", "example": "Trading comps 10x and a 30% control premium → precedent ≈ 13x. MD challenge: \"Trading is 8x, precedent is 12x — why the gap?\" Answer: recent strategic deals captured a large share of available synergies plus control value, which the market doesn't pay for a minority stake.", "mistakes": "Blending trading and precedent into one median; assuming you can accumulate free float to control WITHOUT paying a premium — in practice no, because disclosure thresholds (US 13D at 5%) reveal you, liquidity dries up as you buy, and the decisive last shares become extremely expensive; stealth accumulation works for activist influence (<5% then a 13D), not for full control transfer.", "followup": "\"Can you back into control without a premium?\" → effectively no; real control transfer needs a tender offer at a premium. \"Premium vs synergies?\" → premium should not exceed synergies shared with the target, else the buyer destroys value.", "rf": "Control premium for РФ direct-control deals runs 25-35% (vs global 20-40%) — X5 paid roughly 25% over peer trading for consolidation deals. Post-2022 forced foreign-owner exits invert the sign: a negative premium, i.e. a 30-50% discount to fair value.", "terms": ["fairness opinion", "control premium", "synergies", "EV/EBITDA", "precedent", "EBITDA", "EBIT"]}, {"id": "Q183", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Comps vs precedent transactions — when do you use each?", "spoken": "\"They answer two different questions. Comps tell me what a passive minority investor would pay today; precedent tells me what acquirers actually paid for control. The spread between them is the control premium. I use comps when I want the current market view, a valuation floor, or the sector has many liquid public peers. I use precedent when I'm pricing a deal, testing the fairness of an offer, or benchmarking control premiums. In practice I always present both — the difference IS the story. On a sell-side I anchor on precedent because it's higher; on a buy-side I argue comps.\"", "formula": "comps = minority/market value (floor); precedent = control value (ceiling); gap = control premium. Critical rule: DCF terminal value uses TRADING comps, never precedent.", "example": "Target: comps median 9.0x → EV $900M; precedent median 11.5x → EV $1.15B; implied control premium ≈ 28%. Sell-side pitch \"$1.1-1.2B\" on precedent; buy-side counter \"$850-950M\" on comps. For a DCF terminal value you use the 9x, not 11.5x — the going-concern assumption doesn't include a control premium, and precedent would double-count it.", "mistakes": "Using precedent for a DCF terminal multiple (double-counts the control premium — an MD catches this instantly); presenting comps as a ceiling (comps are the floor, precedent the ceiling); mixing strategic and financial-buyer precedent without flagging the distinction; using 5-year-old precedent unadjusted.", "followup": "\"Which multiple for DCF terminal value?\" → trading comps — conservative, market-based, no embedded control premium; PE funds use trading comps for LBO exit multiples even though they sell with control. \"What sizes the premium?\" → buyer type (Q184): strategic 25-35%, financial/PE 15-25%, hostile/contested 40-60%. Strategic buyer = \"1+1=3\" synergy logic; financial buyer = disciplined to a hurdle rate, value from operational improvement + leverage; hostile buyer overpays for an irreplaceable strategic asset.", "rf": "", "terms": ["control premium", "terminal value", "market value", "precedent", "DCF"]}, {"id": "Q184", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "How do you calculate a control premium?", "spoken": "\"Control premium is the offer price over the unaffected price, minus one. The unaffected — or undisturbed — price is the target's share price BEFORE any deal rumors or run-up, and the standard base is the price 30 days before the formal announcement. The reason for the 30-day lookback is that leaks typically start one-to-four weeks ahead of the announcement — insider trading, regulatory filings, unusual options activity — so the day-before price is already inflated and understates the true premium. I always compute the 1-day, 1-week, and 4-week premiums side by side to reveal how much leakage there was, and I quote the 4-week number as the reliable one. Typical ranges: 25-35% strategic, 15-25% financial, 40-60% hostile.\"", "formula": "`Control premium = Offer Price / Unaffected Price − 1`; unaffected = closing price 30 days pre-announcement. Market-adjusted version: `adjusted price = price₋₃₀ × (1 + β × S&P 30d return)`.", "example": "Offer $55. Unaffected (30 days pre) $42 → 31% premium (the true control premium). 1-week pre $46 → 20%. 1-day pre $48 → 15%. The 1-day looks low only because the market had already priced in the leak; fairness opinions quote the 30-day number. If the S&P fell 10% over the window with β=1.2, the market-adjusted unaffected price is $42 × 0.88 = $36.96, lifting the premium to ~49% — disclose this whenever the index moved >5%.", "mistakes": "Using the 1-day premium when there is clear leak evidence (volume spike, run-up, rumors); not adjusting for broad market moves over the lookback window; comparing premiums across bull vs bear markets without context; treating \"unaffected\" and \"undisturbed\" as different things (same concept).", "followup": "\"Stock already ran 50% on rumors?\" → use VWAP or 60-day unaffected, or exclude the rumor period explicitly. \"Premium vs synergies?\" → premium ≤ synergies shared with the target, else the buyer destroys value. \"Why are bull-market premiums higher than bear-market?\" → more buyers and cheap capital create bidding wars; in bear markets fewer buyers and disciplined boards compress the median premium.", "rf": "", "terms": ["control premium", "NCI"]}, {"id": "Q185", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "How do you select peers for a comps set?", "spoken": "\"The peer set IS the valuation, so I treat selection as the analysis, not a preliminary step. I start from the target's GICS/SIC code to get a universe of 20-50 names, then filter in a strict hierarchy: same sub-sector first — enterprise SaaS is not consumer mobile — then size within roughly 0.5-2x revenue, then a similar growth profile within about five points, then comparable gross and EBITDA margins, then geography if the risk profile differs. I land on 6-12 peers and I can defend every single inclusion and exclusion with two or three specific reasons, because the other side will always challenge the set. Then I run a robustness test — drop any one peer and the median shouldn't move more than about 5%.\"", "formula": "Filter hierarchy: sub-sector → size (0.5-2x revenue) → growth (±5pp) → margin → geography. Target 6-12 peers. Robustness: dropping any single peer shifts median ≤5%.", "example": "Target $200M-revenue enterprise SaaS, 25% growth, 15% EBITDA margin. Universe 45 → sub-sector (enterprise) 22 → size ($100-400M) 14 → growth (15-35%) 10 → margin (>5%) 8. Each defended in one line: \"Company X — same sub-sector, $180M revenue, 22% growth, 12% margin.\" Discipline (per Ackman): have someone neutral pick the set first, then analyze — objectivity beats picking peers to fit your thesis.", "mistakes": "Including a name because it's well-known rather than comparable; too few peers (≤3 is statistically meaningless); no documented reason for each inclusion/exclusion; cherry-picking convenience peers that drag the median toward the answer you want.", "followup": "\"Only 3-4 public peers?\" → expand to adjacent sectors or CIS geography with explicit disclosure; never report <3. \"A peer 10x larger?\" → exclude or note the size premium. \"Weighting old vs recent deals?\" → weight recent more heavily; a 2024 deal reflects current conditions better than a 2021 bubble deal.", "rf": "Size premium is material — small-cap (MOEX <$500M) trades a 20-30% discount to large-cap (>$5B) in the same sector (e.g., Лента vs X5), driven by liquidity, analyst coverage, and institutional demand. When peers are scarce, include international names discounted by the Russia country-risk premium of roughly 5-8%.", "terms": ["comparable", "EBITDA", "EBIT", "ERP", "ABO"]}, {"id": "Q186", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What are the most commonly used multiples by sector?", "spoken": "\"The principle is to use the multiple that captures the economic driver of value in that sector, because GAAP/IFRS accounting distorts the picture differently in each industry. EV/EBITDA is the universal default — capital-structure-neutral, pre-tax, operationally focused. But several sectors need their own native metric. Banks use P/TBV and P/E because they have no EBITDA — interest income IS the operation, not financing. REITs use P/FFO because mandatory depreciation on buildings that actually appreciate is an accounting fiction. SaaS uses EV/ARR to capture the recurring revenue base. Airlines use EV/EBITDAR to neutralize own-versus-lease decisions. Oil & gas E&P uses EV/proved reserves because reserves are the inventory of future production. Match the multiple to the value driver and you sound like an industry analyst; use the wrong one and you sound like an outsider.\"", "formula": "Defaults — Banks `P/TBV`, `P/E`; REITs `P/FFO`, `P/NAV`; SaaS `EV/ARR`, `EV/NTM Rev`; Airlines `EV/EBITDAR`; O&G E&P `EV/proved reserves`, `EV/EBITDAX`; Telecom `EV/subscriber`; Mining `EV/NAV`. Key metric definitions: `FFO = Net Income + D&A − gains on property sales`; `EBITDAX = EBITDA + Exploration`; `EBITDAR = EBITDA + Rent`; `ARR` = normalized annual recurring revenue.", "example": "A bank at P/TBV 1.5x with 15% ROE implies P/E ≈ 10x — that reconciliation lets a European seller (talks P/TBV) and an Asian buyer (wants P/E) see the same deal. For an airline, adding rent back via EBITDAR puts an owner of aircraft and a lessee on the same footing (less critical post-IFRS 16, but still referenced).", "mistakes": "EV/EBITDA on a bank (no EBITDA concept); P/E on a high-growth loss-maker (E is negative — use EV/Revenue); mixing primary and secondary multiples in one comp table; forgetting sector adjustments (EBITDAR airlines, FFO REITs).", "followup": "\"EV/EBIT vs EV/EBITDA?\" → EBIT captures D&A burden, useful for heavy-CapEx; EBITDA neutralizes depreciation policy. \"Conglomerate with several segments?\" → no single multiple fits; use SOTP with segment-appropriate multiples.", "rf": "Approximate Apr 2026 levels — Banks P/BV 0.3-1.0x (Сбер 0.8-1.0x at ~18-22% ROE, ВТБ 0.3-0.4x); O&G E&P EV/EBITDA 3-4x and EV/proved reserves ~$4-8/boe (windfall tax since 2023 compressed margins, ~60% discount to ExxonMobil/Shell); Mining EV/EBITDA 4-6x (Полюс, Норникель cleaner on gold/PGM); Tech/SaaS EV/Revenue 4-8x (Positive Technologies, Астра — the one premium sector on the import-substitution story); Retail EV/EBITDA 5-7x (LFL + traffic + ticket as drivers); Telecom EV/EBITDA 4-6x; Development P/NAV 0.6-1.2x (RNAV preferred over DCF because of escrow under ФЗ-214). Aggregate discount to developed markets 30-50%, driven by country-risk premium, MOEX illiquidity (10-25% float), and regulatory uncertainty.", "terms": ["depreciation", "EV/EBITDA", "EBITDA", "REIT", "EBIT", "P/E", "FFO", "NCI"]}, {"id": "Q187", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "When should you use EV/Revenue instead of EV/EBITDA?", "spoken": "\"I use EV/Revenue when EBITDA is negative or close to meaningless — pre-profit growth companies, early-stage SaaS or biotech, turnarounds — because revenue is the only income-statement metric that's still positive and usable. I'll also use it when margins are changing fast, say a company at 5% margin today on a clear path to 25%, where current EBITDA understates the business. But it's a blunt instrument: it says nothing about profitability. So I never present it alone — I pair it with gross margin, the Rule of 40, a path-to-profitability timeline, and unit economics like LTV/CAC. A 15x-revenue company at 80% gross margin is a completely different animal from 15x at 30%.\"", "formula": "Use `EV/Revenue` when EBITDA < 0 or margins are rapidly rising. Always supplement with gross margin, `Rule of 40 = revenue growth % + EBITDA margin %`, LTV/CAC.", "example": "SaaS: revenue $100M growing 45%, EBITDA −$20M, EV $1.5B → EV/Revenue 15x (in range for 45% growth), EV/EBITDA meaningless. Rule of 40 = 45 + (−20) = 25, below 40. Justification of the 15x: at 75-80% gross margin and 45% growth, the company reaches profitability in ~2 years; at a steady-state 25% EBITDA margin, the implied EV/EBITDA on Year-3 earnings is ~12x — reasonable for growth software.", "mistakes": "Using EV/Revenue on a mature profitable company where EV/EBITDA is available; not supplementing with margin analysis; comparing EV/Revenue across companies with very different gross margins.", "followup": "\"Pre-revenue biotech?\" → even EV/Revenue fails; use rNPV (risk-adjusted NPV of pipeline) or recent funding-round benchmarks. \"What is the Rule of 40?\" → growth % + margin % should clear 40 for a healthy software business.", "rf": "Озон trades EV/Sales ~0.8-1.5x — but with thin retail-like margins it's closer to e-commerce than SaaS, so EV/Gross Profit is the better lens. Profitable high-growth tech (Positive Technologies) carries EV/Revenue 6-10x. Discount to developed-market tech peers 40-60% on sanctions, country risk, and MOEX liquidity.", "terms": ["EV/Revenue", "EBITDA", "EBIT", "ABO"]}, {"id": "Q189", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What are the key adjustments you make when running comps?", "spoken": "\"The governing principle is consistency — whatever convention I pick, I apply it to every comp, because an unadjusted set has a meaningless median. There are seven mandatory adjustments. First, calendarize to the same period when fiscal year-ends differ. Second, strip non-recurring items — restructuring, litigation, impairments — consistently across all comps. Third, handle SBC by one convention: the SaaS convention includes it as a real cost, the industrials convention excludes it as non-cash; pick one. Fourth, post-IFRS 16 use EV/EBITDA, not EV/EBITDAR, because operating leases are now capitalized. Fifth, pro-forma any recent large acquisition. Sixth, use the same net-debt definition — leases, pensions, minority, preferred — across the set. Seventh, use diluted shares via the treasury stock method. Consistency matters more than the specific choice.\"", "formula": "Seven adjustments: (1) calendarization, (2) strip non-recurring, (3) SBC — one convention, (4) leases — EV/EBITDA post-IFRS 16, (5) pro-forma recent M&A, (6) uniform net-debt definition, (7) diluted shares via TSM. Test for \"non-recurring\": would it recur in a normal year?", "example": "Comp reports EBITDA $200M including a $30M restructuring charge and $15M litigation, with $20M SBC. Adjusted (strip non-recurring) = $245M. Under \"include SBC\" (SaaS) it stays $245M; under \"exclude SBC\" (industrial) it's $225M. At 10x that's $2.45B vs $2.25B — a $200M swing from one convention choice. That's why mixing conventions across comps turns the median into noise.", "mistakes": "Inconsistent SBC treatment across peers (the #1 rookie error); calling something \"non-recurring\" when it happens annually; reported share counts instead of TSM-diluted; still using EV/EBITDAR post-IFRS 16 (double-counts rent); not pro-forming recent M&A; mixing US GAAP and IFRS without normalizing.", "followup": "\"Comp that just closed a big acquisition?\" → pro-forma as if the deal closed at period start. \"Different accounting standards across comps?\" → normalize to one standard and disclose.", "rf": "FY-end is December for most РФ publics (Сбер, Газпром, Яндекс, X5, Магнит), so intra-РФ calendarization is usually unnecessary — but it's mandatory when adding international peers (Japan/India March, Australia June). Post-2022 non-recurring items to strip: windfall tax (one-off since 2023), FX gains/losses on FX-denominated debt, sanctions-related impairments, foreign-exit one-offs. SBC is rarely material (small ESOPs) — include by default. РСБУ EBITDA is not comparable to IFRS EBITDA — convert or exclude РСБУ-only comps. IFRS 16 applies since 2019, so leases are capitalized — use EV/EBITDA.", "terms": ["treasury stock", "EV/EBITDA", "preferred", "diluted", "EBITDA", "EBIT", "NCI"]}, {"id": "Q190", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "How do you handle outliers in a comps set?", "spoken": "\"I never silently drop an outlier — that's intellectual dishonesty and the other side will catch it. I investigate first: is it a data error, a recent acquisition, a genuinely different business model, or distress? If there's a legitimate reason to exclude, I do it with explicit disclosure in a footnote. Then I rely on the median, which is robust to outliers, rather than the mean, and I present the 25th-75th percentile range. I'll also show the sensitivity with and without the outlier so the reader sees the impact. And if more than a couple of my peers are 'outliers,' the problem isn't the outliers — it's my peer selection, and I redefine the set.\"", "formula": "Outlier flag: `> Q3 + 1.5×IQR` or `< Q1 − 1.5×IQR`. Report median + 25th-75th range, not mean. Exclude only with disclosure; show sensitivity both ways.", "example": "8 comps: 8x, 9x, 9x, 10x, 10x, 11x, 12x, 28x. Mean 12.1x (distorted), median 10.0x, IQR 9-11.5x. Investigation: the 28x name just announced an AI pivot and the stock doubled, so its NTM estimates are unreliable. Decision: exclude with a footnote, final range 9-12x, median 10x.", "mistakes": "Silently removing outliers; using mean instead of median on a skewed set; excluding a comp only because it hurts the thesis (cherry-picking); treating 3+ outliers out of 8 as an outlier problem rather than a peer-selection problem.", "followup": "\"Half the comps are outliers?\" → the peer set is wrong, re-select. \"Mean or median for comps?\" → median, always.", "rf": "Specific outlier sources to normalize — windfall-tax lumpiness (Газпром pays a large one-off in one year, zero the next), sanctions-related impairments, FX revaluation swings on FX debt (USD/RUB 70→120→90), and technical squeezes on low-free-float names (<10% float on MOEX). With small peer sets (often 4-6), the classic 1.5×IQR rule is too aggressive — use a 2×IQR threshold or investigate each point manually.", "terms": ["sensitivity"]}, {"id": "Q191", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "LTM vs NTM multiples — when to use each?", "spoken": "\"NTM multiples use next-twelve-months consensus, so they bake in expected growth — a 30%-grower has a much higher NTM EBITDA, which makes its NTM multiple look lower. LTM uses the last twelve months of actual reported results, so there's no estimate risk but it's backward-looking and misses inflection points. I use NTM for growth stories and forward-looking framing, LTM for stable or declining businesses and for creditor analysis. In practice I present both, because the spread tells the story: if NTM is well below LTM, the market is paying for growth; if they're close, the company is mature. The one rule is never to mix them in the same comp table.\"", "formula": "`LTM EV/EBITDA = EV / last-12m EBITDA`; `NTM EV/EBITDA = EV / next-12m consensus EBITDA`. NTM < LTM signals expected growth. Never mix LTM and NTM across a comp table.", "example": "LTM EBITDA $100M, NTM $130M (30% growth), EV $1.2B → LTM 12.0x, NTM 9.2x. The 12x looks expensive until you see the growth; the 9.2x reframes it as \"cheap for a 30% compounder.\" In LBOs, PE firms use LTM for the entry multiple — they pay for what exists; in a growth-equity pitch you lead with NTM.", "mistakes": "Comparing one comp's NTM to another's LTM; using NTM where consensus has only two analysts (unreliable); not stating which one you're using.", "followup": "\"Calendarized vs rolling NTM?\" → calendarized = a specific calendar year; rolling = next 12 months from today. \"Effect on DCF terminal value?\" → the terminal multiple type should match the comps convention you used. \"Distressed company?\" → neither works; use normalized or mid-cycle EBITDA.", "rf": "", "terms": ["EV/EBITDA", "EBITDA", "EBIT"]}, {"id": "Q198", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "What are the weaknesses of precedent transaction analysis?", "spoken": "\"Five weaknesses. First, staleness — every precedent happened in a specific market context, so a 2021 deal at 15x reflects zero rates and is misleading in a higher-rate 2024. Second, unique circumstances — seller distress, a bidding war, a strategic premium, or a tax-driven structure can each distort a single deal. Third, different market conditions — the rate environment, credit availability, and equity sentiment all shift over time. Fourth, a limited universe — often only five to eight truly comparable deals. Fifth, information gaps — private deal terms like earnouts, escrows, and working-capital adjustments are usually undisclosed. I mitigate by always noting vintage, separating recent from old deals, and triangulating with comps and DCF. Precedent alone is never enough.\"", "formula": "Five weaknesses: staleness, unique circumstances, market-condition drift, limited universe, information gaps. Mitigation: note vintage, split \"all deals\" vs \"last 2 years,\" triangulate with comps + DCF.", "example": "A 2021 SaaS deal at 18x NTM revenue in a zero-rate world vs a 2025 comparable trading at 8x — technically correct, practically misleading. Caveat required: \"executed in a low-rate environment; on current conditions the implied multiple would be lower.\" Be ready for the buyer's rebuttal: \"strip the three 2021 deals and the median drops from 12x to 9x\" — so present both cuts.", "mistakes": "Using precedent >5 years old without adjustment; including distressed sales that unfairly depress multiples; not noting deal context (was it a bidding war?); presenting one blended median that hides bubble-era deals.", "followup": "\"Adjust for market conditions?\" → apply multiple compression/expansion for the rate change, or weight recent deals. \"No precedent at all (new sector)?\" → build from comps + DCF and use analogous-sector precedent with heavy caveats.", "rf": "", "terms": ["comparable", "precedent", "DCF"]}, {"id": "Q206", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "What is normalization and how do you do it consistently?", "spoken": "\"Normalization strips one-time items out of reported EBITDA so the multiple reflects sustainable operating performance — restructuring, litigation, impairments, transaction costs on the add-back side, and one-time gains like asset sales or insurance recoveries on the subtraction side. The test for each item is simple: would it recur in a normal year? If yes, it's not non-recurring and I leave it in. The critical discipline is consistency — whatever I strip for one comp, I strip for all, and every adjustment goes into a normalization log with a one-line justification. On a sell-side I'll adopt management's add-backs for the target but scrub the comps to the same standard; on buy-side DD I rebuild from scratch and ask how much of the 'adjusted EBITDA' is real.\"", "formula": "`Normalized EBITDA = Reported EBITDA + non-recurring charges − non-recurring gains`. Test: recurs in a normal year? Apply identically across all comps; keep a normalization log.", "example": "Reported EBITDA $300M; +$20M restructuring (one-time plant closure), +$10M litigation, −$15M insurance recovery (hurricane) → normalized $315M. At 10x that's $3.15B vs $3.0B unadjusted — a $150M swing from normalization alone. Counter-example: Macy's reports \"restructuring charges\" almost every year from store closures — that's the cost of shrinking a footprint, NOT one-time, so stripping it artificially inflates EBITDA.", "mistakes": "Stripping \"restructuring\" from a company that restructures every year; adding back SBC for one comp but not others; not documenting the logic; treating recurring integration costs at a serial acquirer as one-time.", "followup": "\"How do credit agreements define EBITDA?\" → more permissive than normalized — they allow extra add-backs (run-rate synergies, pro-forma cost savings). \"Highly acquisitive company?\" → if it does several deals a year, integration costs are part of the business model — keep them.", "rf": "For cyclical names (Северсталь, НЛМК, ММК) EBITDA can swing ~2x peak-to-trough, so normalize through mid-cycle EBITDA and a mid-cycle multiple rather than peak or trough. Illustratively: peak $3B × 5x = $15B vs trough $1.5B × 3x = $4.5B vs mid-cycle $2.25B × 4x = $9B. Peak multiples on peak earnings are the classic overvaluation trap.", "terms": ["EBITDA", "EBIT"]}, {"id": "Q207", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What are the key industry-specific multiples and why?", "spoken": "\"The right multiple removes the industry's accounting noise and focuses on the real economic driver. REITs depreciate buildings that actually appreciate, so GAAP earnings understate cash generation — you use P/FFO. A bank's 'revenue' is net interest income, not comparable to industrial revenue, so you use P/TBV and P/E because the balance sheet IS the business. SaaS uses EV/ARR because the recurring stream is the asset and profit lags scale. Oil & gas E&P uses EV/proved reserves because reserves are the inventory of future production. Airlines use EV/EBITDAR to neutralize lease decisions, telecom uses EV/subscriber, mining uses EV/NAV. Pick the wrong multiple and you produce false precision.\"", "formula": "`FFO = Net Income + D&A on RE − gains on property sales`; banks `P/TBV` (TBV = tangible equity at work); O&G `EV/proved reserves`, `EV/EBITDAX`; airlines `EV/EBITDAR`; mining `EV/NAV` (NAV = PV of mine-life cash flows); insurance `P/BV`; infrastructure `EV/EBITDA`, `P/AFFO`.", "example": "O&G E&P with 500M barrels of proved reserves; peers at $12-15/proved barrel → EV $6.0-7.5B. Cross-check: EBITDAX $2B at 4-5x → $8-10B. The reserve approach is lower because it excludes probable/possible reserves and operational optionality — present both and explain the gap. Cross-border reconciliation: P/TBV 1.5x ↔ P/E 10x at 15% ROE lets a European seller and an Asian buyer talk the same number.", "mistakes": "Not knowing ANY sector-specific multiple (instant credibility loss); using the wrong multiple for the sector being discussed; reciting the metric without understanding WHY the sector uses it.", "followup": "\"When NOT to use EV/EBITDA?\" → financials (banks, insurance) where interest is operational, not financing. \"Value a bank in detail?\" → dividend discount or residual-income model, not EV/EBITDA. \"Conglomerate?\" → SOTP with segment-appropriate multiples.", "rf": "", "terms": ["comparable", "EV/EBITDA", "EBITDA", "REIT", "AFFO", "EBIT", "P/E", "NOI"]}, {"id": "Q119", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Pros and cons of Comparable Company Analysis", "spoken": "\"The pros: it's market-based, fast, and grounded in real observable prices rather than assumptions — which is exactly why it's the universal sanity check on a DCF. The cons: it carries no control premium, it embeds current market sentiment including any bubble or panic, and there's never a perfect comparable. So I use it to triangulate. Even when my primary method is DCF, I check it against comps — if my DCF implies 15x EBITDA but the sector trades at 9x, I need a very strong, specific reason, otherwise my DCF assumptions are simply too aggressive.\"", "formula": "Pro: market-based, quick, real prices, sanity check on DCF. Con: no control premium, sentiment-driven, no perfect comparable. Rule of thumb: DCF vs comps divergence >20% usually means the DCF assumptions are wrong, not the market.", "example": "DCF implies 15x EBITDA, comps trade at 9x → the burden is on you to justify the gap with a concrete catalyst or a unique growth story; absent that, revisit the DCF growth and margin assumptions. In overheated markets comps overshoot intrinsic value; in distress they undershoot.", "mistakes": "Treating comps as intrinsic value rather than relative/market value; ignoring that they embed sentiment; assuming any peer is a \"perfect\" comparable.", "followup": "\"Comps say 9x, your DCF says 15x — who's wrong?\" → usually the DCF, unless you have a defensible catalyst. \"Why still run comps if you have a DCF?\" → independent market cross-check.", "rf": "Comps are harder in РФ — few public peers in most sectors, a 30-50% sanctions discount since 2022, and lower MOEX liquidity that makes multiples more volatile. Example (Apr 2026): Яндекс on MOEX ~5-8x EV/EBITDA vs Alphabet ~13-16x.", "terms": ["control premium", "comparable", "EBITDA", "EBIT", "DCF"]}, {"id": "Q120", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "When to use Precedent Transaction analysis?", "spoken": "\"I reach for precedent in sell-side M&A, when I want to show what buyers have actually paid — it includes the control premium and reflects real transaction behavior, which is what a board cares about. It's most powerful when the deals are recent and relevant: 'three companies in this sector were acquired in the last 18 months at 11-13x EBITDA, so our client should expect at least 11x.' The caveat is vintage — stale precedent over three years old may not reflect current conditions. After the 2022 rate hike, buyers heavily discounted 2021 bubble multiples, so I always specify the year.\"", "formula": "Use precedent for sell-side M&A and fairness opinions (defensibility). Most powerful when recent + relevant. Always vintage-specified; deals >3 years old are stale.", "example": "\"Three sector deals in the last 18 months at 11-13x EBITDA → expect ≥11x.\" Contrast a 2021 precedent (bubble multiples) that a 2024 buyer dismisses — which is why you separate recent from old.", "mistakes": "Using stale (>3-year) precedent as if current; not specifying vintage; ignoring that the sample may be contaminated by special situations.", "followup": "\"Why precedent over comps on a sell-side?\" → it captures control + real paid prices, supporting a higher ask. \"How do you defend it to a buyer?\" → show recent-only median and disclose vintage.", "rf": "The post-2022 sample is mostly forced foreign-owner exits (Unilever, Henkel, Auchan) at distressed prices, and pre-2022 data is stale — so normalize for forced-sale bias. Sources: Mergermarket, SPARK-Interfax, Коммерсантъ M&A digest.", "terms": ["fairness opinion", "control premium", "precedent", "EBITDA", "EBIT", "ABO"]}, {"id": "Q126", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Why might a company trade at a premium to peers?", "spoken": "\"A company earns a premium to peers when it has fundamentally better economics: higher organic growth, stronger margins, a wider moat, a more durable recurring-revenue base, superior management, or less cyclicality. M&A target speculation can also add a premium. In a sell-side pitch I have to make this explicit — I can't just present numbers. So I'd say: 'our client trades at 10x versus a peer median of 8x because of 15% organic growth against 5% for peers, a 35% EBITDA margin against 25%, and a 95%-retention recurring base — and in a transaction that premium should widen further given the synergy potential.' That bridge IS the value proposition.\"", "formula": "Premium drivers: higher growth, better margins, stronger moat, recurring/sticky revenue, superior management, lower cyclicality, M&A speculation. Always quantify the gap with specifics, not adjectives.", "example": "10x vs peer median 8x defended by: +10pp organic growth, +10pp EBITDA margin, 95% retention. The defense must be numeric — \"growth and margins\" with no figures is a junior answer.", "mistakes": "Asserting a premium with adjectives instead of quantified drivers; not preparing the \"why does this deserve to trade above peers\" defense; ignoring that some premium reflects M&A speculation rather than fundamentals.", "followup": "\"Quantify the premium drivers.\" → put numbers on growth, margin, retention. \"Should the premium widen in a deal?\" → yes, if the buyer can capture incremental synergies.", "rf": "Relative valuation against global peers needs stacked discounts applied in sequence — a sector discount, a country discount, and a sanctions discount — typically 40-60% in aggregate to global peers, with the post-2022 sanctions component the largest at roughly 20-30 points. Сбер trades 30-50% below the P/BV and P/E medians of HSBC / JPMorgan / Bank of America.", "terms": ["EBITDA", "EBIT"]}, {"id": "Q127", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Why might a company trade at a discount?", "spoken": "\"A discount comes from lower growth, governance concerns, high leverage, customer concentration, a cyclical trough, or overhanging litigation. The buy-side job is to diagnose whether it's temporary or structural. If it's temporary — a cyclical low or a fixable management problem — the deal thesis is buy at a discount, fix the issues, and re-rate to peer multiples. If it's structural — a declining industry or an unfixable cost base — it's a value trap, and you walk away. The discipline is making that call BEFORE investing, not after.\"", "formula": "Discount drivers: lower growth, governance, leverage, customer concentration, cyclical trough, litigation. Key split: temporary (re-rates) vs structural (value trap). Diagnose before investing.", "example": "Value trap — a stock that screens cheap (P/E 3x, EV/EBITDA 4x) but the discount is structural and won't close: dying industry, irreversibly poor governance, declining margins. ВТБ at ~0.3x P/BV looks cheap, but with ROE below cost of equity the discount is deserved, not an opportunity.", "mistakes": "Confusing a value trap with a bargain; not distinguishing cyclical from structural before buying; assuming any low multiple implies upside.", "followup": "\"Temporary or structural — how do you tell?\" → is the cause cyclical/fixable (re-rate thesis) or secular/structural (walk away). \"ROE < CoE — bargain?\" → no, the discount to book is justified.", "rf": "", "terms": ["leverage"]}, {"id": "Q108", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What is a control premium?", "spoken": "\"A control premium is the amount an acquirer pays above the target's pre-announcement trading price for the right to control the company — strategy, management, and cash flows. It typically runs 20-40%, and it's the reason a stock pops 20%-plus on a deal announcement, because trading prices reflect minority stakes while a deal transfers control. The size varies with three things: strategic versus financial buyer — strategics pay more for synergies; competitive tension — multiple bidders push it up; and the target's leverage — does it have alternatives. In hostile takeovers it can reach 50-70%. In a sell-side pitch I'd frame it as: fair trading value $30, so at a standard 25-35% premium the deal value is roughly $37.50-40.50.\"", "formula": "`Control premium = Offer / Unaffected price − 1`, typically 20-40% (hostile 50-70%). Drivers: strategic vs financial buyer, competitive tension, target alternatives. Present trading and control values separately in a fairness opinion.", "example": "Fair trading $30 → at 25-35% premium, deal value ~$37.50-40.50. Hostile premiums reach 50-70% because the buyer must overcome poison pills (existing holders get new shares to dilute the bidder), golden parachutes (executive payouts on change of control), and staggered boards (only ~1/3 of directors elected yearly, so control takes 2-3 years). The target's leverage is its number of alternatives: another buyer, staying independent, a JV, selling a portion, or waiting.", "mistakes": "Quoting a premium without naming the drivers (\"premium because [1] [2] [3]\"); treating the control premium as a fixed number rather than buyer- and situation-dependent; using the day-before price (leak-inflated) instead of the unaffected price as the base.", "followup": "\"Where does DIP financing sit in the waterfall?\" → top priority: DIP → 1st-lien secured → 2nd-lien → unsecured → subordinated → preferred → equity (secured recovery 60-80%, unsecured 30-50%). \"Strategic vs financial premium?\" → strategic 25-35% for synergies, financial 15-25% to a hurdle rate, hostile 40-60%+.", "rf": "Control premiums run 25-40% for direct control deals (above the US 20-30%) because the minority/illiquidity discount is larger. Squeeze-out above 95% (ФЗ-208 art. 84.8) requires fair value no lower than an independent appraiser's valuation. Post-2022 forced foreign-owner exits carry NEGATIVE premiums (30-50% discounts), while local strategic consolidation runs 25-40%.", "terms": ["fairness opinion", "control premium", "synergies", "leverage", "NCI", "ABO"]}, {"id": "Q23", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "What is Goodwill? How is it created?", "spoken": "\"Goodwill is the excess of the purchase price over the fair value of the target's net identifiable assets in an acquisition. It captures things that can't be separately booked — brand equity, customer relationships, assembled workforce, and expected synergies that justified paying a premium. It arises only through acquisitions; you cannot recognize internally generated goodwill. Under both IFRS and US GAAP it is not amortized — instead it's tested for impairment at least annually, and an impairment is a public admission the deal overpaid.\"", "formula": "`Goodwill = Purchase Price − FV(Net Identifiable Assets)` where net identifiable assets = FV tangible assets + FV identifiable intangibles − assumed liabilities. Often 30-60% of purchase price in premium deals.", "example": "Buy a target for $500M. FMV: tangible $200M, customer relationships $100M, technology $50M, liabilities $100M → net identifiable assets = 200 + 100 + 50 − 100 = $250M → Goodwill = 500 − 250 = $250M.", "mistakes": "Saying goodwill can be created without an acquisition (it can't — internally generated goodwill is never recognized). Confusing economic goodwill (durable competitive advantage that grows) with accounting goodwill (a fixed balance-sheet residual that can on
