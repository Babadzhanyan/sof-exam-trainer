ly shrink via impairment).", "followup": "\"Walk me through a $100M goodwill impairment across 3 statements?\" → see Q25. \"Is goodwill amortized?\" → No under IFRS/GAAP, only impairment-tested. \"Famous overpayment signals?\" → HP-Autonomy $8.8B writedown, AOL-Time Warner $99B writedown.", "rf": "Ключевое отличие РСБУ: «деловая репутация» амортизируется (обычно 20 лет), по IFRS/GAAP — только annual impairment test. Если target ведёт РСБУ, goodwill уже «подёрган» амортизацией → нужна нормализация перед сравнением с глобальными peer'ами.", "terms": ["synergies", "goodwill", "ERP"]}, {"id": "Q24", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T2", "question": "Goodwill vs other Intangible Assets", "spoken": "\"Goodwill is a residual — it arises only in acquisitions, isn't separately identifiable, and is never amortized, only impairment-tested. Other intangibles like patents, trademarks, customer relationships, and developed technology are specifically identifiable, have determinable fair values, and if finite-lived are amortized over their useful life. The distinction matters in deal accounting because ASC 805 / IFRS 3 require you to identify and value all intangibles before the residual goes to goodwill — and finite-life intangible amortization hits future EPS, which is exactly why accretion/dilution analysis must include PPA amortization.\"", "formula": "Finite-life intangibles (customer relationships 5-10yr, technology 3-7yr) → amortized. Indefinite-life (brands, trademarks) → impairment-tested like goodwill. Aggressive PPA pushes value to goodwill (no amortization, protects EPS); conservative PPA pushes value to identifiable intangibles (amortization reduces earnings).", "example": "", "mistakes": "Thinking the target's existing goodwill carries over — it doesn't. In an acquisition the target's old goodwill is wiped out; you start fresh with new PPA, and only the NEW goodwill from your purchase price lands on the acquirer's consolidated BS.", "followup": "\"How does intangible amortization from PPA affect accretion/dilution?\" → It reduces pro forma EPS, making deals more dilutive. \"Who runs PPA in practice?\" → Valuation firms (e.g. Houlihan Lokey, Kroll/Duff & Phelps) value each intangible.", "rf": "Intangibles split в РФ-сделке тот же (бренд, клиентские отношения, технологии, патенты): больше intangibles = больше амортизации = tax shield. По РСБУ деловая репутация амортизируется (~20 лет), intangibles — по useful life; перед консолидацией на МСФО goodwill приводится к impairment-only базе.", "terms": ["amortization", "accretion", "dilution", "goodwill", "NOL"]}, {"id": "Q25", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "$100M Goodwill write-down: walk through 3 statements", "spoken": "\"On the income statement a $100M impairment reduces pre-tax income and net income — and the key nuance is that goodwill from a stock acquisition, which is most M&A, has no tax basis, so the charge is non-deductible and you take the full $100M hit with no tax shield. On the cash flow statement it's a non-cash charge: net income is down $100M, you add back $100M, net cash impact is zero. On the balance sheet, goodwill falls $100M and retained earnings falls $100M, so it stays balanced. Markets often react negatively even though it's non-cash, because it reveals management's original judgment was wrong.\"", "formula": "- `IS:` impairment $100M → pre-tax income −$100M → NI −$100M (no tax benefit, goodwill impairment typically non-deductible)\n- `CFS:` NI −$100M + add back $100M non-cash = net cash $0\n- `BS:` Goodwill −$100M | RE −$100M | balanced", "example": "If instead the goodwill carried tax basis (asset acquisition / 338(h)(10) election) at a 25% rate: IS impairment $100M → after-tax NI hit −$75M; CFS NI −$75M + $100M add-back = +$25M cash from tax shield; BS goodwill −$100M, cash +$25M, RE −$75M. State the no-tax-benefit version as the default for M&A.", "mistakes": "Assuming a tax shield on a stock-deal goodwill impairment (there is none). Forgetting where it sits relative to EBITDA — reported below the EBITDA line, but some firms bury it in operating expenses; for Adjusted EBITDA it's added back. Always check classification.", "followup": "\"When is goodwill impairment tested?\" → annually plus on triggering events (macro deterioration, performance miss, share price below book, loss of key customer). \"Why no tax benefit?\" → stock-deal goodwill has no tax basis.", "rf": "Те же проводки по МСФО. По РСБУ деловая репутация амортизируется, поэтому одномоментные impairment-списания менее типичны для локальной отчётности; в IFRS-отчётности EM-банков goodwill часто завышен из-за оптимистичных growth assumptions и позже списывается.", "terms": ["tax shield", "goodwill"]}, {"id": "Q64", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "M&A transaction overview", "spoken": "\"A full M&A process runs in roughly eight steps: target identification, preliminary valuation, approach and NDA, due diligence, definitive agreement, regulatory approval, closing, and integration. The buyer pays in cash, stock, or a mix — cash gives the seller certainty but needs financing, while stock avoids cash outflow but dilutes the acquirer's shareholders. The critical point is that value is made or destroyed in integration: roughly 70% of deals fail to capture their projected synergies, so the deal isn't done at signing — it's done when synergies are realized.\"", "formula": "8-step process — (1) target ID → (2) preliminary valuation → (3) approach/NDA → (4) due diligence → (5) definitive agreement (SPA/APA) → (6) regulatory approval → (7) closing/completion accounts → (8) integration. Consideration: cash / stock / mixed. PPA mandatory under IFRS 3 / ASC 805.", "example": "Daimler-Chrysler ($36B, 1998) — cultural clash destroyed an estimated ~$30B in value, the classic integration-failure case.", "mistakes": "Thinking signing = deal done. The three main deal-killers: (1) integration failure (~70% miss projected synergies), (2) overpayment from competitive bidding / winner's curse, (3) cultural mismatch.", "followup": "\"What kills deals?\" → integration, overpayment, culture. \"What's a teaser vs IM?\" → 5-slide teaser → 30-slide Information Memorandum. \"Why PPA?\" → allocate price to FV tangibles + identifiable intangibles, residual = goodwill.", "rf": "Регулятор для крупных сделок и особенно для выходов иностранцев — ФАС плюс Правительственная подкомиссия (mandatory post-2022). Структура часто через «обмен активами» из-за санкций; forced-sale discount 40-60%. Кейс: консорциум выкупил российский бизнес Яндекса у Yandex N.V. за ~$5.2B (cash, с дисконтом к рынку). Объём рынка 2024-2026 ~$20-30B/год (30-40% от пика 2021).", "terms": ["synergies", "NCI"]}, {"id": "Q65", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "Key steps of M&A financial analysis", "spoken": "\"I'd run it in eight steps. First, standalone valuation of the target — DCF plus comps plus precedent transactions, with no synergies. Then sources and uses, where sources must equal uses. Then the pro forma income statement combining acquirer and target with adjustments, followed by purchase price allocation. Then accretion/dilution — pro forma EPS versus standalone. Then synergies, typically phased 25% year one, 75% year two, 100% year three. Then credit metrics — pro forma Net Debt/EBITDA and interest coverage. And finally sensitivity on price, synergies, WACC, and growth. The single most important discipline is that standalone value excludes synergies — the buyer pays standalone value plus a share of the synergies as the premium.\"", "formula": "8 steps — (1) standalone valuation (no synergies) → (2) sources & uses → (3) pro forma IS → (4) PPA → (5) accretion/dilution → (6) synergies (phasing Y1 25% / Y2 75% / Y3 100%) → (7) credit (pro forma leverage + coverage) → (8) sensitivity. Premium = buyer sharing ~30-50% of expected synergies with the seller; typical control premium 20-40%.", "example": "Roche-Genentech, Disney-Fox, or any large strategic deal: a standalone DCF on the target, comps from listed peers, a sources & uses split between cash and stock, then a combined model — each item a separate page in the pitch book that the MD challenges line by line.", "mistakes": "Including synergies in standalone value (standalone = business \"as is,\" without the deal). Treating accretion as proof of value creation. Forgetting credit metrics, which is where many deals actually break.", "followup": "\"Should standalone include synergies?\" → No. \"Private vs public target valuation?\" → apply illiquidity discount (20-30%) to public comps; precedent transactions already embed private deals; relever beta from unlevered public peers at target capital structure, add size premium (2-4%); add control premium for a 100% acquisition.", "rf": "На MOEX набор trading comps узкий — часто добавляют глобальных peer'ов с дисконтом; precedent transactions после 2022 скудны и часто непубличны; accretion/dilution применяется редко (95%+ сделок за кэш, stock deals почти исчезли). LBO-анализ почти не входит в pitch: даже после смягчения 2026 (ключевая ставка ~15% против пика 21% в Q4 2025) стоимость долга 13-17% делает классические 5×+ leverage структуры маргинальными — реалистичный РФ PE использует growth equity (debt <2×) или club deals.", "terms": ["purchase price allocation", "control premium", "sensitivity", "accretion", "synergies", "precedent", "net debt", "dilution"]}, {"id": "Q66", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "Quick & Dirty M&A analysis", "spoken": "\"A quick-and-dirty screen estimates the purchase price as EV/EBITDA times the target's EBITDA, runs a rough sources and uses, then checks combined EPS — acquirer plus target net income over the new share count — against the acquirer's standalone EPS, and adds a rough synergy estimate. The cleanest 30-second version is: combined EBITDA times the multiple, minus net debt, gives pro forma equity value, which you compare to standalone market cap. If the deal destroys value at zero synergies, you have to underwrite the synergies hard; if it creates value with no synergies at all, the target is probably underpriced. It's fine for an initial 'should we pursue this' conversation but never for a client-facing final answer.\"", "formula": "`Pro forma equity ≈ combined EBITDA × multiple − net debt`, compared to standalone market cap → implied value creation. Q&D tends to overstate accretion because it omits transaction costs, financing assumptions, and PPA amortization.", "example": "Acquirer market cap $2.0B; target generates $150M EBITDA, bought at 7x → ~$1.05B EV. Combined EBITDA $500M × 7x = $3.5B EV − $1.0B net debt = $2.5B pro forma equity vs $2.0B standalone → value-creating even before synergies → likely an underpriced target worth a full model.", "mistakes": "Presenting Q&D as final analysis. Ignoring transaction/financing fees and PPA, which inflate apparent accretion. Forgetting that a serious discussion needs a full merger model.", "followup": "\"Is Q&D enough for a pitch?\" → only for a preliminary go/no-go, never as the final number. \"Biggest risk?\" → missing fees, financing, and PPA impact.", "rf": "Мультипликаторы ниже US (5-7x против 8-10x). Forced-sale exits иностранцев торговались ~3-4x EBITDA (дисконт 40-50% к pre-2022 fair value); consolidation deals (например покупки X5 региональных сетей) ~4-5x.", "terms": ["amortization", "equity value", "accretion", "synergies", "EV/EBITDA", "net debt", "EBITDA", "EBIT"]}, {"id": "Q67", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "Sources & Uses analysis", "spoken": "\"Sources and uses is the bridge between how a deal is funded and where the money goes, and it must balance. Sources are cash on hand, new debt — revolver, term loan, bonds, mezzanine — new equity issuance, and any management rollover equity. Uses are the equity purchase price, refinancing the target's existing debt, advisory fees of roughly 1-2% of deal value, financing fees of roughly 2-4% of the debt raised, and minimum cash left on the balance sheet for operations. The plug — the line that makes it balance — is usually sponsor equity in an LBO or the revolver in a strategic deal. It's the first page of any merger model.\"", "formula": "`Sources = Uses`. Sources: cash on hand + new debt (revolver / term loan / bonds / mezzanine 12-20%) + equity issuance + rollover equity. Uses: equity purchase price + refinance existing debt + advisory fees (1-2% deal value) + financing fees (2-4% of debt) + cash to BS.", "example": "```\nSOURCES                   USES\nTerm Loan B    $400M       Equity Purchase  $750M\nMezzanine      $150M       Refinance Debt   $200M\nSponsor Equity $400M       Advisory Fees     $15M\nRollover Mgmt   $50M       Financing Fees    $35M\nCash on BS      $50M       Cash to BS        $50M\n                           Total          $1,050M\nSponsor equity is the plug → sized so Sources = Uses = $1,050M\n```", "mistakes": "Mishandling target cash — whether it nets out depends on deal structure: if the LBO keeps cash for operations it appears in both sources and uses; if the deal sweeps cash to pay down debt it appears only in sources. Forgetting financing/advisory fees.", "followup": "\"What's the plug?\" → sponsor equity (LBO) or revolver (strategic). \"How do completion accounts tie in?\" → post-closing, buyer and seller true-up every net debt and NWC line; a $10-50M dispute is normal on a mid-market deal.", "rf": "95%+ cash deals post-2022 (нет stock currencies); eurobonds frozen → domestic bank debt only (Сбер/ВТБ). В РФ LBO почти невозможен при дорогом долге → PE использует equity-heavy structure: 80-90% sponsor equity + 10-20% rollover менеджмента, debt минимален.", "terms": ["mezzanine", "rollover", "LBO", "SPO", "NCI"]}, {"id": "Q68", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "Combined shares and EPS in a stock deal", "spoken": "\"In a stock-for-stock deal, the new shares issued equal the target's shares times the exchange ratio, and combined shares are the acquirer's existing shares plus those new shares. Combined net income is acquirer net income plus target net income plus after-tax synergies, minus any new interest if there's a debt component, minus the after-tax intangible amortization created by PPA. Pro forma EPS is combined net income over combined shares, and you compare it to the acquirer's standalone EPS for accretion or dilution. The number-one mistake is forgetting the PPA intangible amortization, which overstates pro forma EPS.\"", "formula": "`New shares = target shares × exchange ratio`; `Exchange ratio = offer price per target share / acquirer share price`. `Combined NI = NI_A + NI_B + after-tax synergies − new after-tax interest − after-tax PPA amortization`. `Pro forma EPS = Combined NI / Combined shares`. Rule of thumb: stock deal is accretive without synergies when acquirer P/E > target P/E.", "example": "Acquirer NI $200M, 100M shares (EPS $2.00). Target NI $50M, bought for $500M in stock at $25/share → 20M new shares. Synergies $20M pre-tax, PPA amortization $10M/yr, tax 25%. Combined NI = 200 + 50 + 15 − 7.5 = $257.5M; shares = 120M; pro forma EPS = $2.15 → accretive +7.3% (≈ +$0.15/share).", "mistakes": "Omitting PPA intangible amortization (the #1 accretion/dilution error). Confusing fixed exchange ratio vs fixed price — they allocate price risk differently between buyer and seller.", "followup": "\"Exchange ratio formula?\" → offer price per target share / acquirer share price. \"When is a stock deal accretive without synergies?\" → buyer P/E > target P/E.", "rf": "Stock-for-stock — большая редкость (95%+ за кэш). Главное исключение — редомициляционные обмены акций (Яндекс N.V. → МКПАО Яндекс, коэффициент 1:1, 2024), но это технический swap, не M&A. Merger model для stock deals нужен в основном при редомициляции или конвертации долей внутри холдинга.", "terms": ["amortization", "accretion", "synergies", "dilution", "P/E"]}, {"id": "Q69", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "Goodwill calculation in an acquisition", "spoken": "\"Goodwill equals the equity purchase price minus the fair value of net identifiable assets — fair-value tangible assets plus identifiable intangibles minus assumed liabilities. The identifiable intangibles, like customer relationships, technology, and brand, are amortized over 5-20 years, but goodwill itself is not amortized under IFRS or US GAAP — it's tested for impairment annually. The two traps are using equity value rather than enterprise value — enterprise value double-counts assumed debt, which is a separate liability line — and forgetting that under Russian RAS goodwill actually is amortized, typically over 20 years.\"", "formula": "`Goodwill = Equity Purchase Price − (FV Tangible Assets + FV Identifiable Intangibles − Assumed Liabilities)`. Use equity purchase price, not EV. Bargain purchase (price below FV net assets) → \"negative goodwill\" recognized as an immediate gain on the IS (rare, distressed deals). Red flag: goodwill >40% of purchase price signals overpayment.", "example": "Buyer pays $1B. Target tangible book value $300M, identifiable intangibles $400M (PPA) → FV net identifiable assets $700M → Goodwill = 1,000 − 700 = $300M, sitting permanently on the BS subject to annual impairment testing.", "mistakes": "Using EV instead of equity purchase price. Forgetting negative goodwill flows straight to the IS as a gain. Calling goodwill amortizable under IFRS/GAAP (it's impairment-only).", "followup": "\"EV or equity value?\" → equity. \"What if price is below FV net assets?\" → negative goodwill = immediate IS gain. \"How does impairment flow?\" → IS charge (usually no tax benefit), CFS add-back, BS goodwill and RE down.", "rf": "Ключевое отличие РСБУ: «деловая репутация» АМОРТИЗИРУЕТСЯ (обычно 20 лет) — у IFRS/ASC 805 только impairment. Goodwill в банковских / IB-сделках (мало tangibles) огромен относительно цены — основная стоимость в бренде, клиентах и команде.", "terms": ["enterprise value", "equity value", "goodwill", "ERP", "NOL"]}, {"id": "Q70", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "EPS accretion/dilution analysis", "spoken": "\"Accretion/dilution compares pro forma combined EPS after the deal to the acquirer's standalone EPS — higher is accretive, lower is dilutive. The quick screens are: an all-stock deal is accretive when the buyer's P/E exceeds the target's P/E, and a cash or debt-funded deal is accretive when the target's earnings yield — E/P — exceeds the after-tax cost of debt. For the full calculation you build combined net income including after-tax synergies, less after-tax financing cost and less after-tax PPA intangible amortization, over the new share count. The thing I'd flag is that accretion is an EPS snapshot, not a measure of value creation — a deal can be dilutive in year one and still create value once synergies phase in.\"", "formula": "- All-stock accretive when `buyer P/E > target P/E`\n- Cash/debt accretive when `target E/P > after-tax cost of debt`\n- `Pro forma EPS = (NI_A + NI_B + after-tax synergies − after-tax financing cost − after-tax PPA amortization) / (shares_A + new shares)`", "example": "Acquirer NI $200M, 100M shares, EPS $2.00. Target NI $50M, bought for $500M in stock at $25 → 20M new shares. Synergies $20M pre-tax, PPA amort $10M/yr, tax 25%. Combined NI = 200 + 50 + 15 − 7.5 = $257.5M; shares 120M → EPS $2.15 → accretive +7.3% (≈ +$0.15/share).", "mistakes": "Forgetting PPA intangible amortization (error #1 — it reduces pro forma NI and makes deals more dilutive). Auto-rejecting a Year-1-dilutive deal — boards accept 1-2 years of moderate dilution if synergies make it accretive by Year 3 and the strategic case holds. Treating accretion as value creation.", "followup": "\"5% dilutive in Year 1 — reject?\" → not necessarily; check whether it turns accretive by Year 3 with phased synergies, and confirm ROIC > WACC. \"Biggest single driver?\" → P/E arbitrage plus cost of financing.", "rf": "Мало public-to-public M&A, поэтому accretion/dilution применяется редко, но логика та же. При низком P/E acquirer'а (например банк с P/E ~5x) покупка цели с более высоким P/E за акции даёт dilution — выпускаешь «дешёвые» акции за «дорогие» earnings.", "terms": ["amortization", "cost of debt", "accretion", "synergies", "dilution", "P/E", "NCI"]}, {"id": "Q221", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "What drives accretion vs dilution in a merger?", "spoken": "\"Three things drive it: P/E arbitrage, synergies, and the cost of financing. In an all-stock deal you're accretive when the buyer's P/E exceeds the target's — each buyer share buys more earnings than it gives up; in an all-cash deal you're accretive when the target's earnings yield beats the after-tax cost of the debt funding it. Synergies improve accretion, while PPA amortization and new interest expense hurt it. The senior point is that a quick P/E screen is only a 30-second check — once you layer in PPA amortization and interest, a deal that looks accretive on the naive screen can flip to slightly dilutive, and you need the full walk for an IC defense. And accretion is not value creation — anchor the actual decision on the NPV of synergies minus the premium minus integration costs.\"", "formula": "Drivers — (1) P/E arbitrage (stock), (2) target earnings yield vs after-tax cost of debt (cash), (3) synergies (+), (4) PPA amortization (−), (5) new interest expense (−). Quick screen ≠ IC answer.", "example": "Buyer EPS $3.00, 100M shares (NI $300M), P/E 18× → price $54. Target EPS $1.50, 50M shares (NI $75M), P/E 12× → price $18.\n- All-stock at 25% premium: offer $22.50, exchange ratio 0.4167, new shares 20.8M → combined NI $375M / 120.8M = $3.10 → **+3.4% before adjustments**.\n- Add PPA: $250M incremental intangibles, ~10yr life → $25M/yr pre-tax, $18.75M after-tax → adj NI $356.25M / 120.8M = $2.95 → **−1.7% (flips to dilutive)**.\n- Layer 70% stock / 30% cash and $40M synergies phasing 30/70/100%: Y1 ≈ +2.2% accretion, Y3 steady-state ≈ +8.3%. Breakeven ~35% synergy realization.", "mistakes": "Forgetting PPA amortization. Ignoring new interest on debt-funded deals. Saying \"dilutive deals are bad\" — some of the best acquisitions are initially dilutive.", "followup": "\"What if it's dilutive in Year 1?\" → \"With cost synergies phasing in over 2 years it's accretive by Year 2; the board accepts short-term dilution for long-term value.\" \"Does accretion = value?\" → No; a fairly-priced high-growth target can be dilutive yet value-creating, and an overpaid low-growth target accretive yet value-destroying.", "rf": "В основном cash deals → cost of financing (new debt vs existing cash) — доминирующий драйвер. Stock deals в основном для strategic partnerships / обменных операций внутри групп; синергии чаще всего в consolidation (retail, banking).", "terms": ["amortization", "cost of debt", "accretion", "synergies", "NPV", "P/E", "NCI"]}, {"id": "Q222", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "What is Purchase Price Allocation (PPA)?", "spoken": "\"PPA is how the acquirer records what it actually bought at fair value. You take the total purchase price, mark the tangible assets to fair value — PP&E and inventory write-ups — then identify and value the intangibles like customer relationships, developed technology, brand, and non-competes, each with its own useful life. Whatever's left after fair-value net tangible assets and identified intangibles is goodwill. This matters directly for accretion/dilution because the intangible amortization hits the income statement year by year — a deal that's accretive before PPA can become dilutive once you load in the amortization.\"", "formula": "`Goodwill = Purchase Price − FMV Net Tangible Assets − FMV Identifiable Intangibles`. Intangible lives: customer relationships 5-15yr, developed technology 3-7yr, brand 10-20yr or indefinite, non-compete 2-5yr. Valuation methods: relief-from-royalty, multi-period excess earnings, income approach. Identifiable-intangible amortization is tax-deductible where the deal gives tax basis (asset deal / §197); goodwill is not amortized for book.", "example": "Purchase price $1B. Target book net assets $300M. FMV adjustments: PP&E +$50M, inventory +$20M. Intangibles: customer relationships $200M (10yr), technology $100M (5yr), brand $50M (indefinite). FMV net assets = 300 + 50 + 20 + 200 + 100 + 50 = $720M → Goodwill = 1,000 − 720 = $280M. Annual amortization = 200/10 + 100/5 = $40M/yr hitting EPS (brand indefinite-lived, not amortized).", "mistakes": "Forgetting intangible amortization is tax-deductible in an asset deal (a tax shield). Confusing goodwill (not amortized) with identified intangibles (amortized). Omitting the PPA amortization line from the merger model.", "followup": "\"How does PPA affect accretion/dilution?\" → add the amortization line; it reduces pro forma EPS. \"Goodwill impairment?\" → see Q225.", "rf": "PPA по МСФО 3 строится так же, как IFRS/GAAP. Принципиальное отличие РСБУ: оно налогово-ориентировано, деловая репутация амортизируется (~20 лет), поэтому goodwill в локальной отчётности со временем тает — перед консолидацией с группой на МСФО требуется reversal амортизации и приведение к IFRS-базе.", "terms": ["amortization", "accretion", "dilution", "goodwill", "NOL"]}, {"id": "Q225", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "How is goodwill created in an acquisition?", "spoken": "\"Goodwill is created when you pay more than the fair value of the target's net identifiable assets. If you pay $1B for a company with $600M of net identifiable assets at fair value, the $400M gap is goodwill — the accounting recognition that you paid a premium for things you can't separately identify and sell: brand equity, customer loyalty, the workforce, and expected synergies. It sits on the buyer's balance sheet as an indefinite-lived intangible, isn't amortized under IFRS or US GAAP, and is tested for impairment annually or on triggering events. If the reporting unit's fair value falls below its carrying value, you write it down through the P&L — which is effectively an admission that you overpaid.\"", "formula": "`Goodwill = Total Consideration − FMV(Identifiable Assets − Liabilities)` after PPA. Tested at the reporting-unit level, not the asset level. No amortization (IFRS/GAAP); impairment-only.", "example": "Purchase price $800M. Target book net assets $250M. PPA: PP&E +$50M, customer relationships +$120M, technology +$80M, brand +$30M → FMV net assets $530M → Goodwill = 800 − 530 = $270M, permanent on the BS unless impaired.", "mistakes": "Confusing goodwill (the residual) with identified intangibles (specifically valued). Saying goodwill is amortized under IFRS/GAAP (it's impairment-tested). Forgetting it's tested at the reporting-unit level, not per asset.", "followup": "\"How does impairment flow through statements?\" → IS impairment charge (usually no tax benefit), CFS add-back (non-cash), BS goodwill and equity down. \"Real-world signal?\" → GE's $22B goodwill writedown in 2018 confirmed its acquisitions destroyed value. \"Tax wrinkle?\" → in some regimes (e.g. US §197) goodwill is tax-amortizable over 15 years even when not amortized for book, creating a book/tax difference and a DTA.", "rf": "Goodwill в банковских EM-сделках часто завышен из-за оптимистичных growth assumptions и позже списывается. По РСБУ деловая репутация амортизируется (~20 лет) против impairment-only по IFRS — при консолидации нужна нормализация.", "terms": ["amortization", "synergies", "goodwill", "carry", "ERP"]}, {"id": "Q133", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T2", "question": "Relative P/E analysis for quick accretion/dilution screening", "spoken": "\"The quick screen is: if the buyer's P/E is higher than the target's in an all-stock deal, it's automatically accretive — you're using expensive currency to buy cheaper earnings, so each share issued contributes less dilution than the earnings it acquires. If the buyer's P/E is lower, it's dilutive. For an all-cash deal P/E comparison is irrelevant — instead you compare the target's earnings yield to the after-tax cost of debt. But I'd caveat heavily that accretion is an accounting metric, not a value metric — you still have to check ROIC against WACC to see if the deal actually creates value.\"", "formula": "All-stock accretive when `buyer P/E > target P/E`. All-cash accretive when `target E/P > after-tax cost of debt`. Mixed → full merger model. Cash deals are more often accretive because after-tax cost of debt (4-6%) usually sits below cost of equity (8-15%). It's a Year-1 EPS screen only — ignores synergies and long-term value.", "example": "Buyer 20x P/E (yield 5%), target 15x P/E (yield 6.7%). All-stock: issuing at 5% to acquire 6.7% earnings → accretive. Same deal all-cash at 5% after-tax cost of debt: buying 6.7% yield with 5% cost → also accretive. But if target P/E were 25x (yield 4%) at 5% cost of debt → cash deal is dilutive.", "mistakes": "Concluding accretive = good deal (it's EPS, not value — a 30x buyer acquiring a declining 8x business is accretive Day 1 but can destroy value over 5 years). Applying the P/E screen to cash deals. Forgetting synergies can flip a dilutive deal accretive. The screen breaks for negative-earnings companies and for radically different capital structures (use cash-adjusted P/E or EV/EBITDA instead).", "followup": "\"How do synergies change it?\" → a dilutive deal can turn accretive after synergies. \"Why is the cross-border P/E arbitrage attractive?\" → a lower-P/E (higher-risk) acquirer issuing stock to buy a higher-P/E target gains access to cheaper capital; pair with ROIC analysis (Q135) before concluding.", "rf": "Банковские P/BV / P/E Apr 2026: Сбер P/BV 0.9-1.1x, P/E 4-6x; ВТБ P/BV 0.3-0.4x (distressed); Т-Банк P/BV 2-4x (growth premium). Post-2022 compression (Сбер pre-2022 был ~1.5x P/BV, ~8x P/E). Глобальные ориентиры: HSBC ~0.9x, JPM ~1.6x P/BV.", "terms": ["cost of equity", "cost of debt", "accretion", "synergies", "dilution", "WACC", "IRR", "P/E"]}, {"id": "Q134", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T2", "question": "Credit analysis in M&A", "spoken": "\"After a deal is announced the rating agencies re-evaluate the combined entity within a day or two, so I'd calculate pro forma leverage — buyer debt plus new debt plus target debt over combined EBITDA — and coverage, combined EBITDA over total interest. Investment grade generally needs leverage under 3-4x and coverage above 3x; crossing 5x pushes you into high-yield territory with higher cost of debt and covenant restrictions. Agencies give credit for only half to three-quarters of announced synergies, so you need a credible deleveraging path, and you have to check for change-of-control puts in the target's bonds, which can accelerate at close.\"", "formula": "`Pro forma leverage = (buyer debt + new debt + target debt) / combined EBITDA`. `Coverage = combined EBITDA / total interest`. `DSCR = (EBITDA − CapEx − Tax) / (Interest + Mandatory Amortization)`. IG thresholds: leverage <3-4x, coverage >3x; >5x = HY. Agencies initially credit only 50-75% of announced synergies.", "example": "Buyer $500M EBITDA, $1B debt (2.0x). Acquires target for $2B = $800M new debt + $1.2B stock. Target EBITDA $150M, debt $200M. Pro forma debt = 1,000 + 800 + 200 = $2B, EBITDA $650M → leverage 3.1x; interest ($2B at 6%) $120M → coverage 5.4x. With $50M synergies → EBITDA $700M, leverage 2.9x → agencies comfortable, IG maintained.", "mistakes": "Forgetting the target's existing debt in pro forma leverage. Giving full credit for synergies (agencies discount to 50-75%). Missing change-of-control puts in the target's bonds, which may accelerate at close. Not applicable to cash-rich, zero-debt tech acquirers — there the focus is cash depletion and whether they lose a \"net cash\" premium.", "followup": "\"What if S&P signals a downgrade?\" → restructure: more equity, less debt, or a divestiture commitment to deleverage. \"What are change-of-control provisions?\" → bond clauses letting holders put the debt back at a deal close. \"How fast must you deleverage?\" → model years to return to pre-deal leverage.", "rf": "Pre-deal leverage редко >3x (CoD 15-20%); post-deal >4x → риск понижения рейтинга. International agencies (Moody's/S&P/Fitch) ушли после 2022 → домашние АКРА и Эксперт РА. Финансирование — bank loans (85%+), bond issuance редок.", "terms": ["amortization", "cost of debt", "synergies", "covenant", "leverage", "EBITDA", "EBIT", "ABO"]}, {"id": "Q135", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T2", "question": "ROIC in M&A — does the deal create value?", "spoken": "\"Accretion/dilution is an accounting screen; the real test of value creation is ROIC versus WACC. I'd take NOPAT for the combined entity including realistic synergies, divide by invested capital — and crucially invested capital includes the full purchase price, goodwill and all — so paying a high premium pushes invested capital up and ROIC down. That's exactly why overpaying destroys value even when a deal is EPS-accretive. If ROIC exceeds WACC you have positive economic value added; if not, you don't. The question I always come back to is the synergy breakeven — how much synergy do you need to get ROIC above WACC?\"", "formula": "`ROIC = NOPAT / Invested Capital`, where `Invested Capital = total purchase price (incl. goodwill) + buyer's existing IC`. Value created when ROIC > WACC. `EVA = (ROIC − WACC) × IC`. Cost synergies (fast, 70-80% realized) let ROIC clear WACC quickly; revenue-synergy deals almost always show Year-1 ROIC below WACC → use a 5-7yr DCF instead.", "example": "Buyer acquires target for $2B; target NOPAT $120M → pre-synergy ROIC = 120/2,000 = 6.0% vs WACC 9% → EVA = (6% − 9%) × $2B = −$60M/yr (value-destroying). With $80M pre-tax synergies ($60M after-tax) → NOPAT $180M → ROIC = 180/2,000 = 9.0% = WACC = breakeven. You need synergies above $80M to create value.", "mistakes": "Excluding goodwill from invested capital (overstates ROIC). Using 100% of synergies in Year 1 (they ramp 2-3 years). Forgetting integration costs ($50-100M common) that depress Year 1-2 NOPAT. ROIC is less meaningful for revenue-synergy/growth deals — use a long-term DCF there.", "followup": "\"What's synergy breakeven?\" → the synergy level where ROIC = WACC. \"Board presentation — EPS bridge or ROIC bridge?\" → ROIC bridge is the more important one. \"Does the acquirer create value?\" → only if EV_combined > EV_standalone + price paid; historically 60-70% of deals fail to create acquirer value.", "rf": "При ключевой ставке ~15-20% WACC высок, поэтому экономика сделки целиком зависит от исполнения синергий. Плюс: exits иностранцев с дисконтом 40-60% дают buyer'у immediate paper-gain в день сделки (Unilever→Arnest, Henkel→Магнит).", "terms": ["accretion", "synergies", "dilution", "goodwill", "WACC", "DCF", "ERP", "ABO"]}, {"id": "Q136", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T2", "question": "AVP (Analysis at Various Prices)", "spoken": "\"An AVP is the core negotiation page in a board deck — no deal happens at a single price, so I'd build a table of five to seven offer prices bracketing the expected range and, for each, show the premium to the undisturbed price, implied EV/EBITDA and P/E, accretion/dilution to the acquirer, pro forma leverage, and the synergy breakeven. The key insight for the board is where the deal flips from accretive to dilutive, and how much synergy you need at each price to justify it. I always include the metrics at the current share price too — what happens if we pay no premium — and a column for the price at which it turns dilutive.\"", "formula": "For each of 5-7 prices: premium to undisturbed price, implied EV/EBITDA, implied P/E, accretion/dilution, pro forma leverage, synergy breakeven. Market-acceptable premium band typically 20-40%.", "example": "```\nOffer Price       $40    $43    $45    $47    $50\nPremium           15%    23%    29%    35%    43%\nImplied EV/EBITDA  8.0x   8.6x   9.0x   9.4x  10.0x\nAccretion         +5%    +3%   +1.5%   0%    −2%\nPro Forma Lev      3.5x   3.8x   4.0x   4.2x   4.5x\nSynergy BE        $20M   $30M   $40M   $50M   $65M\n```\nSweet spot $43-$45: accretive, leverage <4.5x, premium in market range. Above $45, roughly every extra dollar needs ~$10M more synergies to stay accretive.", "mistakes": "Omitting the synergy breakeven (the board always asks). Too narrow a price range — bracket both sides of the expected range. Forgetting to show the metric at the current share price.", "followup": "\"Where does the deal flip?\" → the price where accretion crosses zero. \"Typical M&A premium?\" → ~20-40%. AVP is less relevant for hostile bids (price publicly stated) or distressed M&A (price set by recovery values).", "rf": "Для loss-making целей AVP строят на EV/Revenue вместо EV/EBITDA (Ozon 2022-2024 EV/Rev 0.5-1x; SaaS типа Позитив 7-10x growth-adjusted); банки оцениваются по P/BV. Premium band тот же 20-40%, но при forced-sale exits иностранцев работает обратная логика — дисконт, а не премия.", "terms": ["accretion", "EV/EBITDA", "dilution", "leverage", "EBITDA", "EBIT", "P/E"]}, {"id": "Q137", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T2", "question": "Contribution analysis", "spoken": "\"Contribution analysis compares what each party brings to the combined company against what they receive in ownership — it's the core framework for a merger of equals. I'd calculate each side's share of combined revenue, EBITDA, EBIT, net income, assets, and book equity, then compare those contribution percentages to the implied ownership from the exchange ratio. If the target contributes 30% of EBITDA but only gets 25% ownership, it's underpaid on an EBITDA basis, and that becomes the lever to argue for a higher exchange ratio. The point is you always show multiple metrics, because each side will emphasize the one that favors them.\"", "formula": "Compare each party's contribution % (revenue, EBITDA, EBIT, NI, assets, equity) to implied ownership % from the exchange ratio. Target contribution > ownership → dilutive for target (underpaid); contribution < ownership → accretive for target. Visualize as a \"contribution football field\" — range bars per metric.", "example": "Buyer revenue $3B, EBITDA $500M. Target revenue $1B, EBITDA $200M. Combined revenue $4B, EBITDA $700M → target contributes 25% of revenue, 29% of EBITDA. Exchange ratio implies 27% ownership → target is slightly underpaid on EBITDA (29% vs 27%) but overpaid on revenue (25% vs 27%) → it argues the ratio should give it 29%.", "mistakes": "Using a single metric — always show several. Not adjusting for different margins — a high-margin target contributes more on EBITDA than on revenue. Ignoring growth — a faster-growing target argues for a premium on forward metrics. Doesn't apply to cash deals or to companies in different industries where metrics aren't comparable.", "followup": "\"What's a Merger of Equals?\" → a near-50/50 combination negotiated on relative contribution rather than a control premium. \"How do both sides use it?\" → each banker emphasizes the metric favoring their client (buyer → revenue, target → EBITDA); the exchange ratio usually lands in the middle.", "rf": "Применяется только в редких stock mergers / редомициляционных консолидациях внутри групп; для 95%+ cash deals не используется (нет обмена долями). В разных индустриях (банк + финтех) метрики несопоставимы — contribution-логика ломается.", "terms": ["EBITDA", "EBIT", "ERP"]}, {"id": "Q244", "block": 6, "block_title": "CONSOLIDATED ACCOUNTING / M&A FINANCIAL ANALYSIS", "tier": "T1", "question": "Walk through the synergy framework for an acquisition.", "spoken": "\"Synergies justify the premium, so a serious buyer decomposes them along the value chain, haircuts them by realization probability, nets out integration costs, and stress-tests three scenarios. I'd decompose across five levels — market position, pricing power, procurement scale, logistics, and headcount/SG&A — rather than just the cost-versus-revenue dichotomy. The market trusts cost synergies because they're countable — headcount and contracted procurement — and heavily discounts revenue synergies because cross-sell rarely survives a culture clash. Cost synergies realize at about 70-80%, revenue at 30-50%, and integration costs eat 20-40% of the gross pool concentrated in years one and two. The senior reframe is that the real question isn't what the synergies are but who captures them — in a competitive auction the target's shareholders already walk away with 70-90% in the premium, and the buyer keeps only the residual.\"", "formula": "Haircuts — cost synergies ×80%, revenue ×30-50%, financial ×90%. Phase-in: Y1 25-50% / Y2 60-80% / Y3 100%. Anti-synergies (integration costs) = 20-40% of gross synergies. `Net value to buyer = PV(synergies after haircut) − premium paid − integration costs`. `Max bid = standalone value + buyer's share of PV(synergies after haircut) − integration costs`. Always present net synergies, never gross, and three scenarios (optimistic / base / downside).", "example": "$3B acquisition of a mid-cap consumer-goods target. Cost synergies: headcount $30M (200 roles × $150K loaded), facilities $10M, procurement $15M, IT $5M → $60M run-rate. Revenue cross-sell $20M → gross run-rate $80M, phasing Y1 $30M / Y2 $60M / Y3 $80M. One-time integration costs $100M. PV of synergies at 8x blended ≈ $640M; premium paid $500M → net value to buyer = 640 − 500 − 100 = **$40M** (not the naive $140M — integration costs eat the difference).", "mistakes": "Double-counting (procurement savings already captured in a headcount cut). Valuing revenue synergies at 100% (apply a 30-50% haircut). Ignoring one-time integration costs. Treating management's standalone strat-initiatives as deal synergies — they'd have happened anyway, so project standalone forward and show synergies as a delta layer on top. Showing only the optimistic scenario to the IC.", "followup": "\"What are the anti-synergies?\" → PMO/consulting costs, severance, ERP integration (almost always over budget), talent attrition, customer churn from overlapping lines. \"Who captures the synergies?\" → in a competitive auction, target shareholders take 70-90% via the premium. \"What can erase the whole case?\" → anti-trust forced divestitures in concentrated deals (AT&T/T-Mobile blocked 2011, Halliburton/Baker Hughes blocked 2016).", "rf": "В консолидирующемся retail (например покупки X5) revenue synergies часто выше нормы (3-5% объединённой выручки) за счёт pricing power над производителями. Кейс пивных активов 2022-2023: Carlsberg продал Балтику ~€1B при book value ~€6B (дисконт ~−83%, актив затем перешёл под внешнее управление по указу 2024); Heineken продал российское подразделение (7 заводов) Арнесту за символическую сумму. Парадокс «купил с дисконтом 50%+ + синергии, а экономика всё равно тяжёлая»: (a) при ключевой ставке 21% (окт 2024) финансирование сделки по 22-25% съедает дисконт за 3-4 года; (b) PV синергий дисконтируется при WACC 25-30% (EM + санкционный риск) → 5-летний поток теряет половину номинала; (c) уход SAP/Oracle → переход на 1С/Галактику удлиняет интеграцию на 12-18 мес и добавляет 30-50% к бюджету. Distress pricing ≠ free value.", "terms": ["synergies", "NCI", "ABO"]}, {"id": "Q219", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": "T1", "question": "What are the typical rationales for M&A?", "spoken": "Every M&A rationale must be specific and quantifiable — \"strategic fit\" or \"diversification\" is not an answer. I use a MECE tree of five buckets: Revenue synergies (cross-sell, up-sell, pricing power, bundling, geographic expansion, channel access), Cost synergies (headcount dedup, procurement, facilities, IT, SG&A), Financial synergies (tax, capital structure, cost of capital, working capital), Strategic/Defensive (competitive elimination, vertical integration, market entry, technology/IP), and Arbitrage (P/E arbitrage, multiple arbitrage, buy-and-build). The first slide of any pitch book answers three questions — why this target, why now, why us — with at least one sub-leg quantified. Salesforce/Slack 2021 for example maps to cross-sell, market entry versus Microsoft Teams, and competitive elimination — three sub-legs from three branches, which is what a MECE answer looks like.", "formula": "`5 buckets = Revenue / Cost / Financial / Strategic-Defensive / Arbitrage`. Strategic buyer uses all 5 (primary weight on Strategic/Defensive — value a financial buyer structurally cannot replicate, needs an operating platform to integrate into). Financial buyer (PE/VC) uses only Revenue / Cost / Financial / Arbitrage — bucket #4 unavailable (no platform, no long-term industry commitment). Hostile bids are almost always strategic-buyer plays: financial buyers won't pay the extra 15-25% hostile premium without bucket #4 economics.", "example": "Salesforce/Slack 2021, $27.7B, 55% premium to undisturbed price, cash + stock (0.0776 Salesforce shares + $26.79 cash per Slack share). Mapped: cross-sell Slack into Salesforce's 150K enterprise base (~$400M Y3 revenue synergy), market entry into the productivity suite vs Microsoft Teams, competitive elimination (blocks Microsoft from buying Slack). Guided $400M revenue + $200M cost synergy; dilutive Y1, accretive Y3.", "mistakes": "(1) Saying \"synergies\" without naming WHICH sub-leg — cross-sell, headcount, and tax have completely different haircut rules. (2) Ignoring anti-synergies / integration friction, which eat 20-40% of gross synergy PV. (3) Not answering \"why now\". (4) Confusing measurable adjacency (a tree leg) with diversification (portfolio theory — NOT a valid corporate M&A rationale; shareholders diversify more cheaply via index funds, hence the 10-20% conglomerate discount).", "followup": "Why is diversification not a rationale? → Conglomerate discount; market penalizes non-strategic combination, sum-of-parts worth less; exceptions are Berkshire (capital allocation as the scarce skill) and keiretsu/chaebol governance models. How do you quantify synergies? → Mark Sirower (Deloitte, \"The Synergy Trap\"): average capture only 30-50% (cost 70-85%, revenue 30-50%). The break-even logic: a 40% premium commits you to delivering ~100% of projected synergies by Year 3 just to break even — anything less destroys value. What's the \"why now\" framework? → 7 windows: regulatory, competitive, market cycle, financing, management availability, FX/macro, sanctions/forced-exit. Buffett's three filter questions? → (1) would I hold this 10 years if I couldn't sell the stock; (2) am I paying what a private owner would pay for 100%; (3) does it raise per-share intrinsic value.", "rf": "Пять доминирующих нарративов 2024-2026: географическая консолидация (X5 поглощает региональные сети, Магнит — нишевые форматы); import substitution (Астра, Positive Technologies, Р-Фарм скупают локальных вендоров под Пост. 719 / реестр отечественного ПО); дешёвые выходы иностранцев с дисконтом 40-60% (Carlsberg → Балтика; Heineken → Arnest за €1; Danone → «Вамин» Татарстан ~₽17,7 млрд; McDonald's → «Вкусно и точка» ~₽45 млрд; Renault → АвтоВАЗ за 1 ₽ с опционом обратного выкупа); вертикальная интеграция сырьевых гигантов; кросс-секторные fintech-сделки банков (Сбер, Т-Банк ← Росбанк 2024). Структурное отличие: при ставке ЦБ ~15% CoD на сделке 13-17% делает LBO-математику нерабочей, поэтому стратеги платят премию выше financial buyers, а arbitrage-ветка работает только на санкционных дисконтах — public-private multiple gap отсутствует (MOEX ~3-5× EV/EBITDA, нет public premium).", "terms": ["working capital", "synergies", "P/E", "NOL", "NCI"]}, {"id": "Q220", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": "T2", "question": "IPO vs SPO vs ABO — what's the difference?", "spoken": "These are the three core ECM products, and they differ on timeline, marketing effort, discount, and who's selling. An IPO is the first public sale of a company's shares — full process of 6-12 months with an S-1 filing and roadshow, priced at a 10-25% discount to fair value to reward first-day buyers. An SPO, or follow-on, is an offering by a company that's already public — a simplified prospectus, 2-4 week window, smaller 3-7% discount because there's already a trading price. An ABO, accelerated bookbuild, is an overnight or one-to-two-day placement of an existing block to institutions at a 2-5% discount, used for PE exits and insider sell-downs. As an M&A banker I need these cold because clients constantly ask whether to sell to a strategic via M&A, IPO the business, or do a block.", "formula": "Timeline ladder — `IPO 6-12 mo / SPO 2-4 wk / ABO overnight`. Discount ladder — `IPO 10-25% / SPO 3-7% / ABO 2-5%`. Primary = company issues new shares, raises capital; secondary = existing holders sell, company gets nothing. ABO = one seller to MANY buyers via competitive bookbuild; block trade = one seller to one (or few) buyers, pre-matched bilaterally (bank can warehouse on balance sheet = principal risk).", "example": "PE fund owns 40% of a $5B-cap company ($2B stake). Options: full M&A sale (3-6 mo, control premium, few buyers); ABO series ($500M block overnight at 3% discount, repeat quarterly); SPO ($800M, 2-week marketing, 5% discount). PE picks the ABO series — faster, least market impact per trade, full exit in ~12 months while retaining upside on the residual stake.", "mistakes": "(1) Confusing primary vs secondary. (2) Suggesting an \"IPO\" for a company that's already public — by definition IPO is first-time, a follow-on is an SPO. (3) Confusing ABO (one-to-many bookbuild) with block trade (one-to-one pre-matched). (4) Assuming ABO scales to any size — in illiquid markets the institutional bid dries up past ~$100-300M per transaction.", "followup": "When is an IPO better than an M&A sale? → When the owner wants partial liquidity plus ongoing upside; M&A is a single price and full exit, an IPO gives ~30% liquidity at pricing plus continued participation. What's a SPAC? → Shell company IPOs with no business, raises cash, acquires a private target within 18-24 months (de-SPAC); boomed 2020-21, collapsed 2022-24. What's a direct listing? → Lists existing shares with no underwriter and no new capital (Spotify 2018, Coinbase 2021); avoids the first-day-pop wealth transfer. Why do banks resist direct listings? (Gurley) → They lose the 5-7% underwriting fee plus the research-coverage bundle; advisory-only fees are a fraction.", "rf": "MOEX primary market ожил 2023-2025: Совкомбанк (дек 2023), Henderson (сен 2023), Астра (окт 2023), Диасофт (фев 2024), Европлан (мар 2024), МТС Банк (апр 2024), Аренадата (окт 2024). Типичные параметры: объём 5-30 млрд ₽, lockup 180 дней, доля розницы 30-40% (выше Запада из-за закрытия иностранного институционала). Андеррайтерские комиссии ниже US: 3-5% для средних IPO, 1-2% для крупных и follow-on. ABO остаётся основным инструментом выходов мажоритариев; SPO реже (Positive Technologies 2023). Для mid-cap с float <$200M ABO ломается — fallback в частные блок-размещения стратегам.", "terms": ["FFO", "SPO", "NCI", "IPO", "ABO"]}, {"id": "Q245", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": "T2", "question": "What recent deals should you know for interviews?", "spoken": "Every M&A interview asks \"tell me about a recent deal,\" so I keep six prepared — three Russian, three global — across different sectors and deal types, and I update them monthly because stale deals signal laziness. For each one I know the parties and deal value, the multiple, the rationale, the financing mix, the premium, the key issues like regulatory or integration risk, the current status, and — critically — my own view on whether the price was fair. Having an informed opinion is what separates someone who follows the market from someone who memorized a headline.", "formula": "8-point deal card — (1) parties + value, (2) multiple (EV/EBITDA or EV/Revenue), (3) rationale, (4) financing (cash/stock/debt), (5) premium, (6) key issues, (7) current status, (8) your view. Mix = 3 Russian + 3 global.", "example": "X5 redomiciliation — completed its move from the Netherlands to Russia in early 2025 under the \"economically significant organizations\" regime (указ 520), which let it resume dividends to Russian shareholders. X5 trades around 4-5× EV/EBITDA, a structural discount to European food retail peers at 7-9×, reflecting Russia country risk and FX volatility. My view: the restructuring unlocked dividend capacity, which is shareholder-positive, but the discount to peers is structural and unlikely to close before 2027.", "mistakes": "(1) Knowing only one deal. (2) Having no opinion. (3) Calling a deal from 3+ years ago \"recent.\"", "followup": "If you advised X5, what would you do? → Drive operational efficiency and a clear dividend policy to narrow the discount; food-retail M&A for geographic expansion could also support a re-rate. Sector-specific interview (e.g. TMT at Goldman)? → Prepare 3-5 deals in that exact sector; generic deal knowledge is the floor, not the differentiator.", "rf": "Актуальный набор 2024-2026: Яндекс редомициляция + продажа российского бизнеса консорциуму (~$5B, 2024); Wildberries / Russ merger (drama вокруг Бакальчук); IPO-волна Henderson / Европлан / МТС Банк / Совкомбанк; выходы иностранцев Unilever → Arnest (2023), Renault → НАМИ (2022). Глобальный противовес для баланса: Microsoft/Activision ($69B, закрыт окт 2023 после долгого antitrust-боя).", "terms": ["EV/Revenue", "EV/EBITDA", "EBITDA", "EBIT", "NCI", "ABO"]}, {"id": "Q246", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": "T1", "question": "What's the structure of a sell-side pitch book?", "spoken": "The pitch book is the product of investment banking, and every page builds toward a recommendation. The structure is standardized across Goldman, Morgan Stanley, JPM because it works — seven sections. One: executive summary with the actionable recommendation on page one, like \"we recommend a sale at $X-Y per share.\" Two: situation overview — company profile, market position, financials, ownership. Three: valuation analysis — the football field of comps, precedents, DCF, and LBO floor. Four: strategic alternatives — sell, merge, IPO, status quo, recap, as a pros-cons matrix. Five: process recommendation — auction versus targeted, timeline, buyer universe. Six: transaction structure — stock versus asset, tax, regulatory path. Seven: appendix with the detailed models. The MD only reads three pages: the recommendation, the football field, and the buyer list — so the pitch has to stand on those.", "formula": "7 sections — (1) exec summary + recommendation, (2) situation overview, (3) valuation football field, (4) strategic alternatives, (5) process recommendation, (6) transaction structure, (7) appendix. The 3 pages the MD actually reads: recommendation, football field, buyer list.", "example": "Sell-side for a $500M tech company. Page 1: \"We recommend a targeted sale process to 4-6 strategic and financial buyers; implied EV $450-550M (10-12× NTM EBITDA); ~4 months to signing.\" Pages 3-5: football field converging at $475-525M. Pages 6-7: five most likely buyers with rationale. Page 8: process timeline. Appendix: detailed models.", "mistakes": "(1) Burying the recommendation on page 15. (2) Including analysis with no \"so what.\" (3) Generic pitch with no target-specific insight.", "followup": "How does a buy-side pitch book differ? → Starts with \"why this target,\" then focuses on synergies, financing, and returns rather than alternatives. What's a football field? → Cross-method valuation range chart (comps / precedents / DCF / LBO floor) showing where values converge.", "rf": "Формат ВТБ Капитал / Сбер CIB / Газпромбанк — 60-100 слайдов, та же логика секций. VP собирает за 40-60 часов; MD ревьюит ~30 минут и оспаривает каждое допущение. Язык: русский для клиента, английский для pitch международным покупателям (актуально pre-2022, сейчас в основном domestic).", "terms": ["precedent", "DCF", "LBO", "NCI", "IPO"]}, {"id": "Q342", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "Motives to go public", "spoken": "Companies go public for capital access to fund growth, liquidity for existing shareholders like a PE or VC exit, acquisition currency in the form of stock, employee retention through options, brand credibility, and a lower cost of capital since public markets are cheaper than private. The costs are real and constant: full disclosure through 10-K, 10-Q and proxy filings, quarterly earnings pressure, SOX compliance running $2-5M a year, loss of control, and exposure to hostile takeovers. The ECM pitch to a sponsor is staged monetization — sell 15% at IPO, another 15% in a follow-on six months later, then exit the rest via block trades over two years while keeping control through most of it.", "formula": "Pros — capital access, shareholder liquidity, stock as acquisition currency, option-based retention, brand, lower CoC. Cons — disclosure burden, quarterly pressure, SOX `$2-5M/yr`, loss of control, hostile-takeover exposure.", "example": "ECM pitch to a founder: \"Going public gives you $500M of acquisition currency in stock instead of depleting cash.\" To a PE sponsor whose portfolio company tripled: staged sell-down (15% IPO → 15% follow-on → block trades) lets you monetize while retaining control; the banker models IPO + secondary exit against an outright strategic sale.", "mistakes": "Forgetting the cost side and pitching IPO as pure upside; ignoring that quarterly earnings pressure and disclosure can actively destroy long-horizon decision-making (Andreessen: stay private longer, go public when you have product-market fit and need scale capital, not before).", "followup": "When should a company NOT go public? → When it doesn't need external capital, can't withstand quarterly scrutiny, or has a controlling owner unwilling to dilute. What protects against hostile takeover? → Concentrated ownership, dual-class shares, poison pills, staggered boards.", "rf": "Мотивы 2024-2026 усилены: розничный спрос огромен (MOEX 30M+ счетов); санкции закрыли Eurobonds → equity единственный публичный источник funding; import substitution = быстрый рост в TMT/industrial = потребность в growth capital. Кейсы: Positive Technologies, Whoosh, Selectel, Henderson. Издержки ниже US — нет SOX; раскрытие в ЦБ ~10-20M ₽/год. Hostile takeover практически невозможен при концентрированной собственности (60%+ у одного акционера).", "terms": ["IPO", "SPO"]}, {"id": "Q343", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "Post-IPO equity raising", "spoken": "Once a company is public there are several ways to raise more equity. Follow-on offerings — primary if the company issues new shares, secondary if existing holders sell down. Rights issues, where existing holders buy new shares pro-rata at a discount. ATM programs, which drip-feed shares into the market at the prevailing price. Convertible bonds, which are debt that converts to equity at a 20-30% premium. And block trades, where a PE holder sells a large block overnight at a 3-7% discount. The block trade is bread-and-butter ECM: you call twenty institutions at 4pm, price by 6, allocate by 8 — the discount compensates for size and speed, and it's fee-generative at 1-2% of deal value.", "formula": "Toolkit — follow-on (primary dilutive / secondary non-dilutive), rights issue (pro-rata at discount), ATM (drip-feed at market), convertibles (`+20-30%` conversion premium), block trade (`-3-7%` discount). ECM fee on a block ≈ 1-2% of deal value.", "example": "A PE sponsor wants to exit a remaining 30% stake. The banker runs a block trade: calls ~20 institutional investors at 4pm, prices by 6pm, allocates by 8pm; the ~5% discount to last close compensates investors for absorbing size in one session.", "mistakes": "Confusing a rights issue (offered pro-rata to existing holders) with a follow-on (offered broadly to the market); forgetting that primary raises money for the company while secondary only shifts money to selling holders.", "followup": "Why use a convertible instead of straight equity? → Cheaper coupon and you sell equity at a premium to today's price; downside is dilution if it converts. When is an ATM best? → For steady, opportunistic top-ups without a marketed deal — minimal disclosure and market impact.", "rf": "Follow-on (SPO) — стандарт (Positive Technologies 2023, Мосбиржа, Сбер 2024). Overnight block trades для PE-выходов — регулярная активность MOEX 2024-2026. ATM-программы практически отсутствуют; convertibles редки из-за тонкого рынка fixed income.", "terms": ["rights issue", "convertible"]}, {"id": "Q344", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "Types of equity issuance", "spoken": "Five main instruments. Common stock, raised through an IPO or follow-on. Preferred stock, with a fixed dividend and a liquidation preference — the staple of PE and VC. Convertible bonds or notes, a hybrid that pays a debt coupon plus equity upside at a 25-35% conversion premium. Warrants, which are long-dated call options usually attached as a sweetener to debt deals. And rights, short-lived subscription rights for existing holders. Each has different dilution, cost, and investor-base implications — convertibles are the cheapest funding but the most complex because of the embedded option, while preferred is the most protective but the least liquid. The ECM banker's job is matching the instrument to the capital need and the market window.", "formula": "Common stock / Preferred (fixed div + liq pref) / Convertible (`+25-35%` premium, debt coupon + equity upside) / Warrants (long-dated calls, debt sweetener) / Rights (pro-rata, short-lived). Convertible = cheapest but most complex; preferred = most protective, least liquid.", "example": "By type — Common: Arm Holdings IPO ($54B valuation, Sept 2023, ~10% offered, +24% day 1). Preferred: SoftBank's $10B into WeWork (2019) via preferred with a 6% coupon + liquidation preference — protected downside until it didn't (WeWork Chapter 11, 2023). Convertible: MicroStrategy's ~$3B of 0%-coupon notes (Nov 2024, due 2029) at a ~55% conversion premium to buy Bitcoin — investors took 0% because the equity upside was the return. Warrants: Buffett's 2008 Goldman deal — $5B preferred + warrants to buy $5B of common at $115/share, exercised in 2013 for a multi-billion profit. Rights: Standard Chartered's 2015 rights issue (~$5.1B) to rebuild its capital ratio.", "mistakes": "Treating preferred as \"safe equity\" — it's senior to common but worthless if the company fails; mispricing a convertible as plain debt and ignoring the embedded option value.", "followup": "Difference between a warrant and a convertible? → A warrant is a separate call option (often detachable, fresh cash on exercise); a convertible is a bond whose principal converts into shares. PE sponsor wants to exit 30% with minimal market impact? → CMPO (confidentially marketed) plus a block-trade sequence, not a fully marketed SPO (too much disclosure).", "rf": "Доступны IPO, SPO/FO, ABB, частное размещение по закрытой подписке, rights issue (преимущественное право по ФЗ-208). Все типы кроме SPAC активны на MOEX 2024-2026. International offerings (ADR/GDR) заморожены post-2022.", "terms": ["convertible", "preferred", "dilution", "IPO"]}, {"id": "Q345", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "Equity issuance in different markets", "spoken": "Companies access equity markets three ways: a primary listing on the home exchange, a secondary listing on an additional exchange for investor access, and depositary receipts — ADRs or GDRs — for cross-border reach. The major venues differ sharply: NYSE and Nasdaq are the deepest with the highest multiples, LSE is the European gateway, HKEX is the China gateway, and MOEX is Russia-domestic. A dual listing opens multiple capital pools but doubles your compliance cost. The choice comes down to target investor base, disclosure burden, and geopolitical risk — and Ozon's forced NASDAQ delisting after 2022 is the cautionary tale on that last point.", "formula": "Listing types — primary (home), secondary (extra exchange), depositary receipts (ADR/GDR). Venue ranking by depth/multiple: US (NYSE/Nasdaq) > LSE ≈ HKEX > MOEX. US multiples run ~2-3× EM listings. Dual listing = double compliance.", "example": "Alibaba — NYSE 2014 IPO ($25B) + HKEX 2019 secondary ($13B) via a VIE structure (Cayman holdco over Chinese operating entities) — access to both investor bases but VIE = structural risk. Ozon — NASDAQ 2020 ($10B cap) + MOEX, then forced into MOEX-only after 2022 sanctions — dual-listing geopolitical risk. Positive Technologies chose MOEX-only in 2021 and avoided the delisting trauma. Spotify's 2018 direct listing on NYSE saved roughly $100M in underwriting fees versus a traditional IPO.", "mistakes": "Assuming a US listing is always best — it brings the heaviest disclosure (SOX) and, for sanctioned jurisdictions, delisting risk; forgetting that dual listings double ongoing compliance cost for often-marginal incremental liquidity.", "followup": "Why list on Nasdaq vs NYSE? → Nasdaq skews tech/growth with lower minimums ($50M cap, 300 holders) vs NYSE's deeper institutional base ($200M cap, 400 holders). What's a direct listing again? → Existing shares trade via an opening auction, no underwriter, no new capital (Spotify, Coinbase, Roblox).", "rf": "Для российских компаний 2024-2026 — только MOEX (Eurobonds/ADR заморожены), dual listing невозможен. SPB Биржа фактически закрыта post-2022. Потенциальные будущие площадки: Dubai DFM, Abu Dhabi ADGM. Тонкая ликвидность в mid-cap; US-мультипликаторы в 2-3 раза выше локальных листингов.", "terms": ["GDR", "ADR"]}, {"id": "Q346", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "Depositary receipts (ADR/GDR)", "spoken": "An ADR, American Depositary Receipt, is a US-listed receipt that represents shares of a foreign company, so US investors can hold it without a direct foreign listing. There are three levels: Level I trades over-the-counter with minimal SEC oversight, Level II is exchange-listed with full SEC reporting, and Level III is exchange-listed and lets the company raise new capital. A GDR, Global Depositary Receipt, does the same thing on London or Luxembourg. The benefit is access to US and European investors without a full foreign listing; the costs are depositary bank fees and FX complexity. For Russian companies before 2022, LSE-listed GDRs were the main route to international capital — and most were forcibly delisted after sanctions.", "formula": "ADR (US) / GDR (London, Luxembourg) — receipt over foreign shares held by a depositary bank. Levels: I (OTC, minimal SEC) / II (exchange-listed, full SEC reporting) / III (exchange-listed + capital raise). Costs: depositary fees + FX.", "example": "Pre-2022 Russian programs — Polyus, Novatek, Sberbank all carried LSE-listed GDRs as their primary channel to international capital; post-sanctions these were forcibly delisted, and issuers pivoted to MOEX-only or converted to domestic structures.", "mistakes": "Mixing up the levels — only Level III lets the issuer raise fresh capital; assuming an ADR gives the holder direct legal shares rather than a bank-issued receipt with its own fee layer.", "followup": "Why issue at Level I instead of Level III? → To gain US visibility cheaply with minimal SEC burden when no capital raise is needed. What replaced GDRs for Russian issuers? → Forced conversion into domestic МКПАО (e.g. Яндекс N.V. → МКПАО Яндекс, Globaltrans, X5) and MOEX-only trading.", "rf": "", "terms": ["GDR", "ADR"]}, {"id": "Q347", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "IPO timeline", "spoken": "An IPO runs about 6-9 months across three phases. Preparation takes 3-4 months — selecting banks, auditors and legal counsel, drafting the S-1 and the prospectus. Then SEC filing and review, 2-3 months, where you file, get comment letters, and amend. Then marketing, 2-3 weeks — pre-marketing testing-the-waters meetings followed by a 7-10 day roadshow at 6-8 meetings a day. Pricing happens the night before trading, and the greenshoe over-allotment option runs for 30 days post-IPO. The critical path delays are almost always in the SEC comment letters, and management is committed 30-50% of its time throughout.", "formula": "~6-9 months total. Prep `3-4 mo` (banks, auditors, legal, S-1) → SEC filing + review `2-3 mo` (comment letters, amendments) → marketing `2-3 wk` (testing-the-waters + 7-10 day roadshow, 6-8 meetings/day) → pricing (night before trading) → greenshoe (30 days post-IPO). Management commitment 30-50% of time.", "example": "", "mistakes": "Underestimating SEC comment-letter rounds as the main schedule risk; treating the roadshow as the bottleneck when the real lead time is S-1 drafting and review.", "followup": "What's a greenshoe? → An over-allotment option (typically 15%) letting underwriters sell extra shares and stabilize the aftermarket. What's testing-the-waters? → Pre-filing meetings with institutions (EGC/JOBS Act provision) to gauge demand before committing to a range.", "rf": "Локальный таймлайн быстрее — около 12 недель vs ~20 в US: Week 0 kickoff → Week 4-6 проспект подан → ЦБ-ревью → Week 8-10 roadshow → Week 11 pricing → Week 12 листинг + стабилизация. Причина — меньше регуляторной нагрузки и отсутствие SOX.", "terms": ["greenshoe", "IPO", "ABO"]}, {"id": "Q338", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "IPO process", "spoken": "An IPO converts private equity into public shares through SEC registration and bookbuilding. First you hire bookrunners — the lead bank runs the process. Then due diligence and the S-1 filing, followed by SEC review and comment letters. Then the roadshow, where management presents to 50-80 institutional investors over 7-10 days. Then bookbuilding — investors submit orders specifying shares and a maximum price. The bookrunner reads the demand and sets the final price the night before trading, then allocates and trading begins. The whole thing takes 4-6 months, with a 15% greenshoe over-allotment option. Crucially, it's the bookrunner who sets the price off the order book — not the company and not the market — which is exactly where the conflict of interest lives.", "formula": "Steps — (1) hire bookrunners, (2) DD + S-1, (3) SEC review + comment letters, (4) roadshow to 50-80 institutions over 7-10 days, (5) bookbuilding (orders = shares + max price), (6) pricing (night before, by bookrunner), (7) allocation + trading. Greenshoe = 15% over-allotment. Who sets the price = the BOOKRUNNER, off the order book.", "example": "Book signal — 10× oversubscription at the top of the range → price at or above range; 3× at the bottom → price low or pull the deal. The art is allocation: give shares to sticky long-only funds, not hedge funds that flip on Day 1.", "mistakes": "Saying \"the market sets the IPO price\" — it's the bookrunner off the book; the structural conflict is that the bank wants a first-day pop (happy repeat investors) while the company wants maximum proceeds (higher price), which is why issuers increasingly weigh direct listings.", "followup": "How does the banker coach the roadshow? → \"Lead with the TAM, then the moat, then the financials.\" How does book quality matter, not just size? → WHO is ordering (long-only vs hedge funds) determines aftermarket stability, not just the oversubscription multiple.", "rf": "mandate → DD → проспект ценных бумаг → ревью ЦБ (~20 рабочих дней) → roadshow → pricing → листинг на MOEX. Таймлайн 3-4 мес vs 5-7 в US. Ведущие банки: ВТБ Капитал, Сбер CIB, Газпромбанк, Ренессанс Капитал, Т-Инвестиции.", "terms": ["greenshoe", "IPO"]}, {"id": "Q348", "block": 7, "block_title": "IPO / ECM (EQUITY CAPITAL MARKETS)", "tier": null, "question": "IPO underpricing", "spoken": "IPO stocks rise about 15% on Day 1 on average — that's underpricing, and it's deliberate. Four causes: information asymmetry, where uncertainty forces a discount; winner's curse compensation, so informed investors still participate; the underwriter incentive, since happy institutions come back for the next deal; and litigation protection, since there's less lawsuit risk if the stock never trades below the IPO price. The cost is that companies collectively leave billions on the table, and the 2020-2021 cycle saw extreme 30-50% Day 1 pops. The banker's target is a 10-15% first-day return — enough to reward investors without the company feeling robbed — and they manage it through the price range and the quality of the book.", "formula": "Average Day-1 pop ≈ 15% (Jay Ritter long-run US data). Causes — info asymmetry, winner's curse compensation, underwriter repeat-business incentive, litigation protection. Optimal target = 10-15% (healthy demand, limited money left on the table).", "example": "If the IPO pops 50%, the CEO calls furious — \"we left $500M on the table.\" If it drops 10%, investors call furious — \"you priced too aggressively.\" The bookrunner threads this by controlling the price range and reading book quality (who's ordering), not just the oversubscription quantity.", "mistakes": "Treating a big first-day pop as unambiguous success — for the issuer it's a wealth transfer to the bank's allocated clients; confusing underpricing (deliberate discount to fair value) with mispricing (a genuine valuation error).", "followup": "Who actually benefits from the pop? → The institutions allocated shares at the IPO price, at the issuer's expense — this is Gurley's \"structurally broken\" critique behind direct listings. Why does litigation risk matter? → Securities suits cluster around IPOs that break issue price, so a small discount is cheap insurance.", "rf": "Локальный first-day pop 10-25% (vs US tech 20-40%): Henderson +25%, Selectel +15%, Европлан ~+10%. Розничный FOMO слабее, чем в US; институциональная аллокация доминирует (~60-70% каждого размещения).", "terms": ["underwriter", "ABO", "IPO", "ERP"]}, {"id": "Q248", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "What is an LBO?", "spoken": "\"A Leveraged Buyout is a transaction where a PE sponsor acquires a company using a large slug of debt — typically 50-70% of the purchase price — and a relatively small equity check of 30-50%. The fund then improves operations, grows EBITDA, uses free cash flow to pay down debt, and exits in 3-7 years via a sale or IPO targeting a 20-25% IRR and 2.5-3.0x MOIC. Returns come from three levers: EBITDA growth, debt paydown, and multiple expansion. The critical point is that an LBO is a transaction structure and a return analysis — it answers 'what return can the sponsor earn at this price?', not 'what is the business intrinsically worth?' That makes it fundamentally different from a DCF or a comps valuation.\"", "formula": "`Equity at exit = Exit EV − Net Debt at exit`; `MOIC = Equity at exit / Equity invested`. Three return levers: EBITDA growth, debt paydown, multiple expansion. Typical structure: 50-70% debt, 30-50% equity, 3-7yr hold, 20-25% IRR / 2.5-3.0x MOIC.", "example": "Buy at 10x on $100M EBITDA = $1,000M EV, financed $600M debt / $400M equity. Over 5 years EBITDA grows, debt is repaid, and you exit at a similar or higher multiple — equity is amplified by the leverage because debt is repaid dollar-for-dollar into equity value.", "mistakes": "Calling an LBO a valuation methodology — it is not. DCF says what a business is worth; the LBO says what a sponsor can pay and still clear its hurdle. A business worth $2B on DCF may only attract $1.5B from PE because the fund needs 20%+ IRR. Also: LBO logic breaks for pre-profit tech (no FCF to service debt), regulated utilities (leverage caps), and heavy-reinvestment businesses (no excess FCF to deleverage).", "followup": "\"Why use debt at all?\" — Leverage amplifies equity returns and the tax shield on interest lowers the effective cost of capital. \"When do you build an LBO in IB?\" — To set the floor price in a sell-side auction (what can PE afford?) and to advise a PE client on pricing. \"What kills a deal in IC?\" — Base-case IRR below ~18%.", "rf": "Classical LBO is effectively unavailable in Russia 2024-2026 — pre-tax cost of debt of 23-28% (key rate ~20% plus spread) exceeds the IRR hurdle, so debt service eats all the FCF. The market substitutes growth equity: 10-20% leverage vs 60-80% in the US, with target IRR pushed to 40-50% to compensate for country risk, currency, and illiquidity. Active sponsors: Baring Vostok legacy, Эльбрус Капитал, Da Vinci, РФПИ.", "terms": ["multiple expansion", "debt paydown", "net debt", "leverage", "EBITDA", "MOIC", "EBIT", "IRR"]}, {"id": "Q249", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "Key drivers of LBO returns", "spoken": "\"LBO equity returns come from three levers. First, EBITDA growth — organic and through operational improvement — which is usually the largest and highest-quality bucket, around 40-50% of value created. Second, debt paydown, which is mechanical: every dollar of FCF used to repay debt converts dollar-for-dollar into equity, typically 25-35%. Third, multiple expansion — exiting at a higher multiple than entry — which is the least controllable and most market-dependent, usually 20-30%. The quality test a senior will apply is the mix: if more than half the return comes from multiple expansion, the deal was lucky, not well-executed. The best funds optimize all three rather than relying on leverage arbitrage.\"", "formula": "`EBITDA growth contribution = (Exit EBITDA − Entry EBITDA) × Entry multiple`; `Multiple expansion = (Exit multiple − Entry multiple) × Exit EBITDA`; `Debt paydown = debt repaid over hold`. Healthy mix: EBITDA growth 40-50%, debt paydown 25-35%, multiple expansion 20-30%.", "example": "Entry 10x on $100M EBITDA → $1,000M EV, 60% debt / 40% equity ($400M). Exit Year 5: EBITDA $130M, exit at 11x → EV $1,430M, debt down to $350M → exit equity $1,080M. MOIC = 2.7x, IRR ≈ 22%. Attribution: EBITDA growth (130−100)×10 = $300M; multiple expansion 130×(11−10) = $130M; debt paydown $250M; total value created $680M.", "mistakes": "Treating multiple expansion as a repeatable \"strategy\" — sophisticated LPs know it is largely market-driven. Confusing the highest-quality lever (operational EBITDA growth) with the easiest (leverage). Ignoring that in rising-rate vintages multiple expansion can turn negative, making operational improvement the only reliable source.", "followup": "\"Which lever is highest quality and why?\" — EBITDA growth,
