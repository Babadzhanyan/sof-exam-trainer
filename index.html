because it reflects execution the GP controls, not market beta. \"What happens to the bridge in a rate-hike vintage?\" — Multiple expansion compresses or goes negative, so debt is more expensive and operational improvement carries the whole return.", "rf": "In Russian growth-equity deals the mix tilts to EBITDA growth (50-60%), with multiple expansion held conservatively at 10-15% and debt paydown a small bucket (25-35% applied to low leverage = small absolute amount). Pre-2022 the picture was different — Baring Vostok's Yandex exit was dominated by multiple expansion and the IPO premium.", "terms": ["multiple expansion", "exit multiple", "debt paydown", "leverage", "EBITDA", "EBIT", "LBO"]}, {"id": "Q250", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "Paper LBO — full walkthrough", "spoken": "\"A paper LBO is the 10-minute mental-math exercise PE firms use to test whether you understand the mechanics. The workflow is four steps. One, set entry: EV = entry multiple × EBITDA, then split into debt and equity. Two, project operations: grow EBITDA, and since D&A ≈ CapEx and working capital change ≈ 0 in the simplified case, FCF ≈ net income ≈ (EBITDA − interest) × (1 − tax). Three, sweep that cumulative FCF against the debt to get debt remaining at exit. Four, compute exit EV = exit multiple × exit EBITDA, subtract remaining debt to get exit equity, then MOIC = exit equity / equity invested, and convert MOIC to IRR with the standard table. Precision isn't the point — they want to see you structure it and move fast.\"", "formula": "`FCF ≈ NI ≈ (EBITDA − Interest) × (1 − t)` when D&A ≈ CapEx and ΔWC ≈ 0. `Exit equity = Exit EBITDA × Exit multiple − Debt remaining`. `MOIC = Exit equity / Equity invested`. MOIC→IRR (5yr): 2.0x≈15%, 2.5x≈20%, 3.0x≈25%, 3.5x≈28%, 4.0x≈32%.", "example": "EBITDA $200M growing 5%, entry 8x → EV $1,600M, debt $1,000M (5x) at 6%, equity $600M, tax 25%, exit 8x in Year 5. Year-0 NI ≈ ($200M − $60M)×0.75 ≈ $105M; cumulative FCF over 5 years ≈ $649M → debt down to $351M. Exit EBITDA $255M × 8 = $2,040M → exit equity $1,689M. MOIC = $1,689M / $600M = 2.8x; IRR ≈ 23%.", "mistakes": "Diving in before clarifying non-standard inputs (negative working capital, CapEx ≠ D&A, PIK interest) — wrong assumptions burn the full 10 minutes. Forgetting that interest falls each year as debt is repaid. Trying for spreadsheet precision instead of a fast, structured estimate.", "followup": "\"Per dollar, what's worth more — EBITDA growth or debt paydown?\" — A dollar of permanent EBITDA growth is amplified by the exit multiple ($1 → exit-multiple dollars of equity, e.g. ~$8 at 8x), while a dollar of debt paydown converts one-for-one into equity. So EBITDA growth has the bigger per-dollar payoff at exit — but debt paydown is certain and mechanical, whereas EBITDA growth must actually be achieved, sustained, and depends on the exit multiple holding. That trade-off — magnitude vs certainty — is the discriminator. \"What if they give you PIK?\" — PIK accrues to the debt balance instead of consuming cash, so annual FCF is higher but exit debt is larger.", "rf": "At a 20%+ key rate, interest expense consumes 15-20% of EBITDA in year one, so the classical 5-6x debt structure simply doesn't clear. A realistic Russian paper LBO uses sub-2x debt or no leverage at all, with target gross IRR of 25-35% to price in sanctions, currency volatility, and exit constraints.", "terms": ["working capital", "exit multiple", "EBITDA", "sweep", "MOIC", "EBIT", "IRR", "LBO"]}, {"id": "Q251", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "What makes a good LBO candidate?", "spoken": "\"A good LBO candidate is screened like a credit investment first and an equity investment second, because the leverage only works if the business reliably services and repays debt. The core criteria are: stable, predictable cash flows — ideally recurring or contractual revenue with low cyclicality; low CapEx intensity so EBITDA actually converts to free cash flow for debt paydown; and clear operational improvement levers the sponsor can execute, like margin expansion or pricing. On top of that you want tangible assets for collateral and a clear exit path with a real buyer universe. Red flags are customer concentration, heavy or growth CapEx, and cyclical or commodity-exposed end-markets.\"", "formula": "Five-feature screen: (1) stable recurring cash flows, (2) strong market position / moat, (3) low CapEx intensity, (4) underlevered balance sheet, (5) clear operational improvement opportunities. Red flags: customer concentration >20%, cyclicality, regulatory overhang, growth CapEx that competes with debt service.", "example": "ServiceCo — $100M EBITDA, 90% recurring revenue, 5% maintenance CapEx/revenue, 30% margin with room to 38%. Bought at 8x ($800M EV), 5.5x leverage ($550M debt), $250M equity. ~$55M annual FCF covers amort + interest; in 5 years EBITDA reaches $140M, leverage falls to ~2.5x, exit at 8x = $1.12B EV, ~$570M equity, ~2.3x MOIC, ~18% IRR. Real winners: Hilton (asset-light fee income survived a 40% RevPAR decline), HCA (counter-cyclical healthcare demand), Dell (transformation thesis plus founder alignment). Real failures: Toys\"R\"Us (levered a structurally declining retailer into Amazon disruption → Chapter 11), Energy Future Holdings (a leveraged bet on rising gas prices that the shale revolution destroyed → largest LBO bankruptcy ever).", "mistakes": "Saying \"high growth\" is a good LBO trait — growth requires reinvestment that competes with debt service. Confusing revenue stability with EBITDA stability — a fixed-cost base amplifies revenue swings at the EBITDA line. Ignoring working capital — 90-day DSO against 30-day DPO is a cash trap.", "followup": "\"How would you adjust criteria for a cyclical business?\" — Underwrite lower leverage, stress the trough, and require covenant headroom. \"What leverage for SaaS vs manufacturing?\" — SaaS supports higher leverage on recurring revenue but watch churn; manufacturing is capped by CapEx and cyclicality. \"Does the rule bend in low-rate environments?\" — Yes; at 4% cost of debt even moderately cyclical names get levered (the 2020-2021 vintage).", "rf": "In Russia 2024-2026 the better candidates are FMCG, logistics, and B2B services with recurring demand; poor candidates are oil & gas (cyclical plus sanctions), financials (regulatory), and capital-intensive tech. Deals get done at 4-5x EBITDA with ~20% leverage — structurally growth equity rather than a classical LBO.", "terms": ["debt paydown", "leverage", "EBITDA", "EBIT", "LBO", "SPO"]}, {"id": "Q252", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "How is debt structured in an LBO?", "spoken": "\"LBO debt is layered by seniority to maximize total leverage while keeping the blended cost manageable, because senior secured tranches accept lower rates for first claim on assets and junior tranches demand more for taking more risk. At the top is the revolver — a liquidity facility drawn as needed, cheapest, first lien. Then Term Loan A, amortizing and bank-held, and Term Loan B, mostly bullet and held by institutional investors at a slightly higher spread. Below the senior secured layer sit senior unsecured notes — fixed rate, longer maturity — and at the bottom mezzanine at 12-15%, often with equity warrants. Total leverage is typically 5-7x EBITDA. The key nuance is covenants: bank debt carries maintenance covenants tested quarterly, while bonds are incurrence-only and far less restrictive.\"", "formula": "Stack top-to-bottom: Revolver (1st lien, SOFR+200-300) → Term Loan A (1st lien, amortizing, SOFR+200-400) → Term Loan B (1st lien, bullet, SOFR+300-500) → Senior unsecured notes (fixed 6-9%) → Mezzanine (12-15%, subordinated, often warrants). Total leverage ~5-7x, up to 8-9x in aggressive vintages. Covenants: maintenance (bank debt, quarterly) vs incurrence (bonds, only on new actions).", "example": "$1B EV at 6.5x leverage = $650M debt. Structure: $50M revolver (undrawn at close), $150M TLA at SOFR+250 (5yr, 5% amort), $300M TLB at SOFR+400 (7yr, 1% amort), $100M senior notes at 7.5% fixed (8yr), $50M mezz at 13% (9yr). Equity check $350M; blended cost of debt ~6.5%; Year-1 interest ~$40M.", "mistakes": "Modeling one blended rate across all tranches — it hides the real cash-flow dynamics. Forgetting the revolver charges interest only on drawn amounts plus a commitment fee on the undrawn portion. Blurring maintenance vs incurrence covenants when discussing covenant risk.", "followup": "\"TLB vs high-yield bond — how do you choose?\" — TLB is prepayable without penalty (flexibility) and underwrites faster in a competitive auction; bonds have looser incurrence-only covenants but call protection. \"If SOFR rises 200bps, which tranche hurts most?\" — The floating-rate tranches (revolver, TLA, TLB); fixed-rate notes and mezz are insulated. \"What changes in a $10B+ deal?\" — More high-yield alongside TLB and increasingly cov-lite structures; mid-market is moving to unitranche.", "rf": "Russian LBO debt is overwhelmingly bank loans (90%+) from Сбер/ВТБ/ГПБ — bullet, 3-5 years. The US-style layering doesn't apply: Eurobonds are frozen, there is no institutional Term Loan B market (no CLOs/loan funds), no real mezzanine market (rare ad-hoc Сбер CIB deals at 25-30% are too expensive), and no unitranche private-credit funds at scale. Net result: ~10-20% bank debt plus 80-90% sponsor equity with management rollover. FAS approval is required above ~800M combined revenue, and the government commission signs off on strategic assets (O&G, defense, media).", "terms": ["mezzanine", "covenant", "leverage", "EBITDA", "EBIT", "LBO"]}, {"id": "Q256", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "Walk me through the LBO value creation bridge.", "spoken": "\"The value creation bridge decomposes the total equity return into its sources, and it's the single most important analytical framework in PE — every IC memo has it. You start with entry equity and walk to exit equity through four steps. One, EBITDA growth contribution = change in EBITDA times the entry multiple. Two, multiple expansion = change in multiple times the exit EBITDA. Three, debt paydown = total debt repaid over the hold, which flows straight to equity. Four, subtract fees and transaction costs. The sum has to reconcile to exit equity minus entry equity. Presented as a waterfall, it tells a senior immediately whether the GP created value operationally — which is defensible — or just rode the market through multiple expansion, which is not.\"", "formula": "`EBITDA growth = (Exit EBITDA − Entry EBITDA) × Entry multiple`; `Multiple expansion = (Exit multiple − Entry multiple) × Exit EBITDA`; `Debt paydown = total debt repaid`; then `− fees/transaction costs`. Reconciliation: sum of steps = Exit equity − Entry equity. Quality read: majority from EBITDA growth = good deal; >50% from multiple expansion = market-dependent.", "example": "Entry $200M EBITDA × 8x = $1.6B EV, $1.0B debt / $600M equity. Exit Year 5: $280M EBITDA × 9x = $2.52B EV, debt down to $600M → exit equity $1.92B. EBITDA growth = (280−200)×8 = $640M; multiple expansion = (9−8)×280 = $280M; debt paydown = $1.0B−$600M = $400M; total = $1,320M. Check: $1,920M − $600M = $1,320M. MOIC = 3.2x, IRR ≈ 26%.", "mistakes": "Double-counting the interaction term between EBITDA growth and multiple expansion — it must be allocated by a stated convention. Forgetting to subtract transaction and monitoring fees. Presenting multiple expansion as a deliberate strategy when LPs and MDs treat it as market-driven and uncontrollable.", "followup": "\"What if EBITDA grows but the multiple compresses?\" — The multiple-expansion bucket goes negative and partly offsets operational gains; the deal lives or dies on growth plus deleveraging. \"How do you attribute value with add-on acquisitions?\" — Split organic vs inorganic EBITDA and treat acquired EBITDA's purchase multiple separately. \"When does the bridge break?\" — Mid-hold dividend recaps, equity cures, or partial exits require a full cash-on-cash waterfall instead.", "rf": "In Russian growth-equity deals the bridge skews to operations: ~60-70% EBITDA growth, 20-30% multiple expansion (IPO or secondary sale), and only 10-15% from debt paydown given the low leverage — the mirror image of a US LBO's roughly 40/25/35 split.", "terms": ["multiple expansion", "exit multiple", "debt paydown", "EBITDA", "EBIT", "NCI"]}, {"id": "Q264", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "What is the difference between a GP and LP in a PE fund?", "spoken": "\"The GP-LP relationship is the foundational structure of private equity. The GP is the PE firm itself — KKR, Blackstone — which raises the fund, sources and executes deals, sits on boards, drives value creation, and runs the exits. The GP earns a 1.5-2% management fee on committed capital during the investment period and 20% carried interest on profits above a preferred return, and it commits 1-5% of the fund as its own skin in the game. The LPs are the capital providers — pension funds, sovereign wealth funds, endowments, insurers, family offices. They commit capital, fund capital calls, receive distributions, have limited liability capped at their commitment, and no say in investment decisions. The key tension is incentive alignment: carry only pays if the fund performs, but the management fee creates a counter-incentive to raise ever-larger funds regardless of opportunity.\"", "formula": "GP economics: 1.5-2% management fee (committed capital during investment period, stepping to invested capital after) + 20% carry above an ~8% hurdle + 1-5% GP commit. LP: commits capital, limited liability, no control. Carry computed whole-fund (European) vs deal-by-deal (American).", "example": "$2B fund, GP commits 3% = $60M. Management fee 2% × $2B = $40M/year for the 5-year investment period (~$200M total, then declining on invested capital). Fund returns 2.5x = $5B → $3B profit. 8% preferred return ≈ $800M to LPs first; on the remaining $2.2B, GP carry = 20% = $440M and LPs take 80% = $1.76B. The GP turns $60M of commit into roughly $150M back on the commit plus $440M carry plus ~$200M of gross fees (which also fund the firm's salaries and overhead).", "mistakes": "Saying the GP \"invests their own money\" without flagging that it's only 1-5% — the vast majority is LP capital. Mixing up management fee on committed vs invested capital. Forgetting that in a European waterfall carry is computed on the whole fund, so one bad deal can erase carry earned on the winners.", "followup": "\"Whole-fund vs deal-by-deal carry?\" — European is whole-fund and LP-friendly; American is per-deal and GP-friendly, with a clawback. \"What is clawback?\" — A provision forcing the GP to return excess carry if the fund ultimately underperforms the hurdle. \"What is co-invest?\" — LPs investing directly alongside the fund with no fees or carry, which dilutes GP economics.", "rf": "Track record is read through DPI, TVPI, and vintage-normalized IRR, with top-quartile ~20%+ net to LPs. The historical Russian benchmark is Baring Vostok (Яндекс, Ozon, Tinkoff); other names include Эльбрус Капитал (TMT), Da Vinci (mid-market generalist), and РФПИ as a sovereign partner.", "terms": ["preferred", "carry", "ABO"]}, {"id": "Q265", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "Walk me through the PE carry waterfall.", "spoken": "\"The carry waterfall is the mechanism that aligns GP and LP incentives by ensuring the GP earns carry only after LPs hit a minimum return. The European, whole-fund waterfall has four tiers. Tier one, return of capital — all distributions go to LPs until they've recovered their entire committed capital. Tier two, preferred return — LPs earn an 8% compounded annual return on drawn capital, the hurdle. Tier three, GP catch-up — 100% of the next distributions go to the GP until the GP has reached 20% of total cumulative profit. Tier four, the 80/20 split on everything remaining. The American, deal-by-deal version applies the same logic per deal, which is more GP-friendly but carries a clawback so the GP returns excess carry if the fund ultimately underperforms.\"", "formula": "Four tiers: (1) Return of capital → LP; (2) Preferred return ~8% compounded on drawn capital → LP; (3) GP catch-up (100% to GP until GP has 20% of total profit); (4) 80/20 LP/GP split. European = whole-fund (LP-friendly); American = deal-by-deal (GP-friendly) + clawback. Soft hurdle with catch-up (standard) vs hard hurdle (carry only on excess above 8%).", "example": "$1B fund, fully deployed, $1.8B total proceeds → $800M profit. Tier 1: LPs get $1B back. Tier 2: ~$360M preferred return to LPs. Tier 3: GP catch-up of ~$90M. Tier 4: remaining ~$350M splits 80/20 → $280M LP / $70M GP. Totals: LP = $1B + $360M + $280M = $1.64B; GP carry = $90M + $70M = $160M = exactly 20% of the $800M profit.", "mistakes": "Treating the 8% preferred as a simple return on committed capital — it's 8% compounded on drawn capital. Getting catch-up backwards: it isn't \"20% of the remainder,\" it's 100% to the GP until the GP holds 20% of total profit. Believing clawback is easily enforced — GPs have often already spent and been taxed on the carry, which is exactly why European waterfalls are becoming standard.", "followup": "\"Full catch-up vs 80/20 catch-up?\" — Full sends 100% to the GP during catch-up; an 80/20 catch-up shares it, slowing how fast the GP reaches its 20%. \"Hard vs soft hurdle?\" — Hard pays carry only on profit above 8%; soft (with catch-up) pays carry on all profit once 8% is cleared — dramatically different economics. \"Tax on carry?\" — In the US it is generally long-term capital gains.", "rf": "Post-2022 the LP base flipped: Western pension funds, endowments, and insurers stopped allocating almost entirely, leaving domestic НПФ (Сбербанк, Газфонд), family offices, and РФПИ as anchor, with new capital from the Middle East (ADIA, Mubadala, PIF) and China (CIC). The hurdle is set in rubles at ~15-18% rather than 8%, and carry is taxed at 15% НДФЛ for individual partners versus ~20% long-term capital gains in the US. Billion-dollar mega-funds are rare outside РФПИ.", "terms": ["preferred", "carry", "ABO", "ERP"]}, {"id": "Q277", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "What is a PE fund's lifecycle (vintage, deployment, harvest)?", "spoken": "\"A PE fund runs about ten years. Year zero is the final close, when LPs commit capital — that year defines the vintage. The first three to five years are the deployment period: the GP calls capital as it identifies deals, typically building a portfolio of 10-15 companies. The remaining years are the harvest period: exiting through sales, IPOs, or recaps and distributing proceeds back to LPs. There's usually a two-year extension option, with LP consent, for assets that need more time. Fees start at 1.5-2% on committed capital during deployment and step down to invested capital during harvest, and carry only flows after LPs get their capital back plus the preferred return. Understanding this explains GP behavior — late in the investment period a GP faces 'use it or lose it' pressure that can push deals at stretched valuations.\"", "formula": "Year 0 final close (= vintage) → Years 1-5 deployment (capital calls, 10-15 companies) → Years 3-10 harvest (exits, distributions) → Years 10-12 extension with LP consent. Fee steps from committed → invested capital. Carry only after return of capital + preferred return.", "example": "Fund VII, vintage 2020, $2B committed. 2020-2024: deployed $1.8B across 12 deals (~$150M equity each). 2023-2029: exited 8 deals returning ~$2.5B. 2029-2031: two extensions to exit the last four. Final DPI ~2.4x → LPs received ~$4.8B on $2B; GP earned roughly $160M in fees and ~$400M in carry.", "mistakes": "Confusing committed with invested capital — fees and returns are computed differently on each. Assuming carry starts immediately — it only flows after return of capital plus preferred return. Treating extensions as routine — they require LP consent and signal that exits are running late.", "followup": "\"What's the GP's incentive in Year 7 with unrealized deals?\" — Often to sell quickly, even at lower multiples, to lock in DPI and start fundraising, since DPI is the fundraising currency — or to roll assets into a continuation vehicle. \"What are DPI, RVPI, TVPI?\" — Distributed, residual, and total value over paid-in capital. \"What is recycling?\" — Reinvesting early-exit proceeds during the investment period instead of distributing, which lifts investable capital above the committed amount.", "rf": "", "terms": ["preferred", "carry", "IPO", "ABO"]}, {"id": "Q262", "block": 8, "block_title": "LBO / PRIVATE EQUITY", "tier": "T1", "question": "What are the main LBO exit strategies?", "spoken": "\"There are four main exit routes, and the exit thesis has to be part of the investment thesis from day one — you don't buy a company without knowing who will buy it and why they'll pay more. Trade sale to a strategic buyer is the most common, roughly 45-60% of exits, and usually the highest multiple because strategics pay for synergies. Secondary buyout — selling to another PE fund — is about 25-30%, common when there's still a growth runway but the current sponsor has maximized its value-add. IPO is the least common, 10-15%, market-dependent, needs real scale and a liquid float, and comes with a lock-up and an IPO discount. Dividend recaps are a partial monetization, and GP-led continuation funds are a newer route. The exit you underwrite influences everything — the entry multiple, how you build the company, how you structure the debt.\"", "formula": "Four exits with rough frequency: trade/strategic sale 45-60% (highest multiple, synergies), secondary buyout 25-30% (PE-to-PE), IPO 10-15% (needs scale, lock-up + IPO discount), dividend recap ~10% (partial). Newer: GP-led continuation funds / secondaries.", "example": "PE buys HealthCo for $600M ($80M EBITDA × 7.5x), holds 5 years, EBITDA grows to $130M. Options: trade sale at 10x = $1.3B; SBO at 9x = $1.17B; IPO at 8.5x (IPO discount) = $1.1B. The fund takes the trade sale — highest value, clean exit. Real examples: Hilton (IPO 2013, ~3x MOIC, then remaining block sold to strategics — a hybrid); Dell take-private 2013 → re-IPO 2018 at a far higher value; Bain's Burger King dividend recap pulled out ~$1.4B before the IPO (controversial — it left the company more levered).", "mistakes": "Assuming IPO is best because public multiples look highest — that ignores the lock-up, the IPO discount, 6-7% underwriter fees, and ongoing public-company costs. Not stress-testing the buyer universe at entry — if only 2-3 acquirers exist, exit risk is concentrated. Dismissing secondary buyouts as inferior — an SBO can deliver strong returns when the asset genuinely has another phase of value creation.", "followup": "\"What is a dual-track process?\" — Running an IPO and a trade-sale process simultaneously to maximize competitive tension and optionality. \"How does exit strategy affect entry multiple?\" — A clear high-multiple strategic exit can justify paying up at entry; thin exit optionality forces a lower entry price. \"What is exit readiness?\" — 3+ years of audited financials, pre-prepared vendor due diligence, a management team that presents independently, and a clean legal/regulatory profile. \"What's the worst case?\" — A stranded asset: too large for trade sale (antitrust), too small for IPO, and PE won't pay fair value — increasingly addressed via continuation funds.", "rf": "Russian exits 2024-2026 lean on MOEX IPOs (Henderson, Selectel in 2024) and strategic sales to domestic corporates (X5, Сбер, Яндекс); secondary buyouts are rare given the small PE universe and dividend recaps are limited. The HeadHunter playbook — Эльбрус Капитал's 2016 entry to a 2019 NASDAQ IPO — is impossible post-2022 sanctions; US-exchange exits are closed. Holding periods run 5-7 years, with some legacy Baring Vostok positions held 10+ years.", "terms": ["synergies", "IPO", "SPO", "ABO"]}, {"id": "Q361", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": null, "question": "Standalone minority valuation approaches", "spoken": "\"Standalone minority valuation means valuing a non-controlling stake on its own, so every method reflects minority value with no control premium. The core toolkit is DCF for intrinsic value, trading comps from public peers, DDM for banks and FIG, sum-of-the-parts for conglomerates, and LBO as a floor. I present all of these on a football field chart, and the overlap zone across methods is the fair-value range for a minority stake. Because it's a minority position, I'd then apply a discount for lack of control and, if it's illiquid, a discount for lack of marketability.\"", "formula": "`DLOC (lack of control) 15–25% + DLOM (lack of marketability) 15–30% → combined ~30–50% discount vs controlling-stake value`", "example": "100% control value = $1,000M → DLOC 20% → $800M → DLOM 20% → $640M implied minority value (~36% combined discount).", "mistakes": "(1) Embedding a control premium into a minority valuation — methods here are minority by construction. (2) Double-stacking DLOC and DLOM mechanically without checking the asset is actually illiquid — listed minority stakes need little or no DLOM. (3) Treating precedent minority transactions as primary evidence; they're rare and only informative.", "followup": "Difference vs controlling valuation? → control premium is what a buyer pays for control + synergies (see Q362). When does DLOM go to zero? → freely tradable listed shares. DDM vs DCF for the minority case? → DDM for banks/FIG where dividends are the cleanest cash to equity.", "rf": "На MOEX мало прямых аналогов, поэтому comps часто берут global с 30–50% страновым/ликвидным дисконтом; precedent minority deals почти отсутствуют post-2022. WACC для РФ обычно 22%+ (country risk premium через спред ОФЗ к EM-бенчмарку), что само по себе сжимает DCF-стоимость до применения DLOC/DLOM.", "terms": ["control premium", "LBO", "DCF", "DDM"]}, {"id": "Q362", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": null, "question": "Transaction / controlling stake approaches", "spoken": "\"Controlling-stake valuation differs from minority because it captures the value of control. The three approaches are precedent M&A transactions, which already embed a control premium and synergies; premiums-paid analysis, which looks at historical takeover premia over the unaffected price — typically 20–40% in most sectors; and LBO analysis, which gives the PE buyer's maximum willingness to pay. In a fairness opinion I present both the minority valuation, meaning what it trades at, and the control valuation, meaning what a buyer would pay — and the gap between them is the control premium the acquirer has to justify to its board.\"", "formula": "`Control value − Minority (standalone) value = Control premium` · `Takeover premium = (Offer price / Unaffected share price) − 1`, historically ~20–40%", "example": "Unaffected price $40 → offer $52 = 30% premium. If standalone DCF/comps imply ~$40 minority value, that $12 spread is the control premium the buyer defends with synergies + control rights.", "mistakes": "(1) Stale precedents — transactions older than ~3 years in a fast-moving market lose comparability. (2) Double-counting synergies: precedent multiples already embed buyer synergies, so don't add a separate synergy bump on top. (3) Calling LBO a \"control valuation upper bound\" — LBO is the floor / sponsor-affordability reference, not the max a strategic pays.", "followup": "Why is LBO a floor not a ceiling? → no synergies, IRR hurdle ~20%+, leverage risk → sponsor pays less than a strategic. What drives premium size? → competitive process, synergy magnitude, control rights, scarcity of the asset.", "rf": "Control premium в РФ обычно выше, ~25–40% для прямых контроль-сделок, из-за большего liquidity discount на минорных долях. Squeeze-out при консолидации >95% требует обязательного выкупа по цене не ниже fair value, определяемой независимым оценщиком (ФЗ-208, ст. 84.8). Реальные ориентиры: ТМК делистинг 2020 (~30%), Детский мир выкуп 2022 (~25%), продажа Магнита Marathon Group 2018 (~33%).", "terms": ["fairness opinion", "control premium", "synergies", "precedent", "LBO"]}, {"id": "Q363", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": null, "question": "Football field and valuation range", "spoken": "\"A football field is the visual summary of every valuation method — a set of horizontal bars showing the min, median, and max implied value from each approach, with the x-axis as implied price per share or EV. Typical bars are the 52-week trading range, trading comps, DCF, precedent transactions, LBO, and analyst targets. The intersection of the ranges is the negotiating sweet spot, and it appears in essentially every pitch book and fairness opinion. The key point is that it's also a persuasion tool: the sell-side banker frames it to show the client is undervalued, the buy-side banker frames it to show the target is fairly priced — same data, different framing.\"", "formula": "Bars to include: 52-week range, trading comps, DCF, precedent transactions, LBO floor, analyst targets · the overlap/convergence zone = recommended valuation range", "example": "If DCF $42–48, comps $40–46, precedents $44–52, LBO floor $30–38 → the recommended range clusters ~$42–48 where the credible methods overlap; an offer of $44 sits inside, an offer of $38 is at/below the LBO floor.", "mistakes": "(1) Presenting a single point estimate instead of a range — the spread itself is the insight. (2) Letting LBO or analyst-target bars drive the recommendation; they're floor / sanity-check references, not primary. (3) Ignoring why methods diverge — a 30%+ spread signals something fundamental is being missed (growth, rate environment, sentiment).", "followup": "What does the board ask first? → \"where does the offer fall relative to the range?\" When is your valuation \"robust\"? → when methods converge within roughly ±10%. Which bar is least weighted? → 52-week range and analyst targets (market references, not intrinsic).", "rf": "Для РФ football field часто «сжимается»: LBO bar почти исчезает (cost of debt 25–30%), precedent bar тонкий (мало публичных сделок), comps bar ограничен нехваткой MOEX-аналогов. Остаётся DCF (диапазон широкий из-за WACC uncertainty 18–25%) + 1–2 comps + 52-week range, и sell-side обычно показывает конвергенцию 2–3 методов.", "terms": ["fairness opinion", "precedent", "DCF", "LBO", "SPO"]}, {"id": "Q102", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": "T1", "question": "What is a football field chart?", "spoken": "\"A football field chart is a horizontal bar chart that puts every valuation method side by side, each bar showing the low–mid–high implied value, with the x-axis as implied share price or EV. The standard bars are the 52-week range, trading comps, DCF, precedent transactions, and the LBO floor, plus analyst targets as a reference. The overlap zone across methods is the defensible valuation range and the negotiating sweet spot. It's the single most important deliverable an IB team produces — it's the one slide the board actually looks at, and the first question is always 'where does the offer fall relative to the range?'\"", "formula": "Methods cluster into a MECE set: `I Intrinsic` (DCF on FCFF/FCFE, APV, DDM/Gordon, residual income) · `II Relative` (EV/EBITDA, EV/EBIT, EV/Sales; P/E, P/B, P/TBV) · `III Transaction/control` (precedents, takeover-premium analysis, LBO floor) · `IV Asset/special` (SOTP, NAV/RNAV, replacement cost, liquidation) · `V External references` (analyst targets, 52-week range — sanity check, not standalone)", "example": "```\nMethod              | $30   $35   $40   $45   $50   $55", "mistakes": "(1) Treating analyst targets / 52-week range as a valuation method rather than a sanity check. (2) No clear overlap zone — if the recommended range isn't visually obvious, the slide fails. (3) Mixing minority and control methods on one axis without flagging that precedents/LBO embed a control premium.", "followup": "Why is LBO the floor? → sponsor needs ~20%+ IRR, no synergies → lowest credible buyer. When does the range collapse to debt? → distressed case: if equity value is negative, EV = Net Debt and all discounted CF accrues to debt holders. For a bank? → only DDM / excess return + P/BV, P/TBV comps (+ precedents if available).", "rf": "При оценке РФ компаний football field «сжимается»: LBO bar почти исчезает (cost of debt 25–30%), precedent bar тонкий, comps ограничены нехваткой аналогов — остаётся DCF + 1–2 comps + 52-week range. Пример: IPO МТС Банка (2024) — football field строился на DCF + банковских comps (P/BV) + precedent (IPO Совкомбанка).", "terms": ["EV/EBITDA", "precedent", "EBITDA", "Gordon", "FCFF", "SOTP", "FCFE", "EBIT"]}, {"id": "Q139", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": "T2", "question": "SBC in valuation — real cost or add-back?", "spoken": "\"Stock-based comp is a real economic cost even though it's non-cash, because it dilutes existing shareholders — issuing 5% of the company in new shares each year is economically the same as paying employees 5% of market cap in cash. So I treat SBC as an operating expense and I don't add it back to get a flattering 'adjusted EBITDA'; buy-side PMs and most top banks do the same. The one place add-back is correct is the cash flow statement, where SBC is genuinely non-cash. The key is consistency: if you add SBC back to reach unlevered FCF, you must capture the dilution by using fully diluted shares; otherwise you double-count the benefit.\"", "formula": "Two internally-consistent treatments only: `(a) UFCF after SBC expense + basic shares`, or `(b) UFCF with SBC added back + fully diluted shares (TSM)`. Default in practice: UFCF after SBC adjustment with diluted shares.", "example": "Revenue $1B, EBITDA $200M, SBC $50M → EBITDA ex-SBC = $150M. At 10×: $200M × 10 = $2.0B vs $150M × 10 = $1.5B → ignoring SBC overstates EV by ~$500M. Per share: $2.0B ÷ 105M diluted = $19.05 vs $2.0B ÷ 100M basic = $20.00 → ~5% dilution.", "mistakes": "(1) Adding SBC back AND using basic shares — double-counts the benefit. (2) \"It's non-cash so it doesn't matter\" — the dilution is real and permanent. (3) Comparing peers on EBITDA when one runs 15% SBC/revenue and another 3% — EBITDA-based comps become misleading; normalize.", "followup": "How does SBC flow through the 3 statements? → IS expense ↓ pre-tax income; CFS add-back (non-cash); BS ↑ APIC/equity. → Q44. What's the Treasury Stock Method? → Q39.", "rf": "Яндекс до 2022 платил ~3–5% revenue в stock comp через NASDAQ; после редомициляции на МКПАО — phantom shares (cash-settled, ближе к cash-расходу). У Сбера/ВТБ/Лукойла SBC минимален. Для DCF — вычитать SBC из FCF как реальный экономический расход.", "terms": ["dilution", "diluted", "EBITDA", "UFCF", "EBIT"]}, {"id": "Q140", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": "T2", "question": "NCI (Non-Controlling Interest) in valuation", "spoken": "\"NCI goes into EV for consistency. When a parent owns more than 50% of a subsidiary it consolidates 100% of that sub's revenue and EBITDA into its statements — but if it only owns 70%, the other 30% belongs to minority shareholders. Adding NCI to EV recognizes that 30% claim as another capital provider, so the EV/EBITDA multiple isn't understated. On the income statement side it's the mirror image: I subtract the NCI share of net income to get earnings attributable to the parent for P/E. And in a sum-of-the-parts I value each subsidiary at 100%, then take the parent's ownership percentage — using market cap for the minority piece if the sub is listed.\"", "formula": "`EV = Market Cap + Net Debt + Preferred + NCI − Equity (associate) investments` · P/E uses NI attributable to parent (= consolidated NI − NCI share)", "example": "Parent owns 70% of Sub; Sub EBITDA $100M (fully consolidated). At 8×, Sub EV = $800M → NCI = 30% × $800M = $240M. Include NCI: EV/EBITDA = $800M / $100M = 8.0×. Wrongly excluding NCI ($560M / $100M = 5.6×) makes the company look artificially cheap.", "mistakes": "(1) Excluding NCI from EV while keeping 100% consolidated EBITDA — inconsistent, understates the multiple. (2) Confusing NCI in the BS equity section with NCI as a capital claim in the EV bridge. (3) Forgetting to subtract NCI's share of NI when computing parent P/E. (4) Adding NCI at book value instead of fair value — book often sits well below market.", "followup": "Why subtract equity investments (20–50% stakes) from EV? → equity-method, NOT consolidated into EBITDA, so they're like cash equivalents. → Q88. SOTP mechanics? → Q104. When can you ignore NCI? → immaterial sub (<5% of consolidated EBITDA).", "rf": "Для РФ холдингов NCI часто крупный и его лучше брать по fair value, а не book: АФК Система имеет значимый NCI через публичные «дочки» (МТС, Ozon), оцениваемый по рыночной капитализации × (1 − доля материнской). Book NCI здесь существенно занижает стоимость.", "terms": ["preferred", "EV/EBITDA", "net debt", "EBITDA", "MIRR", "EBIT", "IRR", "P/E"]}, {"id": "Q93", "block": 9, "block_title": "PULLING TOGETHER / VALUATION ISSUES", "tier": "T2", "question": "How do pension obligations affect EV?", "spoken": "\"Unfunded pension obligations are debt-like, so I add the net unfunded amount to EV in the bridge, just like debt. The net unfunded figure is the projected benefit obligation minus plan assets. The intuition is that an acquirer inherits this liability, and it directly reduces the equity check. It's huge for legacy industrials, airlines, and European conglomerates — a multi-billion unfunded pension can be 30–50% of market cap — so in due diligence the buyer's actuary scrutinizes the discount-rate and mortality assumptions. The asymmetry to flag: an overfunded plan is treated as zero in the EV bridge, not negative, because the company usually can't freely extract the surplus.\"", "formula": "`Unfunded pension = Pension liability (PBO) − Plan assets` → add to EV (debt-like) · overfunded surplus → treat as 0 in EV bridge (not a credit)", "example": "Pension liability $500M, plan assets $350M → unfunded $150M → add $150M to EV. Sensitivity: a 50 bps move in the discount rate can swing the liability by ~10–15%.", "mistakes": "(1) Ignoring pensions because they're \"off to the side\" — for legacy industrials they can be a third of equity value. (2) Crediting EV for an overfunded plan — default IB approach ignores the surplus (cash can't be freely extracted). (3) Taking the reported number at face value without checking the discount-rate assumption, which is highly judgmental.", "followup": "Other debt-like items added to EV? → capital/operating leases, NCI, preferred, deferred consideration, restructuring/environmental provisions. Why is the discount rate so sensitive? → it's a long-duration liability, so small rate moves compound heavily. Why does overfunded ≠ negative EV? → restricted access to the surplus; some analysts give 50% credit only if plan termination is realistic.", "rf": "У большинства РФ компаний нет US/EU-style defined-benefit пенсий: пенсии идут через государственную систему + корпоративные DC-программы (НПФ), поэтому unfunded-pension adjustment в EV редко материален. Исключение — legacy промышленность (металлурги, ж/д, энергетика), где по IAS 19 на балансе сидят обязательства по колдоговорам (выплаты к пенсии, за выслугу лет): их net unfunded часть всё равно добавляется в EV как debt-like.", "terms": []}];
const LS = 'sof_trainer_v1';
const BLOCKS = {};
DATA.forEach(q=>{ if(q.block&&!BLOCKS[q.block]) BLOCKS[q.block]={num:q.block,title:q.block_title}; });
const BLOCK_LIST = Object.values(BLOCKS).sort((a,b)=>a.num-b.num);

let S = load();
function load(){ try{return JSON.parse(localStorage.getItem(LS))||fresh();}catch(e){return fresh();} }
function fresh(){ return {prog:{}, counter:0, scope:'all', curId:null}; }
function save(){ localStorage.setItem(LS, JSON.stringify(S)); }
function st(id){ return S.prog[id] || {status:'unseen', seen:0, last:-1}; }

function scopeQs(){
  if(S.scope==='all') return DATA;
  return DATA.filter(q=>q.block===S.scope);
}
function tierRank(t){ return t==='T1'?0 : t==='T2'?1 : t==='T3'?2 : 1.5; }

function pickNext(){
  const qs = scopeQs();
  const c = S.counter;
  // 1) 'dont' due (seen >=2 ago)
  let pool = qs.filter(q=>st(q.id).status==='dont' && c-st(q.id).last>=2);
  if(pool.length) return leastRecent(pool);
  // 2) unseen, ordered block then tier
  pool = qs.filter(q=>st(q.id).status==='unseen');
  if(pool.length){ pool.sort((a,b)=> (a.block-b.block)||(tierRank(a.tier)-tierRank(b.tier))); return pool[0]; }
  // 3) 'partial' due (seen >=4 ago)
  pool = qs.filter(q=>st(q.id).status==='partial' && c-st(q.id).last>=4);
  if(pool.length) return leastRecent(pool);
  // 4) anything not 'know', least recent
  pool = qs.filter(q=>st(q.id).status!=='know');
  if(pool.length) return leastRecent(pool);
  // 5) all known -> least recent overall
  return leastRecent(qs);
}
function leastRecent(pool){ return pool.slice().sort((a,b)=>st(a.id).last-st(b.id).last)[0]; }

function updateCount(){
  const qs = scopeQs();
  const done = qs.filter(q=>st(q.id).status!=='unseen').length;
  document.getElementById('count').textContent = done+' / '+qs.length;
}

/* ---------- VIEWS ---------- */
let view='home', curQ=null, revealed=false, transcript='', recog=null, recording=false;

function go(v){ view=v; render(); window.scrollTo(0,0); }

function startSession(scope){
  S.scope = scope; save();
  curQ = pickNext(); revealed=false; transcript=''; go('q');
}

function render(){
  const app=document.getElementById('app');
  updateCount();
  if(view==='home') app.innerHTML=homeHTML();
  else if(view==='q') app.innerHTML=qHTML();
  else if(view==='progress') app.innerHTML=progHTML();
  if(view==='q' && !revealed){ const ta=document.getElementById('tr'); if(ta) ta.value=transcript; setMic(); }
}

function homeHTML(){
  const qs=DATA;
  const done=qs.filter(q=>st(q.id).status!=='unseen').length;
  const know=qs.filter(q=>st(q.id).status==='know').length;
  let rows = BLOCK_LIST.map(b=>{
    const bq=DATA.filter(q=>q.block===b.num);
    const k=bq.filter(q=>st(q.id).status==='know').length;
    const p=bq.filter(q=>st(q.id).status==='partial').length;
    const d=bq.filter(q=>st(q.id).status==='dont').length;
    const tot=bq.length;
    return `<div class="blockrow">
      <div class="bt">
        <div class="n">${b.num}. ${esc(b.title)}</div>
        <div class="m">${k+p+d} / ${tot} пройдено · знаю ${k}</div>
        <div class="bar">
          <i class="k" style="width:${pct(k,tot)}%"></i>
          <i class="p" style="width:${pct(p,tot)}%"></i>
          <i class="d" style="width:${pct(d,tot)}%"></i>
        </div>
      </div>
      <span class="go" onclick="startSession(${b.num})">Начать</span>
    </div>`;
  }).join('');
  return `
  <h1>Готовимся к устному</h1>
  <p class="sub">Вопрос → отвечаешь вслух → эталон → самооценка. Слабые возвращаются чаще.</p>
  <div class="stat">
    <div class="s"><b>${done}</b><span>пройдено из ${qs.length}</span></div>
    <div class="s"><b>${know}</b><span>знаю уверенно</span></div>
  </div>
  <div class="section">
    <button class="btn" onclick="startSession('all')">${done? 'Продолжить — все блоки':'Начать — все блоки'}</button>
  </div>
  <h2>Блоки</h2>
  <p class="sub">Порядок от базы к сложному</p>
  ${rows}
  <p class="note">Голос работает в Safari (нажми «Говорить» и разреши микрофон). Если распознавание не идёт — просто проговори ответ вслух и нажми «Показать эталон», потом оцени себя честно. Прогресс сохраняется на телефоне.</p>
  `;
}

function qHTML(){
  const q=curQ; if(!q) return '<p>Нет вопросов.</p>';
  const tier = q.tier? `<span class="chip tier">${q.tier}</span>`:'';
  const stt = st(q.id).status;
  const stChip = stt==='know'?'<span class="chip know">знаю</span>'
    : stt==='partial'?'<span class="chip partial">частично</span>'
    : stt==='dont'?'<span class="chip dont">не знаю</span>':'';
  let voice = `
    <div class="voicebox">
      <p class="hint">Ответь вслух полным ответом. Можно записать речь для самопроверки:</p>
      <div class="row" style="margin-bottom:10px">
        <button class="btn ghost sm" id="micBtn" onclick="toggleRec()">Говорить</button>
        <button class="btn ghost sm" onclick="clearT()">Очистить</button>
      </div>
      <textarea id="tr" class="ta" oninput="transcript=this.value" placeholder="Скажи ответ (кнопка «Говорить») или впиши / надиктуй клавиатурой айфона…"></textarea>
    </div>`;
  let body;
  if(!revealed){
    body = `${voice}
      <button class="btn" onclick="reveal()">Показать эталон</button>
      <p class="note">Сначала ответь вслух целиком, только потом открывай. Это и есть тренировка recall.</p>`;
  } else {
    body = answerHTML(q) + rateHTML();
  }
  return `
  <div class="chips">
    <span class="chip block">Блок ${q.block}</span>${tier}${stChip}
    <span class="chip" style="margin-left:auto;background:#fff;color:var(--muted)">${q.id}</span>
  </div>
  <div class="qtext">${esc(q.question)}</div>
  ${body}`;
}

function answerHTML(q){
  let cov='';
  if(transcript && q.terms && q.terms.length){
    const low=transcript.toLowerCase();
    const yes=q.terms.filter(t=>low.includes(t.toLowerCase()));
    const no=q.terms.filter(t=>!low.includes(t.toLowerCase()));
    cov=`<div class="cover"><span class="cap">Ключевые термины в твоём ответе (грубая проверка):</span>
      ${yes.map(t=>`<span class="t yes">${esc(t)}</span>`).join('')}
      ${no.map(t=>`<span class="t no">${esc(t)} —</span>`).join('')}</div>`;
  }
  const sec=(lbl,val,cls)=> val? `<div class="block ${cls||''}"><div class="lbl">${lbl}</div><div class="body">${md(val)}</div></div>`:'';
  return `<div class="ans">
    ${cov}
    <div class="lead"><div class="lbl">Ответ вслух</div><div class="body">${md(q.spoken)}</div></div>
    ${sec('Формула / ключевое',q.formula,'formula')}
    ${sec('Пример',q.example)}
    ${sec('Частые ошибки',q.mistakes,'mistakes')}
    ${sec('Follow-up',q.followup)}
    ${sec('РФ-контекст',q.rf)}
  </div>`;
}

function rateHTML(){
  return `<div class="rate">
    <button class="r-dont" onclick="rate('dont')">Не знаю</button>
    <button class="r-part" onclick="rate('partial')">Частично</button>
    <button class="r-know" onclick="rate('know')">Знаю</button>
  </div>`;
}

function reveal(){ stopRec(); revealed=true; render(); }
function rate(status){
  const q=curQ;
  S.counter++;
  S.prog[q.id]={status:status, seen:st(q.id).seen+1, last:S.counter};
  save();
  curQ=pickNext(); revealed=false; transcript=''; render(); window.scrollTo(0,0);
}

/* ---------- VOICE (Web Speech API, free) ---------- */
function toggleRec(){ recording? stopRec() : startRec(); }
function startRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('Распознавание речи недоступно в этом браузере. Открой в Safari или Chrome, либо отвечай вслух и жми «Показать эталон».'); return; }
  recog=new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=true;
  let finalT=transcript?transcript+' ':'';
  recog.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i];
      if(r.isFinal) finalT+=r[0].transcript+' '; else interim+=r[0].transcript;
    }
    transcript=(finalT+interim).trim();
    const tr=document.getElementById('tr'); if(tr){tr.value=transcript;}
  };
  recog.onend=()=>{ if(recording){ try{recog.start();}catch(e){} } };
  recog.onerror=(e)=>{ if(e.error==='not-allowed'||e.error==='service-not-allowed'){ alert('Доступ к микрофону запрещён. Разреши в настройках Safari.'); stopRec(); } };
  try{ recog.start(); recording=true; setMic(); }catch(e){}
}
function stopRec(){ recording=false; if(recog){try{recog.stop();}catch(e){}} setMic(); }
function setMic(){ const b=document.getElementById('micBtn'); if(!b)return;
  b.innerHTML=recording? '<span class="recdot"></span>Стоп':'Говорить'; }
function clearT(){ transcript=''; const tr=document.getElementById('tr'); if(tr){tr.value='';tr.focus();} }

/* ---------- PROGRESS ---------- */
function progHTML(){
  const qs=DATA;
  const k=qs.filter(q=>st(q.id).status==='know').length;
  const p=qs.filter(q=>st(q.id).status==='partial').length;
  const d=qs.filter(q=>st(q.id).status==='dont').length;
  const u=qs.length-k-p-d;
  let rows=BLOCK_LIST.map(b=>{
    const bq=DATA.filter(q=>q.block===b.num);
    const bk=bq.filter(q=>st(q.id).status==='know').length;
    const bp=bq.filter(q=>st(q.id).status==='partial').length;
    const bd=bq.filter(q=>st(q.id).status==='dont').length;
    return `<div class="blockrow"><div class="bt">
      <div class="n">${b.num}. ${esc(b.title)}</div>
      <div class="m">знаю ${bk} · частично ${bp} · не знаю ${bd} · из ${bq.length}</div>
      <div class="bar"><i class="k" style="width:${pct(bk,bq.length)}%"></i><i class="p" style="width:${pct(bp,bq.length)}%"></i><i class="d" style="width:${pct(bd,bq.length)}%"></i></div>
    </div></div>`;
  }).join('');
  return `<h1>Прогресс</h1>
  <div class="stat">
    <div class="s"><b>${k}</b><span>знаю</span></div>
    <div class="s"><b>${p}</b><span>частично</span></div>
    <div class="s"><b>${d}</b><span>не знаю</span></div>
    <div class="s"><b>${u}</b><span>не видел</span></div>
  </div>
  <hr class="div">
  ${rows}
  <div class="section">
    <button class="btn ghost" onclick="go('home')">На главную</button>
    <button class="btn ghost" style="margin-top:10px;color:var(--dont)" onclick="resetAll()">Сбросить прогресс</button>
  </div>`;
}
function resetAll(){ if(confirm('Сбросить весь прогресс?')){ S=fresh(); save(); go('home'); } }

/* ---------- helpers ---------- */
function pct(x,t){ return t? Math.round(100*x/t):0; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function md(s){
  if(!s) return '';
  let h=esc(s);
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  h=h.replace(/\n/g,'<br>');
  return h;
}

/* ---------- Telegram Mini App init ---------- */
const TG = window.Telegram && window.Telegram.WebApp;
if(TG){ try{
  TG.ready(); TG.expand();
  if(TG.setHeaderColor) TG.setHeaderColor('#0F3460');
  if(TG.setBackgroundColor) TG.setBackgroundColor('#FFFFFF');
  document.body.style.paddingBottom = '0';
}catch(e){} }

render();
</script>
</body>
