erviced.", "mistakes": "(1) Confusing which tax adjustment goes where. (2) Not reconciling the two approaches to the same equity value. (3) Double-counting the tax shield — putting it in both the cash flows and the discount rate.", "followup": "\"When use each?\" → Q150/Q151/Q152. \"DCF vs market price gap?\" → DCF is the intrinsic anchor and market is liquidity-adjusted; a 10–20% gap can be opportunity, >30% means re-examine assumptions or accept market inefficiency — use it as a thesis, not dogma. \"Тонкая капитализация — как влияет на tax shield?\" → в РФ excess interest по контролируемому долгу не вычитается и реклассифицируется в дивиденды, что урезает interest tax shield в обоих методах.", "rf": "DCF-implied vs market typically shows a 10–20% gap for names like Сбер (sanctions discount); redomiciliation cases (Яндекс МКПАО) opened wider gaps where the market lagged intrinsic value. Treat DCF as the intrinsic anchor and the quote as the liquidity-adjusted current price. Тонкая капитализация (ст. 269 НК): контролируемый долг — перед связанной стороной с владением >20% или под её гарантию; лимит D/E 3:1 для обычных компаний, 12.5:1 для банков и лизинговых; equity берётся по book value (РСБУ). Пример: equity 100M, контролируемый долг 500M, проценты 60M → допустимый долг 100M × 3 = 300M, доля 300/500 = 60%, вычитаемые проценты 60M × 60% = 36M (не 60M), потеря tax shield (60M − 36M) × 25% = 6M/год; excess 24M реклассифицируется в дивиденды (withholding 15% без СИДН). Сторонний банковский долг — без ограничений; с 2024 общий cap на вычет = ключевая ставка ЦБ + 5 п.п. Дивиденды юрлицо → юрлицо (ст. 284 НК): 0% при непрерывном владении ≥50% уставного капитала ≥365 дней, иначе 13%; физлица — 13–15% (прогрессия с 2025). Для M&A-структурирования (дочь → мать) дивидендный поток tax-free при выполнении условий.", "terms": ["equity value", "tax shield", "net debt", "LFCF", "UFCF", "REIT", "WACC", "EBIT"]}, {"id": "Q18", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "How do the 3 financial statements link?", "spoken": "\"There are three linkages. First, Net Income from the Income Statement flows to two places: it's the starting point of the Cash Flow Statement under the indirect method, and it feeds Retained Earnings on the Balance Sheet via Beginning RE plus NI minus dividends. Second, the CFS takes NI, adds back non-cash charges like D&A and SBC, adjusts for working capital changes, then layers in investing and financing activities to arrive at the change in cash. Third, ending cash from the CFS lands on the Balance Sheet as the cash balance, and the BS always balances: Assets equal Liabilities plus Equity. Any single transaction — depreciation, a debt issuance, an inventory purchase — flows through all three, which is exactly why this is the foundational modeling question.\"", "formula": "`Ending RE = Beginning RE + NI − Dividends` · `Assets = Liabilities + Equity` · NI feeds BOTH the CFS start and RE on the BS", "example": "$10 of depreciation: IS pre-tax income −$10, NI −$7.5 at 25% tax; CFS starts at lower NI then adds back $10 D&A → net cash +$2.5 (tax shield); BS: PP&E −$10, Cash +$2.5, RE −$7.5; check: ΔAssets −$7.5 = ΔEquity −$7.5.", "mistakes": "Forgetting NI feeds both the CFS and the BS (via RE). Under the direct method the CFS operating section starts from cash collected, not NI — the indirect-method linkage is what's being tested.", "followup": "\"Walk me through $10M depreciation across all three\" → see the depreciation example above. \"When does the circular reference appear?\" → only once you add a debt schedule (interest → debt paydown → cash → interest).", "rf": "Полный linkage работает в IFRS-отчётности публичных компаний. РСБУ часто использует direct-method CFS, и interim reconciliation скуднее. Ключевая ошибка на собесе — смешивать IFRS и РСБУ statements в одной модели.", "terms": ["working capital", "depreciation", "NCI"]}, {"id": "Q47", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Which financial statement is most important?", "spoken": "\"There's no single right answer — it depends on context, and the interviewer wants me to say that. For a distressed company I'd look at the Cash Flow Statement first: can it generate enough cash to survive? For a high-growth company, the Income Statement — is revenue scaling toward profitability? For a financial institution, the Balance Sheet — asset quality and capital adequacy. If forced to pick one for general health assessment, I'd take the CFS, because cash is much harder to manipulate than accrual earnings, and a CFO-to-Net-Income divergence is the earliest warning sign of earnings manipulation.\"", "formula": "Acknowledge the trade-off, then justify · CFS for survival, IS for growth, BS for financials · `CFO / NI ≈ 1.0` signals quality earnings", "example": "CFO/NI divergence flagged trouble at Enron, WorldCom, and Wirecard years before the frauds surfaced — profit kept rising while operating cash didn't follow.", "mistakes": "Just saying \"CFS\" and stopping. The whole point is to show you know each statement has a different use case and to explain WHY.", "followup": "\"What if you could only see two?\" → IS + BS; you can reconstruct the CFS from beginning and ending BS plus the IS.", "rf": "", "terms": ["NCI"]}, {"id": "Q48", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Two most important statements to assess a company", "spoken": "\"If I could only see two, I'd take the Income Statement and the Balance Sheet. The IS gives profitability and operating performance; the BS gives financial position, asset quality, and leverage. Crucially, with a beginning and ending Balance Sheet plus the Income Statement, I can reconstruct the entire Cash Flow Statement by computing the change in every BS line item. The CFS is a derived output, not source data — you can't run the logic backward from the CFS to rebuild the IS and BS.\"", "formula": "IS + BS = source data; CFS = derived output · reconstruct CFO: start with NI, add back D&A, adjust for ΔWC", "example": "Reconstructing CFO from IS + two BSs: NI + D&A (from the PP&E roll-forward) − ΔAR − ΔInventory + ΔAP = operating cash flow.", "mistakes": "Choosing \"CFS plus one other.\" The CFS is derived from the IS and BS — picking it as one of your two is circular.", "followup": "\"Walk me through reconstructing CFO\" → see the reconstruction example above.", "rf": "Логика та же в IFRS. Value-инвесторы (напр. Arsagera) на практике читают CFS первым для проверки качества earnings, но для полного assessment IS + BS остаются source data.", "terms": ["leverage", "NCI"]}, {"id": "Q27", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Capital Leases vs Operating Leases", "spoken": "\"Under current standards — IFRS 16 and ASC 842 since 2019 — both lease types put a Right-of-Use asset and a lease liability on the balance sheet, so the old off-balance-sheet trick is gone. The difference now is the expense pattern: a finance lease splits the cost into depreciation plus interest, which is front-loaded like a mortgage; an operating lease under US GAAP keeps a single straight-line expense, while IFRS 16 treats nearly everything as finance-style. The valuation implication is the key part: the lease liability is debt-like, so it gets added to Enterprise Value, and because rent moves below the EBITDA line, EBITDA rises — which is why you use EV/EBITDAR for clean comparisons.\"", "formula": "Both create ROU asset + lease liability · Finance lease = depreciation + interest (front-loaded); operating = straight-line · Lease liability is debt-like → add to EV · Use EV/EBITDAR to compare lease-vs-own", "example": "$10M/yr lease, 10 years, 5% discount → PV of liability ≈ $77M. Year 1: interest = $77M × 5% = $3.85M; ROU depreciation = $77M / 10 = $7.7M; total P&L charge = $11.55M vs $10M straight-line — front-loaded. EBITDA rises by the $10M of removed rent, but D&A is up $7.7M and interest up $3.85M.", "mistakes": "Assuming a $500M lease liability leaves EV/EBITDA unchanged — EV rises by the liability AND EBITDA rises (rent now below the line), so the multiple may move little, but you must apply both adjustments consistently. Comparing pre- and post-2019 multiples without normalizing.", "followup": "\"How do you adjust comps when one company leases and another owns?\" → EV/EBITDAR, or capitalize both at the same discount rate. \"Any exemptions?\" → short-term (<12 months) and low-value leases are exempt from capitalization.", "rf": "МСФО 16 с 2019 для публичных компаний; РСБУ для непубличных сохраняет operating lease off-balance-sheet, а ФСБУ 25/2018 (с 2022) сближает РСБУ с МСФО 16 для крупных. Lease-heavy примеры — Аэрофлот и ритейл (X5, Магнит), где lease liability существенна.", "terms": ["enterprise value", "depreciation", "EV/EBITDA", "EBITDA", "EBIT", "ERP"]}, {"id": "Q49", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T2", "question": "Vending machine: own vs lease — impact on multiples", "spoken": "\"Pre-IFRS 16 the answer was clean: if you lease, the payment is an operating expense above the EBITDA line, so EBITDA is lower and the company looks like it trades at a higher EV/EBITDA for the same enterprise value; if you own, depreciation sits below EBITDA, so EBITDA is higher. EV/EBIT is unaffected either way, because both lease expense and D&A reduce EBIT. Post-IFRS 16 this distinction is muted, because operating lease payments are now split into ROU depreciation and interest, both below EBITDA — so EBITDA is higher whether you lease or own. The fix for clean comps is EV/EBITDAR, EBITDA before rent, which is standard in retail, airlines, and restaurants.\"", "formula": "Lease → lower EBITDA → higher EV/EBITDA for same EV · EV/EBIT unaffected (both lease expense and D&A hit EBIT) · Post-IFRS 16 add lease liability to EV · Normalize with EV/EBITDAR", "example": "Classic lease-vs-own comp pairs: Delta (owns more planes) vs Ryanair (leases more); McDonald's (owns real estate) vs lease-heavy peers. Same operating economics, different EBITDA optics unless you use EV/EBITDAR.", "mistakes": "Concluding \"owning is always better for valuation.\" Owning lifts EBITDA but ties up capital and adds debt if financed — total enterprise value should be the same; only the optics differ.", "followup": "\"How does IFRS 16 change this?\" → all leases on the BS, EBITDA higher for both, but you must add lease liabilities to EV.", "rf": "", "terms": ["enterprise value", "depreciation", "EV/EBITDA", "EBITDA", "EBIT", "ERP", "ABO"]}, {"id": "Q40", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T2", "question": "Retained Earnings formula", "spoken": "\"Ending Retained Earnings equals beginning RE plus Net Income minus dividends declared. It's the cumulative total of all historical profits not yet distributed, and it's the primary link between the Income Statement and the Balance Sheet — every dollar of NI flows to equity through RE. RE can go negative — that's an accumulated deficit, common in startups or after a big impairment — and negative RE doesn't mean insolvency, since a company can have strong cash flow but historical accounting losses. The line itself is largely irrelevant in a PE deal because you recapitalize the equity anyway, but in public-company analysis shrinking RE alongside rising leverage is a red flag for dividend sustainability.\"", "formula": "`Ending RE = Beginning RE + NI − Dividends` · Only NI and dividends move RE · Negative RE = accumulated deficit, not necessarily insolvency", "example": "Buybacks do NOT touch RE — a $50M repurchase creates a Treasury Stock contra-equity line of −$50M, leaving RE unchanged.", "mistakes": "Thinking buybacks reduce RE (they hit Treasury Stock). Treating RE as a cash balance — it's an accounting residual; a company can have huge RE and no cash, or negative RE and strong cash flow.", "followup": "\"Can a company with negative RE pay dividends?\" → Yes, if it has the cash and meets the legal surplus test, but it's unusual.", "rf": "Юридическая dividend capacity в РФ считается по РСБУ-нераспределённой прибыли, не по IFRS — классическая ловушка, поскольку РСБУ и IFRS RE могут расходиться. Часть RE может «застрять» в дочерних структурах и быть недоступной материнской компании.", "terms": ["leverage", "IRR"]}, {"id": "Q44", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Diluted shares: Treasury Stock Method, If-Converted", "spoken": "\"Diluted shares are basic shares plus the dilutive effect of options, warrants, RSUs, and convertibles. For options and warrants you use the Treasury Stock Method: assume they're exercised, the company collects the strike price, and uses those proceeds to buy back shares at the current market price — so net new shares equal exercised shares minus repurchased shares. For convertible bonds you use the If-Converted Method: add the converted shares to the denominator and add back the after-tax interest to the numerator. The critical rule is that you only include securities that are dilutive — that actually decrease EPS — and exclude anything anti-dilutive.\"", "formula": "`TSM net new shares = Options × (Market − Strike) / Market` (in-the-money only) · If-Converted: + converted shares to denominator, + after-tax interest to numerator · Include only dilutive (EPS-decreasing) securities", "example": "Stock drops 40% → previously in-the-money options go out-of-the-money (strike > market) and fall out of the diluted count, so diluted EPS moves closer to basic EPS — a price decline can paradoxically \"improve\" diluted EPS.", "mistakes": "Including out-of-the-money options (they're anti-dilutive — nobody exercises). Forgetting to rank securities most-to-least dilutive and stop when the next one turns anti-dilutive.", "followup": "\"How do RSUs differ from options?\" → RSUs have no strike price, so they're always dilutive; dilution = total RSUs minus shares repurchasable with the unrecognized SBC. \"How does SBC tie in?\" → through the TSM for options, see Q26.", "rf": "Convertibles в РФ редки. После редомициляции tech-компаний phantom / cash-settled units не входят в diluted share count, потому что не создают новых акций (нет equity).", "terms": ["treasury stock", "convertible", "diluted"]}, {"id": "Q50", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Authorized vs Issued vs Treasury vs Outstanding shares", "spoken": "\"Authorized shares are the maximum the corporate charter permits — set at incorporation, and raising it requires a shareholder vote. Issued shares are the ones actually sold to investors. Treasury shares are issued shares the company has bought back. Outstanding equals issued minus treasury, and that's the figure that counts for EPS and all per-share metrics. Diluted share count then adds back the dilutive securities on top of outstanding.\"", "formula": "`Outstanding = Issued − Treasury` · Hierarchy: Authorized ≥ Issued ≥ Outstanding · EPS uses Outstanding, not Issued · Diluted = Outstanding + dilutive securities", "example": "200M authorized, 100M issued, 10M treasury → outstanding = 100M − 10M = 90M.", "mistakes": "Using issued instead of outstanding for EPS. Treating outstanding as static — it changes daily (option exercises, RSU vesting, buybacks); for valuation use the latest diluted count and adjust for known subsequent events.", "followup": "\"Why have more authorized than issued?\" → flexibility for future equity raises, M&A consideration, and employee comp without needing another shareholder vote.", "rf": "", "terms": ["diluted"]}, {"id": "Q51", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Company issues $10 of equity: walk through 3 statements", "spoken": "\"Issuing equity doesn't touch the Income Statement — it's a capital raise, not revenue or an expense. On the Cash Flow Statement, the $10 shows up as an inflow in Financing Activities. On the Balance Sheet, Cash goes up $10 and Equity goes up $10, recorded as Additional Paid-In Capital, so the BS stays balanced. The subtle point is that even though there's no IS impact, EPS falls — not because income dropped, but because the share count in the denominator rose. That dilution is the real cost of equity financing: shareholders pay with ownership rather than cash.\"", "formula": "IS: no impact · CFS: +$10 financing inflow · BS: Cash +$10, Equity (APIC) +$10 → balanced · Issuance costs net against proceeds in APIC, not expensed", "example": "Raise $100M gross, pay $5M in banker fees → APIC and Cash each increase by $95M; the fees reduce APIC rather than hitting the IS as an expense.", "mistakes": "Saying equity issuance is anti-dilutive or EPS-neutral — it's dilutive via the higher share count. Expensing issuance costs through the IS instead of netting them against proceeds.", "followup": "\"What if stock is issued for an acquisition instead of cash?\" → no cash change, no IS impact; BS: Assets +$10 (the target), Equity +$10. \"What if it were SBC instead?\" → that's a non-cash operating expense, see Q26.", "rf": "Под РСБУ нет прямого аналога APIC: прирост идёт в «Уставный капитал» плюс «Добавочный капитал». Экономика та же — financing inflow, рост equity, разводнение существующих акционеров.", "terms": ["cost of equity", "dilution", "NCI"]}, {"id": "Q26", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Stock-Based Compensation: flow through statements", "spoken": "\"SBC is an operating expense on the Income Statement, so it reduces pre-tax income and Net Income. On the Cash Flow Statement it's added back as a non-cash charge, just like D&A. On the Balance Sheet it increases Additional Paid-In Capital within equity. The real debate is in valuation: many companies add SBC back to adjusted EBITDA because it's non-cash, but it's a genuine economic cost to existing shareholders through dilution. The disciplined approach — and the one Buffett argues for — is to treat it as a real expense: either subtract SBC and use diluted shares, or add it back but separately charge for the dilution. Double-counting is the most common error, and in tech where SBC runs 15–30% of revenue it can swing a valuation by 20%-plus.\"", "formula": "IS: operating expense, reduces NI · CFS: added back (non-cash) · BS: increases APIC · In a DCF, subtract SBC from FCF (don't add back) and avoid double-counting against diluted shares", "example": "$50M SBC grant at 25% tax: IS expense +$50M → NI −$37.5M; CFS: NI −$37.5M + $50M addback = Cash +$12.5M (the tax benefit); BS: APIC +$50M, RE −$37.5M → Equity +$12.5M, matching Cash +$12.5M.", "mistakes": "Adding SBC back in EBITDA AND using basic (non-diluted) shares — you can't claim both no expense and no dilution. Treating SBC as costless because it's non-cash.", "followup": "\"How does SBC affect diluted EPS?\" → through the Treasury Stock Method on the options, see Q44.", "rf": "После редомициляции tech-компании перешли на cash-settled phantom units вместо классических RSU. У Сбера, Лукойла SBC незначителен (<1% выручки). Для valuation подход тот же — вычитать из FCF как реальную стоимость.", "terms": ["dilution", "diluted", "EBITDA", "EBIT", "DCF"]}, {"id": "Q45", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "FIFO vs LIFO", "spoken": "\"FIFO assumes the oldest inventory is sold first, LIFO the newest. In an inflationary environment, FIFO charges older, cheaper costs to COGS, so COGS is lower, Net Income is higher, and taxes are higher; LIFO charges newer, more expensive costs, so COGS is higher, NI is lower, and taxes are lower. That tax shield is the whole appeal of LIFO — but LIFO is permitted only under US GAAP and is banned under IFRS, so for cross-border comparability you convert LIFO to FIFO using the LIFO Reserve disclosed in the notes.\"", "formula": "Inflation: FIFO → lower COGS, higher NI, higher tax; LIFO → higher COGS, lower NI, lower tax · LIFO banned under IFRS (and РСБУ) · To convert LIFO→FIFO: add LIFO Reserve to inventory, subtract ΔLIFO Reserve from COGS", "example": "Buy 100 units at $10, then 100 at $15; sell 100. FIFO: COGS = $1,000, ending inventory = $1,500. LIFO: COGS = $1,500, ending inventory = $1,000. LIFO shows $500 higher COGS and $500 lower pre-tax NI, but a more understated balance-sheet inventory.", "mistakes": "Claiming LIFO gives a better balance-sheet inventory figure — it's the opposite; FIFO's ending inventory is closer to current market prices. Forgetting that switching off LIFO can trigger tax on the entire built-up LIFO Reserve.", "followup": "\"Which gives a better BS inventory value?\" → FIFO (recent prices). \"How do you adjust LIFO to FIFO for comps?\" → add LIFO Reserve to inventory, subtract the change in LIFO Reserve from COGS.", "rf": "ПБУ 5/01 разрешает FIFO и средневзвешенную стоимость; LIFO запрещён, как и в IFRS. При инфляции FIFO завышает прибыль, потому что старые дешёвые запасы матчатся с текущей выручкой.", "terms": ["tax shield", "FIFO", "LIFO"]}, {"id": "Q52", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Inventory decreased by $10 (sold for cash): walk through 3 statements", "spoken": "\"Say inventory that cost $10 is sold for $15 cash at 25% tax. On the Income Statement: revenue $15, COGS $10, gross profit $5, tax $1.25, Net Income $3.75. On the Cash Flow Statement: start with NI of $3.75 and add the $10 inventory decrease — releasing inventory is a source of cash because the asset converted to cash — for CFO of $13.75. On the Balance Sheet: Inventory down $10, Cash up $13.75, Retained Earnings up $3.75, and it balances. The classic trap is if it's sold on credit instead of for cash.\"", "formula": "Inventory decrease = source of cash (asset converted) · `Gross margin = (Revenue − COGS) / Revenue` · Profit ≠ cash when sold on credit", "example": "Same sale on credit instead of cash: Cash doesn't move, AR rises $15. CFS: NI $3.75 + inventory decrease $10 − AR increase $15 = −$1.25 — negative CFO despite a positive profit.", "mistakes": "Assuming cash always rises on a sale — on credit it's AR, and CFO can go negative even with positive NI. Forgetting to add back the inventory release on the CFS.", "followup": "\"Why does an inventory decrease help CFO?\" → you consumed an asset without any cash outflow this period; the cash went out earlier when the inventory was purchased, so the decrease releases previously frozen cash.", "rf": "У ритейлеров (X5, Магнит) inventory turnover — ключевая метрика эффективности, gross margin порядка 20–25%. Ставка налога на прибыль в РФ — 25% с 2025 (была 20%).", "terms": []}, {"id": "Q53", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Effective Tax Rate vs Marginal Tax Rate", "spoken": "\"The Effective Tax Rate is total tax divided by pre-tax income — the actual rate the company paid, reflecting all credits, deductions, and the mix of jurisdictions. The Marginal Tax Rate is the statutory rate applied to the next dollar earned. They differ because of things like R&D credits, foreign rate differentials, permanent non-deductible items, tax-exempt income, and DTA/DTL timing differences. For a DCF I want a rate that reflects the long-run sustainable tax burden — usually a normalized ETR averaged over three to five years to strip out one-offs, but I always investigate whether a low ETR is structural or temporary before trusting it.\"", "formula": "`ETR = Total Tax / Pre-tax Income` (actual) · MTR = statutory rate on the next dollar · ETR ≠ statutory due to credits, NOLs, jurisdictional mix, DTA/DTL changes · DCF: use normalized 3–5 year ETR, terminal year often trends toward statutory", "example": "Apple has run an ETR around 14–17% against a US federal statutory rate of 21% — driven by foreign rate differentials and offshore structuring, the kind of gap you must decide is sustainable or not.", "mistakes": "Plugging a 5% target ETR straight into a DCF. If it's from one-time credits, use the statutory rate; if it's structural (IP in a low-tax jurisdiction), it may persist, but confirm via tax DD. In M&A, US Section 382 limits the use of target NOLs after a change of control.", "followup": "\"Should a DCF use a 5% target ETR?\" → probably not; investigate the source first. \"What does a persistently low ETR signal to a short-seller?\" → a yellow flag (Chanos) — aggressive structures invite re-assessment.", "rf": "Статутная ставка налога на прибыль — 25% с 2025 (была 20%). IT-льгота: 0% для аккредитованных IT-компаний в 2022–2024, затем 5% с 2025. ETR расходится со статутной из-за НДПИ у сырьевиков (выше) и IT-льгот (ниже).", "terms": ["NOL", "DTA", "DTL", "DCF"]}, {"id": "Q37", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "What are Deferred Tax Assets and Deferred Tax Liabilities?", "spoken": "\"A Deferred Tax Asset arises when you pay more in cash tax than your book tax expense — creating a future benefit; common sources are NOLs, warranty reserves, and SBC. A Deferred Tax Liability arises when you pay less in cash tax than your book expense — a future obligation; the classic source is accelerated depreciation for tax versus straight-line for books. Both come from timing differences that reverse over time. The key insight is that a DTA and a DTL don't flip into each other — they accumulate and then each reverses toward zero independently. And a DTA carries the extra wrinkle of the valuation allowance: if the company probably won't generate enough future taxable income to use it, you write it down.\"", "formula": "DTA = paid more cash tax than book (future benefit) · DTL = paid less cash tax than book (future obligation) · Both from timing differences, reverse toward zero independently · Valuation allowance reduces a DTA if recovery is <50% likely (US GAAP)", "example": "Accelerated depreciation builds a DTL that peaks early then shrinks; but if the company keeps buying assets, new DTLs layer on so the aggregate may never reverse — which is why some treat a \"permanent\" DTL as quasi-debt in EV. Damodaran's M&A convention: default to ~50% recovery on DTAs absent a specific structuring plan.", "mistakes": "Saying a DTA \"becomes\" a DTL or vice versa — they're separate items reversing toward zero independently. Valuing a DTA at full face without checking the valuation allowance.", "followup": "\"Walk me through DTA reversal timing\" → the DTA unwinds as the timing difference reverses (e.g., NOLs as future profits absorb them). \"What does a large valuation allowance tell you?\" → the market doesn't believe in future profitability.", "rf": "Возникают из разницы book (IFRS) и налогового учёта. В РСБУ аналоги — ОНА/ОНО (отложенные налоговые активы/обязательства) и ПНА/ПНО (постоянные). В M&A ценность usable DTA по NOL ограничена ст. 283 НК РФ.", "terms": ["deferred tax", "depreciation", "NOL", "DTA", "DTL"]}, {"id": "Q54", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Net Operating Loss (NOL) carryforward", "spoken": "\"A Net Operating Loss carryforward lets a company offset past losses against future taxable income, cutting future tax bills and creating a DTA on the balance sheet. NOLs are valuable in M&A because the acquirer effectively inherits the target's tax losses — but in the US, Section 382 caps how much of the target's NOL the acquirer can use each year after a change of control. The cap is roughly the target's fair market value times the long-term tax-exempt rate, so a large NOL gets stretched over many years, and its present value is well below face. The disciplined view is to haircut NOLs to maybe 30–60% of face for timing, usage probability, and ownership-change limits.\"", "formula": "NOL offsets future taxable income → creates DTA · US: indefinite carryforward, 80% of taxable income annual cap (post-TCJA 2017) · `Section 382 annual limit ≈ target FMV × long-term tax-exempt rate (~4–5%)` · PV typically 30–60% of face, not 100%", "example": "$100M NOL, 25% tax, $50M/yr pre-tax income. Year 1: $50M × 80% = $40M offset → tax on $10M = $2.5M vs $12.5M without NOL → $10M saved. DTA on BS = $100M × 25% = $25M before any valuation allowance; $60M NOL carries into later years. Under Section 382, a $1B target FMV caps annual usage at roughly $40–50M, so a $500M NOL could take ~10 years to absorb.", "mistakes": "Valuing a $500M NOL at $125M (500 × 25%) at full face — only if there's enough future taxable income to use it, and Section 382 plus discounting cut the present value sharply.", "followup": "\"Why is an NOL worth less than face?\" → time discount (used only against future income, so PV at WACC) plus usage caps and ownership-change limits. \"What's the M&A structuring lever?\" → Section 382 limitation drives how the deal is structured.", "rf": "По ст. 283 НК РФ перенос убытков бессрочный (10-летний лимит отменён с 2017), но offset ограничен 50% налоговой базы текущего года (ограничение продлено до 2026). Аналог DTA — ОНА. В M&A ценность target NOL значительно ниже face из-за лимитов и ст. 283.1 при реорганизации.", "terms": ["market value", "carry", "NOL", "DTA"]}, {"id": "Q55", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T2", "question": "Prepaid expenses", "spoken": "Prepaid expenses are advance payments for goods or services not yet received — insurance premiums, rent, maintenance contracts. They sit as a current asset on the balance sheet. The initial payment is a cash outflow; in each subsequent period the prepaid asset is drawn down and the expense is recognized on the income statement, which is a non-cash reclassification. So an increase in prepaids is a use of cash on the CFS, and a decrease is a source.", "formula": "`Δ Prepaid ↑ = use of cash (subtract in CFO)`; `Δ Prepaid ↓ = source of cash`", "example": "Company pays a $12M annual insurance premium upfront. Day 1: Cash −$12M, Prepaid +$12M. Each month $1M moves from the BS asset to insurance expense on the IS — no cash moves at recognition.", "mistakes": "Calling an increase in prepaids a source of cash — it is a use, you paid for something not yet consumed. Confusing prepaids with deferred charges (same concept, different horizon).", "followup": "\"Prepaids vs deferred charges?\" → Prepaids = short-term (current asset); deferred charges = long-term (non-current). \"Diligence red flag?\" → Prepaids rising faster than revenue can signal aggressive capitalization of what should be expensed.", "rf": "", "terms": []}, {"id": "Q22", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "What is Deferred Revenue? Give an example", "spoken": "Deferred Revenue is a liability — you have collected cash but not yet delivered the good or service. It is the mirror image of Accounts Receivable: with AR you delivered but haven't been paid, with deferred revenue you've been paid but haven't delivered. It is common in software, subscriptions, airlines with pre-sold tickets, and insurance with prepaid premiums. On the CFS, an increase in deferred revenue is added back in operating activities — cash came in before revenue was recognized, so it is a source of cash. It is generally a sign of business quality: the customer is financing your growth.", "formula": "Day 1: `Cash + / Deferred Revenue +` (no IS impact); each period: `Revenue + on IS / Deferred Revenue − on BS`. `Δ Deferred Revenue ↑ = source of cash in CFO`", "example": "SaaS company signs a $240K annual contract billed upfront. Day 1: Cash +$240K, Deferred Revenue +$240K (liability). Each month: Revenue +$20K on IS, Deferred Revenue −$20K on BS. The full $240K is added to CFO in the quarter cash is received.", "mistakes": "Calling deferred revenue \"bad\" — it is customer-financed growth with negative working capital. Forgetting that for an acquirer it is a debt-like obligation to deliver without new revenue, so it creates a haircut in purchase accounting and can reduce EV.", "followup": "\"Effect on Enterprise Value?\" → Debt-like if there is a real obligation to deliver; sometimes deducted in the EV bridge. \"Are all advance payments deferred revenue?\" → No — refundable customer deposits are liabilities but not deferred revenue. \"Forensic angle (Schilit)?\" → If deferred revenue shrinks while reported revenue grows, that is a red flag for accelerated/aggressive revenue recognition; always compare the change in deferred revenue to revenue growth.", "rf": "РФ SaaS (1С, VK Tech, Yandex Cloud) typically carry 20-30% of revenue as deferred from prepaid annual contracts; airlines (Аэрофлот, S7) far higher from tickets sold ahead. РСБУ and IFRS treat advances received similarly as a liability, but valuation work uses IFRS.", "terms": ["deferred revenue", "MIRR", "NCI", "IRR"]}, {"id": "Q29", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "How does an increase in AR affect cash flow?", "spoken": "An increase in AR means you recognized revenue on the income statement — raising net income — but haven't collected the cash yet. On the operating section of the CFS the increase in AR is subtracted, reducing CFO, because you have effectively extended credit to customers. This is why fast-growing companies can be profitable on paper but cash-poor: if revenue grows but DSO holds, AR builds and consumes cash. A company whose AR grows faster than revenue has a collections-quality problem.", "formula": "`Δ AR ↑ = use of cash (subtract in CFO)`; `DSO = (AR / Revenue) × 365` — higher DSO = slower collections", "example": "Revenue $50M, cash collected $40M → AR +$10M. IS records the full $50M, so NI is overstated by $10M of uncollected revenue; CFS subtracts the $10M AR build; BS shows AR +$10M with cash $10M lower than the IS implies.", "mistakes": "Reading a falling AR as automatically good — it usually means strong collections, but it can also mean revenue is declining. Forgetting that CFS classification (interest, dividends) differs IFRS vs US GAAP, which distorts CFO comparisons.", "followup": "\"DSO formula and meaning?\" → (AR/Revenue) × 365; higher = slower collections. \"AR up two quarters in a row, faster than revenue (Schilit)?\" → Three suspects: aggressive revenue recognition that will reverse, channel stuffing, or customers extending payment terms = deteriorating customer quality.", "rf": "Large Russian corporates (Газпром, Сбер) pay on ~30-60 day terms, smaller mid-caps stretch to 60-90; B2C retail collects in cash, so DSO ≈ 0. A jump in DSO during stress (e.g. corporate customers delaying year-end payments) is a standard DD flag — check DSO vs industry, the aging schedule, and top-10 customer concentration.", "terms": []}, {"id": "Q56", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T2", "question": "Types of financial investments on the Balance Sheet", "spoken": "Under IFRS 9 there are three classifications driven by a business-model test plus the SPPI test (solely payments of principal and interest): amortized cost, fair value through P&L (FVTPL), and fair value through OCI (FVTOCI). The older IAS 39 / US GAAP language is the equivalent trio: held-to-maturity at amortized cost, trading marked to market through the income statement, and available-for-sale marked to market through OCI. The classification decides whether mark-to-market moves hit earnings, OCI, or nothing.", "formula": "Trading / FVTPL → fair value through IS · AFS / FVTOCI → fair value through OCI · HTM → amortized cost, no mark-to-market. IFRS 9 test = business model + SPPI.", "example": "A bank holds $50B of bonds classified HTM and rates rise 300bps. No income-statement impact — HTM is at amortized cost — but the economic loss is real and unrealized. This is exactly the SVB situation: large unrealized losses sat hidden in HTM until forced sales crystallized them.", "mistakes": "Saying an HTM mark-to-market loss flows through the IS — it does not (amortized cost). Treating a period-end balance sheet snapshot as clean — it can be window-dressed; average balances are more reliable for ratios.", "followup": "\"Why reclassify AFS to HTM?\" → To avoid OCI volatility, but you lose flexibility to sell, and regulators scrutinize HTM reclassifications post-SVB.", "rf": "IFRS 9 applies to Russian public reporting (business model + SPPI); РСБУ uses ПБУ 19/02, a simpler framework that can diverge meaningfully on valuation, so analysis runs off IFRS. For Russian banks HTM tends to dominate the securities book.", "terms": ["NCI"]}, {"id": "Q57", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Equity method for associates and JVs", "spoken": "The equity method is used when an investor holds roughly 20-50% — significant influence but not control. On the balance sheet the investment starts at cost and is then adjusted each period up by the investor's share of the investee's net income and down by dividends received. On the income statement a single line, \"share of profit of associates,\" appears below operating income — there is no consolidation of the investee's revenue or EBITDA. Below ~20% you hold it at fair value; above 50% you fully consolidate with NCI for minorities.", "formula": "`<20% → fair value (FVTPL/FVTOCI)` · `20-50% → equity method (one NI line, no revenue/EBITDA)` · `>50% → full consolidation (100% revenue/EBITDA + NCI)`. BS carrying value `= cost + share of NI − dividends`. EV consistency: either subtract equity investments from EV, or keep them and add proportional EBITDA to the denominator.", "example": "A owns 40% of B. A's revenue = $500M, B's revenue = $1B. A's consolidated revenue is $500M, not $1.5B — the equity method consolidates none of B's revenue, only A's share of B's net income as one line.", "mistakes": "Consolidating the associate's revenue/EBITDA under the equity method (the classic trap). Forgetting the EV consistency rule — mixing a full-EV numerator with an equity-method EBITDA denominator. Treating the equity stake as operating in the EV bridge — it is non-operating and not in EBITDA.", "followup": "\"IFRS vs US GAAP?\" → Nearly identical; IFRS stresses substance-over-form on significant influence (board seats/veto can trigger equity method even below 20%), US GAAP is more formal about the 20% threshold; РСБУ applies the equity method only in consolidated statements, cost in standalone.", "rf": "Holdings illustrate both methods — Газпром owns ~96% of Газпром нефть → full consolidation with minimal NCI, but a 50/50 JV like TurkStream → equity method, where only the share of JV profit shows, not pipeline revenue. АФК Система, Ростех carry associates/JVs the same way. In M&A DD it is critical to disentangle the consolidation methodology before comparing revenue across targets.", "terms": ["EBITDA", "carry", "EBIT", "NCI", "ABO"]}, {"id": "Q58", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Walk me through CFO, CFI, CFF", "spoken": "The cash flow statement has three sections that sum to the change in cash. CFO starts from net income, adds back non-cash items — D&A, SBC, impairments — and adjusts for working-capital changes; it tells you how much cash the operating business actually generates. CFI is capex, acquisitions and investment purchases, net of asset and investment sales. CFF is debt issuance and repayment, equity issuance and buybacks, and dividends. The two ways to build CFO are indirect, starting from NI, used by ~95% of companies and always asked in interviews, and direct, which shows actual cash receipts and payments.", "formula": "`CFO = NI + D&A + SBC + impairment ± ΔWC` · `CFI = −CapEx − acquisitions − investment purchases + asset/investment sales` · `CFF = +debt issuance − debt repayment + equity issuance − buybacks − dividends` · `ΔCash = CFO + CFI + CFF`. UFCF from CFS `= CFO + after-tax interest − CapEx`.", "example": "Capital-return profile — high CFO, modest reinvestment, the rest paid out: a high-margin, low-working-capital steel or mining producer can run CFO well above net income, spend a fraction on capex, and return most of the balance through dividends and buybacks so ending cash is roughly flat. Conversely, NI of $100M with CFO of only $30M points to heavy working-capital build (growth) or aggressive revenue recognition.", "mistakes": "Assuming interest paid is always in CFO — true under US GAAP, but under IFRS the company can classify it in CFO, CFI or CFF, so a GAAP-vs-IFRS CFO comparison is apples-to-oranges unless you check. Ignoring the NI-vs-CFO gap, which is the single most diagnostic read on earnings quality.", "followup": "\"NI $100M but CFO $30M — why?\" → Working-capital investment in growth, aggressive revenue recognition, or large non-cash charges normalized out. \"Indirect vs direct?\" → Indirect starts from NI and is near-universal; direct shows gross cash flows and is rarer but more informative.", "rf": "IFRS interest/dividend classification choice means CFO is not directly comparable across reporters — always verify. РСБУ mandates the direct method by default, which makes РСБУ CFO non-comparable to IFRS/GAAP without adjustment; indirect dominates in IFRS reporting in Russia.", "terms": ["UFCF"]}, {"id": "Q32", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "EBITDA vs Adjusted EBITDA", "spoken": "Adjusted EBITDA starts from EBITDA and adds back items management calls non-recurring — restructuring charges, SBC, one-time legal costs, M&A transaction fees, asset impairments. In a sell-side information memorandum it is almost always higher than reported EBITDA, often by 15-30%. The job on the buy-side is to scrutinize each add-back: is it truly one-time, would a buyer inherit the cost, would it appear in a normalized forward run-rate. A good rule of thumb: if an item recurs in three or more of the last five years, treat it as recurring. The Adjusted EBITDA bridge is the first thing we challenge in diligence — it is where sellers hide bad news.", "formula": "`Adjusted EBITDA = EBITDA + non-recurring add-backs (restructuring, SBC, one-time legal, M&A fees, impairments)`. Recurrence test: in ≥3 of last 5 years → recurring, not an add-back. EBITDA is not defined by GAAP/IFRS — always reconcile to reported.", "example": "GAAP EBITDA $100M with add-backs of restructuring $15M, SBC $20M, one-time legal $5M, COVID $10M → headline Adjusted EBITDA $150M. If diligence shows restructuring hit in 3 of the last 5 years, $10M of it is recurring → real Adjusted EBITDA ≈ $140M. At a 10x multiple that is a $100M swing in value ($1.5B vs $1.4B).", "mistakes": "Accepting the seller's bridge at face value. Treating SBC as a settled add-back — it is firm-dependent: many PE firms add it back for cash purposes but charge the dilution in the equity bridge; some banks refuse it. Letting \"strategic\" relabeling (normalized rent, capex reclassified as R&D) pass unchallenged.", "followup": "\"Which add-backs would you challenge?\" → Recurring restructuring, above-market related-party or management comp, \"normalized\" rent. \"What is QoE?\" → A Quality-of-Earnings review professionally tests every add-back; in practice only ~50-70% of proposed add-backs survive into the final multiple — sellers push high, buyers push low.", "rf": "", "terms": ["EBITDA", "EBIT", "NCI"]}, {"id": "Q21", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "What is working capital and why does it matter?", "spoken": "Net working capital is current assets minus current liabilities; operationally the core is AR plus inventory minus AP. It is the operating liquidity needed to run the business day-to-day. When NWC rises it consumes cash — you are funding more receivables and inventory; when it falls it releases cash. This is why a company can be highly profitable yet cash-poor if working capital grows faster than profit. In a DCF, the change in working capital is subtracted from unlevered free cash flow, so a business with negative working capital — collecting from customers before paying suppliers, like Amazon — actually generates cash as it grows, which is a genuine moat.", "formula": "`NWC = AR + Inventory + Other CA − AP − Accrued Exp − Other CL` · `UFCF = EBIT(1−t) + D&A − CapEx − ΔWC` · `CCC = DSO + DIO − DPO`. 3-statement on a $20M WC increase: IS no impact · CFS operating −$20M · BS net current assets +$20M, cash −$20M.", "example": "Revenue $1B, AR $100M, Inventory $80M, AP $60M, COGS $700M. NWC = 100 + 80 − 60 = $120M (12% of revenue). DSO = (100/1000)×365 = 36.5 days; DIO = (80/700)×365 = 41.7 days; DPO = (60/700)×365 = 31.3 days. CCC = 36.5 + 41.7 − 31.3 = 46.9 days — the company waits ~47 days between paying suppliers and collecting from customers.", "mistakes": "Assuming higher working capital is good — it means more cash is trapped. Treating negative working capital as a weakness — for Amazon and subscription models it is a strength. Forgetting that in M&A the target's WC is trued-up separately from the headline price.", "followup": "\"What is CCC and why useful?\" → DSO + DIO − DPO; lower is better, negative means customers fund you before suppliers (Amazon ≈ −30 days). \"M&A mechanics?\" → Target WC is negotiated via a true-up to a normalized peg; excess cash is added to the purchase price.", "rf": "Russian food retail (X5, Магнит) runs structurally negative WC — DSO ≈ 5, DIO ≈ 30, DPO ≈ 45, so CCC is around −10 days and suppliers finance growth, a real moat. Heavy industry (Северсталь, НЛМК) carries positive WC of 60-90 days, a cash drag and a cyclicality signal. In DD, check the direction of the WC trend.", "terms": ["working capital", "EBIT", "UFCF", "DCF"]}, {"id": "Q59", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Negative working capital — is it bad?", "spoken": "Not necessarily — it depends entirely on why. There are two kinds. Structural negative working capital comes from the business model: you collect from customers before you pay suppliers, so the cash conversion cycle is negative — Amazon at roughly −30 days, Walmart around −8, a SaaS firm where deferred revenue dwarfs AR. That is good; suppliers and customers finance your growth for free. Symptomatic negative working capital is distress: you are stretching payables because you have no cash, suppliers move you to cash-on-delivery, and AR falls because revenue is falling, not because collections improved. The whole test is whether the CCC is negative by design or by desperation.", "formula": "`NWC = (AR + Inventory + Prepaid) − (AP + Accrued + Deferred Revenue)` — exclude cash (non-operating) and short-term debt (financing). `CCC = DSO + DIO − DPO`. DCF effect: with NWC at −10% of revenue, $100M revenue growth → ΔWC = −$10M → +$10M to FCF; the faster the growth, the more cash the WC release throws off.", "example": "Магнит collects at the till (DSO ≈ 0) and pays suppliers in 45-60 days (DPO ≈ 50), so CCC ≈ −40 days — growth generates cash. A construction company with negative NWC because it is stretching subcontractors out of cash shortage is the opposite: subcontractors walk, projects stall, and it spirals toward insolvency. Same sign, opposite meaning.", "mistakes": "Reading the sign without the cause. A move from +$50M to −$20M is fine if AP is growing (suppliers extending credit) and revenue grew with it, but dangerous if it is driven by AR collapse (revenue falling) or cash depletion (running out of money).", "followup": "\"WC went from +$50M to −$20M — red flag?\" → Depends on the driver: AP growth = benign, AR decline = revenue problem, cash depletion = danger. Always look at the reason.", "rf": "X5 runs CCC around −10 days (suppliers ~45d, inventory ~30d, customers cash), worth on the order of $1B of working-capital advantage; Магнит is similar — the Amazon model applied to Russian grocery. Industrial names like Северсталь sit at roughly +70 days as traditional cash consumers.", "terms": ["deferred revenue", "working capital", "NCI", "DCF"]}, {"id": "Q60", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Depreciation is non-cash — why does it affect cash?", "spoken": "Depreciation by itself is an accounting entry, not a cash flow — but it is tax-deductible, so it lowers taxable income and the company pays less tax, and that tax saving is real cash. That is the depreciation tax shield: D&A times the tax rate. The higher the D&A and the higher the tax rate, the bigger the cash benefit. The corollary matters: in a zero-tax environment depreciation has no cash impact at all, because there is no tax to shield.", "formula": "`Tax shield = D&A × tax rate`. On the CFS the D&A add-back simply reverses the IS deduction off net income; the cash effect itself is the tax line.", "example": "D&A = $10M, tax rate = 25%. Without D&A: taxable income $100M, tax $25M. With D&A: taxable income $90M, tax $22.5M. The $2.5M difference ($10M × 25%) is real cash saved. This is why capital-intensive businesses (steel, oil) show high CFO on moderate net income — large D&A throws off a large tax shield.", "mistakes": "Saying D&A \"doesn't belong in a DCF because it's non-cash\" — the tax shield is real cash, and the gross add-back just reverses the IS deduction. Forgetting that with no taxes (or with NOLs absorbing income) there is no shield. Double-counting the shield by both adding back D&A and forgetting it already sits in the cash-tax line.", "followup": "\"Tax-free environment?\" → No cash impact: NI drops by D&A, CFS adds it straight back, net zero. \"Why prefer accelerated depreciation?\" → Larger upfront shields pull the tax benefit forward, raising PV.", "rf": "Russia's profit-tax rate is 25% from 2025 (up from 20%), and the tax code allows an amortization premium of 10-30% in year one as a capex incentive. Tax depreciation running ahead of book creates a DTL, which for asset-heavy producers (Северсталь, НЛМК) accumulates materially; reconciling the DTA/DTL schedule is a standard M&A requirement.", "terms": ["depreciation", "tax shield"]}, {"id": "Q61", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T2", "question": "Where does Depreciation show on the Income Statement?", "spoken": "D&A can show up as its own operating-expense line, or it can be embedded — inside COGS for manufacturers (depreciation of production equipment) or inside SG&A (often intangible amortization). Where it sits changes reported gross margin and EBIT, which is one reason EBITDA, which pulls all of it back, is the popular cross-sector metric. The D&A add-back on the cash flow statement can be larger than what is visible on the income statement, because it captures D&A from every source — including amounts capitalized into inventory that only hit the IS later as COGS.", "formula": "Placement: COGS (manufactured goods) · OPEX (office/tech equipment) · SG&A (intangible amortization). EBITDA adds all of it back. If D&A is not a separate line, find it on the CFS or in the notes.", "example": "", "mistakes": "Assuming IS D&A equals CFS D&A — the CFS figure can be larger (D&A capitalized into inventory, discontinued operations). Comparing gross margins across companies without checking whether production D&A sits in COGS.", "followup": "\"Why might CFS D&A exceed IS D&A?\" → It includes D&A capitalized into inventory (hits IS only when sold as COGS) and from discontinued operations — always reconcile the two. \"How to find D&A if not a separate line?\" → CFS add-back or the notes.", "rf": "", "terms": ["amortization", "depreciation", "EBITDA", "EBIT"]}, {"id": "Q19", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Walk me through $10M depreciation across 3 statements", "spoken": "I'll use a 25% tax rate. Income statement: $10M of depreciation reduces pre-tax income by $10M, cuts taxes by $2.5M, so net income falls $7.5M. Cash flow statement: start with NI down $7.5M, add back the $10M non-cash depreciation, for a net cash impact of positive $2.5M — that is the depreciation tax shield. Balance sheet: PP&E falls $10M through accumulated depreciation, cash rises $2.5M, and retained earnings fall $7.5M. The check ties: assets change −$10M + $2.5M = −$7.5M, equity change −$7.5M, balanced. This is the foundational accounting walk-through — the $2.5M shield is real economic value.", "formula": "`IS: D&A +$10M → pre-tax −$10M → tax −$2.5M → NI −$7.5M`\n`CFS: NI −$7.5M + D&A add-back +$10M = net cash +$2.5M`\n`BS: PP&E −$10M | Cash +$2.5M | RE −$7.5M`\n`Check: ΔAssets (−$10 + $2.5 = −$7.5) = ΔEquity (−$7.5)`", "example": "The senior version is the M&A step-up: buyer writes a $200M-book / $350M-fair-value asset up by $150M, creating new D&A and new tax shields — at 25% over a 15-year life that is $150M/15 = $10M/yr of extra D&A, so $2.5M/yr of tax savings ($37.5M total over the life, less on a PV basis). Whether that PPA amortization is tax-deductible drives accretion/dilution: yes in a stock deal with a 338(h)(10) election, no in a standard stock deal.", "mistakes": "Forgetting the tax effect and moving NI by the full $10M. Failing the balance check. Missing that an NOL position defers the shield — the full $10M hits NI with no tax benefit until the NOL is used up. Treating PPA amortization as automatically tax-deductible.", "followup": "\"Tax rate 0%?\" → NI drops $10M, CFS −$10M + $10M add-back = $0 cash impact, no shield — which is why tax-exempt buyers (sovereign funds, endowments) structure deals differently. \"What if there's an NOL?\" → No immediate shield until the NOL is consumed.", "rf": "", "terms": ["depreciation", "tax shield"]}, {"id": "Q62", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "IFRS/GAAP vs RAS (РСБУ): key differences", "spoken": "The core split is purpose: IFRS and US GAAP exist to inform investors, while РСБУ is built for the tax authority. That drives the differences — IFRS uses fair value broadly and consolidates subsidiaries, US GAAP is more rules-based with limited fair value, and РСБУ stays on historical cost with no real consolidation, so it doesn't reflect economic reality. For Russian work the practical rule is: value off IFRS, but go to РСБУ for the dividend base and the tax basis, because both are legally anchored to statutory accounts. For asset-heavy holdings the net-income gap between РСБУ and IFRS is routinely 40-60%.", "formula": "Key contrasts — Fair value: IFRS broad / GAAP limited / РСБУ no (historical cost) · Consolidation: IFRS & GAAP yes / РСБУ standalone · LIFO: IFRS banned / GAAP & РСБУ allowed · R&D: IFRS capitalizes development phase / GAAP expenses (ex-software) / РСБУ expenses · Leases on BS: IFRS 16 & ASC 842 all / РСБУ largely off-BS · PP&E revaluation: IFRS & РСБУ allowed / GAAP banned · CFS: РСБУ direct by default. Legitimate РСБУ uses = dividend base + tax liability.", "example": "Газпром shows the gap starkly: PP&E at РСБУ historical cost (partly Soviet-era) versus revalued IFRS carrying value can differ several-fold, and standalone РСБУ revenue versus consolidated IFRS revenue differs by a wide margin. Critically, Russian law sets distributable dividends off РСБУ net income, not IFRS — so the dividend base in a model must come from statutory accounts.", "mistakes": "Running a DCF off РСБУ — no fair values, no consolidation, not economic reality. Modeling the dividend base off IFRS net income when Russian law requires РСБУ statutory profit. Ignoring that РСБУ is the tax basis, so a tax model needs a reconciliation.", "followup": "\"Can you use RAS for DCF?\" → Technically possible, not recommended; РСБУ's only legitimate roles are the dividend base and tax. \"Where does the NI gap come from?\" → Consolidation scope, fair-value adjustments, goodwill treatment, and DTA/DTL differences.", "rf": "", "terms": ["LIFO"]}, {"id": "Q63", "block": 4, "block_title": "FINANCIAL STATEMENTS", "tier": "T1", "question": "Calendarization and LTM/TTM revenue", "spoken": "Calendarization adjusts companies with different fiscal year-ends onto a common period so comps are apples-to-apples. LTM, last twelve months, is the rolling twelve-month figure — in practice the sum of the last four reported quarters, or last full fiscal year plus interim year-to-date minus the comparable prior year-to-date. You calendarize by blending the current and next fiscal years by the months of overlap. In M&A you almost always run the analysis on an LTM basis for the target, because it smooths seasonality and reflects the most recent twelve months of trading.", "formula": "`LTM = latest FY + interim YTD − comparable prior YTD` (= last 4 reported quarters). `Calendarized revenue = (M/12)×current FY + ((12−M)/12)×next FY`, M = months of overlap.", "example": "Company A has a Dec year-end, Company B a Mar year-end, comparing to Dec-31. A is used as-is. B is rebuilt as 9/12 of the current FY (Apr-Dec) plus 3/12 of the prior FY (Jan-Mar) — equivalently Q2+Q3+Q4 of the current FY plus Q1 of the next FY.", "mistakes": "Comparing raw annual figures across misaligned fiscal years — a Dec reporter against a Jun reporter mixes different economic conditions; calendarize or use LTM. Annualizing a stub period for a seasonal business without care, which misleads.", "followup": "\"Stub periods in M&A?\" → For a mid-year acquisition the stub is a partial-year pro forma; annualize cautiously for seasonality. \"Where do non-calendar year-ends show up?\" → e.g. Japan and India commonly run April-March, so cross-border comps almost always need calendarization.", "rf": "", "terms": ["comparable"]}, {"id": "Q100", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What are the main valuation methodologies?", "spoken": "\"There are five core methodologies. DCF gives intrinsic value — you project unlevered free cash flows and discount at WACC; it's the most theoretically rigorous but the most assumption-sensitive. Comparable Companies use trading multiples of similar public peers — fast and market-based, but no control premium. Precedent Transactions use multiples from past M&A deals — they embed a control premium and reflect real buyer behaviour, but the data can be stale. LBO Analysis sets the floor — the maximum a financial sponsor can pay for a 20%+ IRR with no synergies. SOTP values each segment separately and is standard for conglomerates. In practice you present two or three methods on a football-field chart and recommend the convergence zone, never a single point.\"", "formula": "- DCF = intrinsic, discount UFCF at WACC; Comps = market-relative (minority, no premium); Precedent = deal-relative (control + synergies); LBO = sponsor floor; SOTP = conglomerates\n- Control premium is NOT in the DCF — it captures intrinsic value under current management; the premium sits separately in the football field\n- Output = a range from the convergence zone, never a point estimate", "example": "If DCF says $40-50, Comps say $38-45 and Precedent says $42-55, the recommendation is the overlap $42-48. The MD frames it: \"Fair value is $42-48. Market at $45+, accept no less than $42.\"", "mistakes": "Forgetting DDM where it belongs — banks, insurers, utilities, REITs (no/irregular dividends elsewhere is exactly why you skip it). Presenting a single number instead of a range. Knowing what each method is but not WHEN it applies.", "followup": "\"Which gives the highest value?\" → Precedent transactions (control premium) — see Q101. \"When DCF is highest?\" → check terminal growth and WACC for over-optimism. \"Why sell at all?\" → if a different shareholder has better assumptions / lower cost of capital, their DCF is higher — that spread is the value of selling.", "rf": "DCF is primary for domestic targets (thin comps); trading comps lean on global peers with a discount; precedent transactions are scarce and contaminated post-2022 (forced sales only); LBO is rarely usable at 20%+ key rate. Anchor everything: as Damodaran puts it, every method is wrong differently — triangulate.", "terms": ["control premium", "comparable", "synergies", "precedent", "UFCF", "WACC", "SOTP", "IRR"]}, {"id": "Q101", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Which methodology typically gives the highest/lowest value?", "spoken": "\"Precedent transactions usually give the highest value because they embed a 20-40% control premium — real buyers actually paid those prices in auctions. DCF can land anywhere depending on assumptions: an aggressive DCF beats everything, a conservative one can fall below comps. Trading comps reflect minority public value with no control premium, so they sit in the middle. LBO is the floor — a sponsor's price is constrained by how much debt the company supports and the target IRR. The ranking can flip with the cycle: a 2021 precedent at 15x EBITDA looks absurd when comps trade at 8-10x today, so stale precedent does not equal current value.\"", "formula": "- Typical order high → low: Precedent (control premium) > Comps (minority) > DCF (anchored on fundamentals, for stable mature names) > LBO (sponsor floor)\n- DCF is the swing — it can sit anywhere; if DCF is the highest, something is off in terminal g or WACC\n- LBO floor ≈ 70-85% of strategic EV", "example": "Precedent set trades at 11-14x → sell-side argues \"expect at least 12x.\" Buy-side counters \"those deals were pre-rate-hike; current conditions justify 9-10x.\" The associate builds all four rigorously; the MD picks the narrative.", "mistakes": "Treating the high/low ordering as fixed — it inverts across rate cycles. Trusting stale precedent from a bubble that inflates the range. Quoting \"DCF is always lowest\" without the caveat that aggressive assumptions break the rule.", "followup": "\"When is precedent useless?\" → in fast-moving environments, deals older than ~3 years (especially post-2022 RU). \"Why is DCF lowest for mature firms?\" → it anchors on fundamentals while comps/precedent carry liquidity and auction premia.", "rf": "", "terms": ["control premium", "precedent", "EBITDA", "WACC", "EBIT", "IRR", "DCF", "LBO"]}, {"id": "Q114", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "What other valuation methodologies exist?", "spoken": "\"Beyond the core five, there's liquidation value — the asset-by-asset floor used in distressed and restructuring, and the 'best interests' test in Chapter 11 requires creditors get at least this. There's DDM for banks, utilities and REITs. There's Residual Income, also called EVA or Economic Profit, where value depends on whether ROIC exceeds WACC. Cap-rate valuation for real estate, where value is NOI divided by the cap rate. And cost-to-replicate for IP-heavy or early-stage businesses — what it would cost to rebuild the asset from scratch.\"", "formula": "- `EVA / Residual Income = Invested Capital × (ROIC − WACC)` — ROIC > WACC = value creation\n- `Cap rate = NOI / Property Value` — 5% cap rate ⇒ 20x NOI (inverse multiple)\n- Liquidation = floor, not fair value; use only for distressed or as a downside scenario\n- Cost-to-replicate = reproduction cost of assets / platform", "example": "A platform \"would cost $500M and 5 years to rebuild from scratch\" — that replacement cost is the floor for the technology value in an IP-heavy deal. Recovery-rate anchors for liquidation: Cash 100%, AR ~80%, Inventory 50-70%, PP&E 20-50%, Goodwill 0%; a fire sale knocks off another 20-30% versus orderly.", "mistakes": "Treating liquidation or replacement value as fair value rather than a floor/ceiling benchmark. Forgetting goodwill recovers ~0% in liquidation. Ignoring IAS 36 goodwill impairment logic (CGU value < carrying amount ⇒ write-down, non-cash but permanent).", "followup": "\"Who trademarked EVA?\" → Stern Stewart (1991); concept traces to Alfred Marshall (1890); McKinsey calls it Economic Profit. \"When use Residual Income?\" → bank valuation alongside DDM.", "rf": "Cap rates run higher on country risk — Moscow prime office ~9-10%, logistics 10-12%, retail 10-13% (vs much tighter in DM). Replacement cost is largely theoretical now: sanctioned equipment (turbines, chips) cannot be re-sourced, so reproduction cost is not a real ceiling.", "terms": ["cap rate", "REIT", "WACC", "NOI", "DDM"]}, {"id": "Q115", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "What is a liquidation valuation?", "spoken": "\"Liquidation value is the floor case: you sell every asset individually and apply recovery haircuts — cash at 100%, receivables around 80%, inventory 50-70%, PP&E 20-50%, goodwill at zero — then subtract administrative costs and priority claims to get what's left for creditors. It's the minimum any creditor should accept in a restructuring, and in Chapter 11 the 'best interests' test requires the plan to deliver at least this. A disorderly fire sale cuts recoveries another 20-30% below orderly liquidation. It is a floor, not fair value — only for distressed situations or as a downside scenario.\"", "formula": "- Liquidation value = Σ (Book value × recovery %) − admin/fees − priority claims (DIP, admin)\n- Recovery anchors: Cash 100%, AR 80% (aged → 40-50%), Inventory 50-70% (commodity higher, specialised lower), PP&E 20-50% (real estate ~50%, specialised machinery 10-20%), Goodwill/IP ~0% (brand IP 5-10%)\n- Fire-sale discount: additional −20-30%", "example": "```\nAsset          Book Value   Recovery %   Liquidation\nCash              $50M         100%          $50M\nAR               $200M          80%         $160M\nInventory        $150M          60%          $90M\nPP&E             $300M          30%          $90M\nIntangibles      $200M           0%           $0M\nTotal                                        $390M\n− Admin costs/fees                          ($30M)\n− Priority claims (DIP, admin)              ($40M)\n= Available to unsecured creditors          $320M\nUnsecured claims $800M → recovery rate = 40%\n```", "mistakes": "Using liquidation value as fair value. Crediting goodwill with any meaningful recovery. Forgetting to subtract administrative costs and priority claims before the creditor recovery number.", "followup": "\"MD question in distressed M&A?\" → \"If it liquidates tomorrow, how much do senior creditors recover?\" — the answer drives debt pricing and restructuring terms. \"Why does timeline matter?\" → a 1-3 year bankruptcy adds a 15-25% PV discount.", "rf": "Under ФЗ-127, average unsecured recovery is only ~5-10%, far below US/EU; proceedings run 1-3 years and the administrator often serves the largest creditor. Subsidiary liability of controlling persons (since 2017) is a powerful creditor tool.", "terms": ["book value", "goodwill"]}, {"id": "Q105", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "What is SOTP (Sum-of-the-Parts)?", "spoken": "\"Sum-of-the-parts values each business segment separately — usually with its own multiple or DCF — then adds them up and subtracts net debt and corporate costs. It's standard for conglomerates because segments have materially different risk, growth and capital intensity, so one blended multiple misprices them. The market often applies a conglomerate discount of roughly 10-25% to the consolidated entity, and SOTP is the tool that quantifies it. The discipline: only use it when segments genuinely differ — otherwise it's just a DCF dressed up.\"", "formula": "- SOTP EV = Σ (segment value) − net debt − unallocated corporate; apply segment-appropriate multiples\n- Conglomerate discount ≈ 10-25% (consolidated trades below SOTP)\n- Use when segments differ in risk / growth / capital intensity; otherwise consolidated DCF + segment disclosure", "example": "\"Consolidated 8x EBITDA. But Division A (software) is worth 15x and Division B (hardware) 6x → blended SOTP 10x. The market is pricing a 20% conglomerate discount. Spin off Division A to unlock ~$2B.\" This is the standard activist playbook (Pershing Square, Elliott, Third Point).", "mistakes": "Applying SOTP to a single-sector holding company where segments don't materially differ. Forgetting to subtract net debt and unallocated corporate overhead. Double-counting value by ignoring the conglomerate / holding discount.", "followup": "\"When does SOTP NOT add value?\" → publicly traded single-sector subsidiaries of industrials — use consolidated DCF and disclose segment mix. \"Who hires you?\" → the activist (to attack) or the company (to defend).", "rf": "", "terms": ["net debt", "SOTP", "DCF"]}, {"id": "Q112", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "LBO as a valuation methodology", "spoken": "\"An LBO analysis works backwards to a price. You fix the target IRR — typically 20-25% — the maximum leverage the company supports, and operating assumptions, then solve for the most a sponsor can pay; that's the acquisition floor. Good candidates have stable EBITDA, low CapEx, hard assets for collateral, a defensible moat and proven management. The sponsor levers up, uses cash flow to pay down debt, and exits at a similar or higher multiple. Value creation comes from three levers: EBITDA growth, multiple expansion, and debt paydown — and you should never assume multiple expansion in your base case.\"", "formula": "- LBO floor = max price for target IRR (20-25%) with no synergies ≈ 70-85% of strategic EV\n- Leverage: ~5-6x EBITDA (IG-style credit), 7-8x (HY) — depends on cash-flow stability\n- Three value levers: (1) EBITDA growth, (2) multiple expansion, (3) debt paydown\n- `Gross IRR` is before fees; `Net IRR` after 2% mgmt fee + 20% carry + expenses", "example": "Carry waterfall, $500M fund returning $1,250M (2.5x): LP gets return of capital $500M + 8% preferred ~$200M; remaining $550M splits 80/20 → LP +$440M, GP carry +$110M. LP total ~$1,140M (net ~2.3x, net IRR ~20-24%); GP earns carry $110M + ~$50M mgmt fees. Net of fees, a 30% gross IRR becomes ~22%.", "mistakes": "Baking multiple expansion into the base case. Treating the LBO floor as an absolute floor — it's a buyer-constraint valuation. Confusing gross and net IRR (the fee drag is material). Applying LBO to firms that can't support debt or to minority stakes.", "followup": "\"Use in a dual-track?\" → the LBO floor tells the sell-side \"PE pays at least $X; if strategics can't beat it, go PE\" — it's the negotiation anchor. \"Strategic bids below the floor?\" → either they're cheap or your LBO assumptions are aggressive.", "rf": "Classic LBO math is effectively unworkable at a ~20-21% key rate — CoD of 20-25% means interest eats the cash flow. It's replaced by growth-equity structures (lower leverage, lighter debt, compensated by higher target IRR 25-35%) or club deals with minimal bank financing.", "terms": ["multiple expansion", "debt paydown", "synergies", "leverage", "EBITDA", "carry", "EBIT", "IRR"]}, {"id": "Q121", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "How do you pitch a valuation to a client?", "spoken": "\"Start with the conclusion: 'We believe fair value is $X-Y per share.' Then show the football field — a visual range from each method — and walk through DCF, comps and precedent transactions, highlighting where they converge. The convergence zone is your recommendation, not the extreme of any single method. Then pre-empt the pushback: have the WACC and terminal-value sensitivity tables in the appendix, and backup slides defending peer selection and growth assumptions. The MD leads the room; the associate makes sure every assumption is defensible.\"", "formula": "- Four rules: (1) range, never a point; (2) lead with the convergence zone; (3) sensitivity tables in the appendix; (4) defend every assumption\n- Be ready for \"what if WACC is wrong by 100bps?\" and for challenges on peers, growth, terminal value", "example": "If DCF says $45-55, comps $42-52, precedents $48-58 → lead with the convergence zone $48-55. The client remembers one number, so anchor them on the convergence, not the high case.", "mistakes": "Presenting a single number. Anchoring the client on the extreme case instead of the convergence. Showing up without sensitivity tables when asked to defend WACC or terminal value.", "followup": "\"WACC won't work for an LBO pitch?\" → changing capital structure breaks WACC; use APV. \"Sanity check?\" → WACC can never be below cost of debt.", "rf": "Football fields are wider and thinner here — DCF ranges blow out on WACC 18-25%, comps are narrow (few peers), precedent is short (few deals). Still lead with a range and a 2-3 method convergence, never a point estimate.", "terms": ["terminal value", "sensitivity", "precedent", "WACC", "DCF"]}, {"id": "Q111", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Private company valuation", "spoken": "\"Same DCF and comps toolkit, plus three adjustments. First, a discount for lack of marketability — typically 15-30% — because you can't sell the stock on an exchange tomorrow. Second, you can't observe beta directly, so you derive it from public comps: unlever each peer's beta, take the median, and relever at the target's own capital structure. Third, data quality is weaker — private financials may be unaudited or not IFRS-compliant, and comp selection is harder with limited disclosure. For PE, the entry valuation is the private-company valuation, and the spread to the exit multiple plus operational improvement is how returns are made.\"", "formula": "- Adjustments: DLOM 15-30%, plus size premium (~2-5%) and DLOC where a minority stake\n- Hamada to move beta across capital structures: `Bu = Bl / (1 + (1−t) × D/E)`, then relever at target D/E\n- Net effect: private WACC roughly +3-7pp vs a comparable public peer", "example": "A private retail target on ~1B RUB revenue can land at WACC ~27%+ versus a ~22% public comparable, once you add size, illiquidity and the DLOM stack. For estate/tax work the IRS scrutinises aggressive discounts.", "mistakes": "Using a public peer's levered beta without re-levering at the target's structure. Skipping the size and illiquidity premia. Relying on a single method — private valuation should still triangulate DCF + comps + precedent where available.", "followup": "\"Where do you get beta for an unlisted firm?\" → Hamada from public comps (unlever → median → relever). \"Stacking discounts?\" → DLOM and DLOC are conceptually separate (marketability vs control) and can both apply.", "rf": "Build it up explicitly — unlever public peers (Hamada), add a size premium and a liquidity premium, then apply DLOM/DLOC. Use Damodaran EM betas plus a country risk premium of ~5-8%.", "terms": ["exit multiple", "comparable", "beta", "WACC", "DCF", "NCI"]}, {"id": "Q104", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "How do you value banks and financial institutions?", "spoken": "\"Banks are valued differently because the business model is leverage — they fund with deposits and lend at a spread, so interest is an operating cost, not financing. That makes EBITDA and EV/EBITDA meaningless. You use equity-side metrics: P/TBV, P/E, DDM, and Residual Income. The golden rule is the link between returns and book: if ROE exceeds cost of equity, the bank should trade above tangible book; if ROE is below CoE, it trades at a discount. Post-2008, European banks ran ROE of 5-7% against a CoE of 10-12% and traded at 0.4-0.7x TBV for years.\"", "formula": "- Use P/TBV, P/E, DDM, Residual Income — never EV/EBITDA or unlevered DCF (debt = raw material)\n- `Justified P/TBV = 1 + (ROE − CoE) / (CoE − g)` — ROE > CoE ⇒ premium to book\n- `DDM: Value = D1 / (CoE − g)`; `Residual Income = NI − (Equity × CoE)`; value = Book equity + PV(future RI)\n- Leverage is regulatory-constrained (CET1), not a free choice", "example": "DDM — EPS $2.50, 50% payout → DPS $1.25, g = 5%, CoE = 12%: `Value = 1.25 × 1.05 / (0.12 − 0.05) = $18.75/share`. Justified multiple — a through-cycle ROE of 25% with CoE 14%, g 5%: `P/TBV = 1 + (25 − 14)/(14 − 5) = 2.22x` (so a name trading at 3.2x on a peak 32% ROE is ~40% rich once you normalise).", "mistakes": "Applying EV/EBITDA or a standard DCF to a bank. Valuing a REIT with DCF — REITs distribute 90%+, so use DDM, P/FFO or NAV (FFO = NI + D&A − gains on sale). Anchoring on a peak-cycle ROE; normalise through the cycle. Forgetting the CET1 constraint on leverage.", "followup": "\"Insurers?\" → P/BV, combined ratio, embedded value. \"Leasing / quasi-banks?\" → P/E, P/B, DDM, adjusted for no deposit base and asset quality. \"Bank M&A premium?\" → typically 1.2-2.0x TBV, justified by cost synergies (branch/back-office) and deposit-franchise value.", "rf": "Сбер trades ~0.9-1.1x P/BV, P/E ~4-6x, div yield ~12-15% (ROE ~22-24% well above CoE ~14-15%); ВТБ ~0.3-0.4x P/BV (distressed); Т-Банк a 2-4x growth premium on ROE ~30%+. Don't double-count: a local CoE of ~14-15% already embeds the EM risk, so applying an extra 30% discount on top of an EU peer's multiple over-haircuts. Watch NIM normalisation — at a 20% key rate, the historic 4-5% NIM compresses toward 3.5-4%, which is the structural reason RU bank multiples re-rate down.", "terms": ["cost of equity", "EV/EBITDA", "leverage", "EBITDA", "EBIT", "DCF", "P/E", "DDM"]}, {"id": "Q116", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T2", "question": "Revenue/expense forecast for retail", "spoken": "\"You forecast revenue bottom-up by store cohort: existing stores grow on like-for-like — traffic times conversion times average ticket — new stores ramp to maturity over two to three years, and closures lose revenue but save cost. Then you build the cost stack as a percent of revenue down to four-wall margin, the store-level EBITDA before corporate overhead. The single most important KPI is that four-wall margin: if it's 20%+ and the format scales you can justify 10x+ EV/EBITDA; if it's 10% and falling, it's a value trap.\"", "formula": "- Revenue = existing stores (# × revenue/store, where revenue/store = traffic × conversion × avg ticket; LFL = price + mix + volume) + new stores (# openings × revenue/store × ramp)\n- New-store ramp: Year 1 ~60-70% of mature, Year 2 ~85-90%, Year 3 ~100%\n- Four-wall margin = store revenue − all store-level costs (COGS + labour + rent + utilities), before corporate overhead\n- LFL/SSS: ~5-12% (RU), ~1-3% (US/EU)", "example": "Typical Russian grocery cost stack (% of revenue): COGS 70-75%, labour 8-12%, rent 4-8%, utilities 2-3%, other opex 2-4% → four-wall margin ~8-15%; minus corporate overhead 3-5% → EBITDA margin ~5-10%. Benchmarks: X5 EBITDA margin ~7.5% (LFL 10-12%), Магнит ~10%, Fix Price ~18% (discount format = higher margin).", "mistakes": "Modelling all stores at mature productivity from day one (ignoring the ramp). Confusing four-wall margin with EBITDA margin (forgetting corporate overhead). Ignoring shrinkage (1-3% of sales) in COGS.", "followup": "\"What drives LFL?\" → price inflation + mix shift + volume; in RU inflation alone can carry it. \"Why does four-wall matter in M&A?\" → it isolates whether a single store is profitable on its own, separating unit economics from corporate drag.", "rf": "Public anchors — X5 ~22K stores, revenue ~3.6T RUB; Магнит ~29K stores, ~2.8T RUB, proximity format; Лента pivoting hypermarkets → proximity (Мини Лента) and struggling with the format shift. RU LFL runs high (10-12%) largely on price inflation, versus 1-3% in DM.", "terms": ["EV/EBITDA", "EBITDA", "EBIT", "ABO"]}, {"id": "Q113", "block": 5, "block_title": "VALUATION (METHODS, DCF, COMPS, PRECEDENTS)", "tier": "T1", "question": "Discount rate: CoE vs WACC — when to use which?",
